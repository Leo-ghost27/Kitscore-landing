<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Kitscore</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0C10; --bg2: #111318; --border: rgba(255,255,255,0.08);
    --text: #F0F2F5; --muted: #8A909C; --accent: #7B6FE8;
    --gold: rgba(212,175,55,0.85);
    --font: 'Inter', system-ui, sans-serif;
    --font-display: 'Playfair Display', Georgia, serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
  h1 { font-family: var(--font-display); font-size: clamp(48px, 10vw, 96px); font-weight: 700; color: var(--text); line-height: 1; letter-spacing: -0.02em; margin-bottom: 16px; opacity: 0.15; }
  h2 { font-family: var(--font-display); font-size: clamp(22px, 4vw, 32px); font-weight: 700; color: var(--text); margin-bottom: 14px; }
  p { font-size: 15px; color: var(--muted); max-width: 400px; line-height: 1.7; margin-bottom: 32px; }
  .buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary { background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; transition: opacity 0.15s, transform 0.15s; }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; text-decoration: none; transition: border-color 0.15s; }
  .btn-ghost:hover { border-color: rgba(212,175,55,0.4); }
  .logo { font-size: 1rem; font-weight: 700; color: var(--text); text-decoration: none; margin-bottom: 48px; display: inline-block; }
  .logo span { color: var(--accent); }
</style>
</head>
<body>
  <a href="/" class="logo">Kit<span>score</span></a>
  <div class="eyebrow">404 — Page not found</div>
  <h1>404</h1>
  <h2>Nothing here.</h2>
  <p>The page you're looking for doesn't exist or has been moved. Head back to the homepage to evaluate creators or view sample reports.</p>
  <div class="buttons">
    <a href="/" class="btn-primary">Back to homepage</a>
    <a href="/sample-sponsor-decision-memo.html" class="btn-ghost">View sample report</a>
  </div>
</body>
</html>
