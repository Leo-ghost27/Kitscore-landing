<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  body{padding:20px;max-width:780px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .topbar .who{font-size:12px;color:var(--color-text-secondary)}
  .signout{font-size:11px;color:#2563EB;cursor:pointer;background:none;border:none}
  .loading{font-size:12px;color:var(--color-text-secondary);padding:40px;text-align:center}
  .sec{font-size:11px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .card{padding:16px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:12px}
  .info-ic{font-size:11px;color:var(--color-text-tertiary);cursor:help;margin-left:3px}

  /* ── Score ring hero ── */
  .score-hero{display:grid;grid-template-columns:140px 1fr;gap:20px;align-items:center;margin-bottom:12px}
  .ring-wrap{position:relative;width:130px;height:130px;flex-shrink:0}
  .ring-wrap svg{width:130px;height:130px;transform:rotate(-90deg)}
  .ring-track{fill:none;stroke:var(--color-border-tertiary);stroke-width:10}
  .ring-fill{fill:none;stroke:#2563EB;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .ring-num{font-size:32px;font-weight:700;color:var(--color-text-primary);line-height:1}
  .ring-label{font-size:9px;color:var(--color-text-tertiary);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
  .score-meta{display:flex;flex-direction:column;gap:8px}
  .badge-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);width:fit-content}
  .conf-row{display:flex;align-items:center;gap:8px}
  .conf-label{font-size:11px;color:var(--color-text-secondary);width:90px;flex-shrink:0}
  .conf-bar{flex:1;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
  .conf-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width 1s ease}
  .conf-pct{font-size:11px;font-weight:600;color:var(--color-text-primary);width:32px;text-align:right}
  .plan-chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;width:fit-content}
  .plan-free{background:var(--color-background-secondary);color:var(--color-text-secondary)}
  .plan-pro{background:#EEF2FF;color:#3730A3}

  /* ── Stats strip ── */
  .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
  .stat-box{padding:12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);text-align:center}
  .stat-box .ml{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .stat-box .mv{font-size:22px;font-weight:600;color:var(--color-text-primary)}

  /* ── Completeness bar ── */
  .progress-track{height:7px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;margin:8px 0 10px}
  .progress-fill{height:100%;background:#2563EB;border-radius:4px;transition:width .8s ease}
  .step-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;color:var(--color-text-secondary)}
  .step-row.done{color:var(--color-text-primary)}
  .step-row i{font-size:14px}

  /* ── Milestone ── */
  .milestone-card{display:flex;align-items:center;gap:14px}
  .ms-icon{font-size:36px;flex-shrink:0;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .ms-bar-wrap{flex:1}
  .ms-bar-track{height:5px;background:var(--color-background-secondary);border-radius:3px;margin:6px 0}
  .ms-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#2563EB,#7B6FE8);transition:width 1s ease}

  /* ── Score breakdown ── */
  .pbar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .pbar-row span:first-child{width:140px;font-size:12px;color:var(--color-text-secondary);flex-shrink:0}
  .pbar-track{flex:1;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
  .pbar-fill{height:100%;border-radius:3px;transition:width 1s ease}
  .pbar-val{width:28px;text-align:right;font-size:12px;font-weight:600}
  .pbar-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0}
  .tag-live{background:#E9F7EE;color:#1C7C3F}
  .tag-ev{background:#EEF2FF;color:#3730A3}
  .tag-pend{background:var(--color-background-secondary);color:var(--color-text-tertiary)}

  /* ── Improvement loop ── */
  .improve-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);padding:12px;margin-bottom:8px}
  .improve-card .ic-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .improve-card .ic-title{font-size:12px;font-weight:500;color:var(--color-text-primary)}
  .improve-card .ic-score{font-size:12px;font-weight:600;padding:2px 7px;border-radius:10px}
  .ic-score-low{background:#FEF3C7;color:#92400E}
  .ic-score-med{background:#DBEAFE;color:#1E40AF}
  .ic-score-hi{background:#D1FAE5;color:#065F46}
  .improve-card .ic-tip{font-size:11px;color:var(--color-text-secondary);line-height:1.55}
  .improve-card .ic-cta{font-size:11px;font-weight:500;color:#2563EB;text-decoration:none;margin-top:6px;display:inline-block}

  /* ── Brand safety ── */
  .qrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
  .qrow:last-child{border-bottom:none}
  .qrow .opts{display:flex;gap:4px}
  .qrow button{font-size:10px;padding:4px 8px;border-radius:0;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;color:var(--color-text-secondary);font-family:inherit}
  .qrow button.sel{background:#2563EB;color:#fff;border-color:#2563EB}

  /* ── Evidence ── */
  .ev-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
  .ev-row:last-child{border-bottom:none}
  .ev-name{flex:1;color:var(--color-text-primary)}
  .ev-plat{color:var(--color-text-secondary);font-size:11px}
  .ev-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
  .st-verified{background:#D1FAE5;color:#065F46}
  .st-pending{background:#FEF3C7;color:#92400E}
  .st-review{background:#DBEAFE;color:#1E40AF}

  /* ── Empty states ── */
  .empty-state{text-align:center;padding:28px 16px}
  .empty-state .es-icon{font-size:32px;margin-bottom:10px;opacity:.5}
  .empty-state .es-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
  .empty-state .es-body{font-size:12px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:12px}
  .empty-state a{font-size:12px;font-weight:600;color:#2563EB;text-decoration:none}

  /* ── Verified badge ── */
  .verified-badge{font-size:10px;background:#E9F7EE;color:#1C7C3F;padding:3px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}

  /* ── Mobile ── */
  @media(max-width:560px){
    .score-hero{grid-template-columns:1fr;text-align:center}
    .ring-wrap{margin:0 auto}
    .score-meta{align-items:center}
    .g3{grid-template-columns:1fr 1fr}
    body{padding:12px}
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="topbar">
      <div>
        <div class="ptitle" style="font-size:16px;font-weight:500">Dashboard</div>
        <div class="who" id="whoami">Loading…</div>
      </div>
      <button class="signout" onclick="signOut()">Sign out</button>
    </div>
    <div id="content" class="loading">Loading your dashboard…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
const BADGE_SVG = {
  none:     `<svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="2" fill="#E5E7EB"/></svg>`,
  bronze:   `<svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="2" fill="#CD7F32"/></svg>`,
  silver:   `<svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="2" fill="#A8A9AD"/></svg>`,
  gold:     `<svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="2" fill="#D4AF37"/></svg>`,
  platinum: `<svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="2" fill="#2563EB"/></svg>`,
};
const BADGE_LABEL  = { none:'New creator', bronze:'Bronze', silver:'Silver', gold:'Gold', platinum:'Platinum' };
const BADGE_COLOR  = { none:'#8A909C', bronze:'#CD7F32', silver:'#A8A9AD', gold:'#D4AF37', platinum:'#2563EB' };
const MILESTONES   = [
  { tier:'bronze',   label:'Bronze Trust Badge', threshold:2,  svg: `<svg width="20" height="20" viewBox="0 0 20 20"><rect width="20" height="20" rx="3" fill="#CD7F32"/><path d="M6 10l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
  { tier:'silver',   label:'Silver Trust Badge',  threshold:5,  svg: `<svg width="20" height="20" viewBox="0 0 20 20"><rect width="20" height="20" rx="3" fill="#A8A9AD"/><path d="M6 10l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
  { tier:'gold',     label:'Gold Trust Badge',    threshold:10, svg: `<svg width="20" height="20" viewBox="0 0 20 20"><rect width="20" height="20" rx="3" fill="#D4AF37"/><path d="M6 10l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
  { tier:'platinum', label:'Platinum Badge',      threshold:20, svg: `<svg width="20" height="20" viewBox="0 0 20 20"><rect width="20" height="20" rx="3" fill="#2563EB"/><path d="M6 10l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
];
const ALL_COMPONENTS = [
  { key:'audience_authenticity', label:'Audience authenticity', advice:'Upload a screenshot of your audience demographics from your platform analytics.', href:'evidence.html' },
  { key:'engagement_quality',    label:'Engagement quality',    advice:'Connect your social accounts so we can verify your engagement rate directly.', href:'profile.html' },
  { key:'brand_safety',          label:'Brand safety',          advice:'Complete the brand safety questionnaire below — sponsors filter heavily on this.', href:'#brand-safety' },
  { key:'content_consistency',   label:'Content consistency',   advice:'Post consistently for 4 weeks then re-submit evidence for verification.', href:'evidence.html' },
  { key:'professionalism',       label:'Professionalism',       advice:'Add a business email, location, and niche to your profile.', href:'profile.html' },
];
const QUESTIONS = [
  {key:'family_safe', label:'Is your content generally family-safe?',  opts:['Yes','Mostly','No']},
  {key:'political',   label:'How often do you post political content?', opts:['None','Occasional','Frequent']},
  {key:'gambling',    label:'Gambling promotion history?',              opts:['Never','Past','Active']},
  {key:'adult',       label:'Adult/mature content?',                    opts:['None','Mild','Explicit']},
  {key:'profanity',   label:'Profanity frequency?',                     opts:['None','Occasional','Frequent']},
];

let profile, creator;

function scoreColor(v){ return v>=80?'#1D9E75': v>=60?'#2563EB':'#E58C1A'; }

function renderRing(score){
  const r = 54, circ = 2*Math.PI*r;
  const pct = Math.min(score||0, 100)/100;
  const offset = circ*(1-pct);
  return `
    <div class="ring-wrap" id="ring-wrap">
      <svg viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="${r}"/>
        <circle class="ring-fill" cx="60" cy="60" r="${r}"
          stroke="${scoreColor(score)}"
          stroke-dasharray="${circ}"
          stroke-dashoffset="${circ}"
          id="ring-arc"/>
      </svg>
      <div class="ring-center">
        <div class="ring-num" id="ring-num">—</div>
        <div class="ring-label">trust score</div>
      </div>
    </div>`;
}

function animateRing(score){
  const r=54, circ=2*Math.PI*r;
  const offset = circ*(1-(Math.min(score||0,100)/100));
  const arc = document.getElementById('ring-arc');
  const num = document.getElementById('ring-num');
  if(!arc||!num) return;
  // Animate number count-up
  let start=0, duration=1200, startTime=null;
  function step(ts){
    if(!startTime) startTime=ts;
    const p=Math.min((ts-startTime)/duration,1);
    const ease=1-Math.pow(1-p,3);
    num.textContent=Math.round(ease*score);
    if(p<1) requestAnimationFrame(step);
    else num.textContent=score;
  }
  requestAnimationFrame(step);
  setTimeout(()=>{ arc.style.strokeDashoffset=offset; },50);
}

async function load() {
  profile = await requireRole('creator');
  if (!profile) return;
  renderSidebar('creator', 'dashboard');
  document.getElementById('whoami').textContent = `${profile.display_name} · ${profile.email||''}`;

  const [{ data:c },{ data:components },{ data:evidence },{ data:answers },{ data:campaigns },{ data:businessEmail }] = await Promise.all([
    sb.from('creators').select('id,niche,location,trust_score,confidence,badge_tier,plan,reliability_score,repeat_sponsor_rate,would_hire_again_pct').eq('id', profile.id).single(),
    sb.from('score_components').select('*').eq('creator_id', profile.id).order('weight', {ascending:false}),
    sb.from('evidence_uploads').select('*').eq('creator_id', profile.id).order('uploaded_at',{ascending:false}),
    sb.from('brand_safety_answers').select('*').eq('creator_id', profile.id),
    sb.from('campaigns').select('*').eq('creator_id', profile.id).order('created_at',{ascending:false}),
    sb.rpc('fn_get_my_business_email'),
  ]);
  creator = { ...c, business_email: businessEmail };

  const answerMap={};
  (answers||[]).forEach(a=>answerMap[a.question_key]=a.answer);
  const verifiedCount=(campaigns||[]).filter(x=>x.creator_confirmed&&x.sponsor_confirmed).length;
  const hasScore=(components||[]).length>0 && creator.trust_score>0;
  const score=parseInt(creator.trust_score)||0;
  const conf=parseInt(creator.confidence)||0;

  // Onboarding steps
  const steps=[
    {label:'Complete your profile (niche + location)', done:!!(creator.niche&&creator.location)},
    {label:'Complete brand safety questionnaire',       done:(answers||[]).length>=QUESTIONS.length},
    {label:'Upload evidence',                           done:(evidence||[]).length>=1},
    {label:'Verify first campaign',                     done:verifiedCount>=1},
  ];
  const doneCount=steps.filter(s=>s.done).length;
  const pct=Math.round((doneCount/steps.length)*100);

  // Next milestone
  const nextMs=MILESTONES.find(m=>verifiedCount<m.threshold);
  const prevMs=MILESTONES.filter(m=>verifiedCount>=m.threshold).pop();
  const msFrom=prevMs?prevMs.threshold:0;
  const msTo=nextMs?nextMs.threshold:MILESTONES[MILESTONES.length-1].threshold;
  const msPct=nextMs?Math.round(((verifiedCount-msFrom)/(msTo-msFrom))*100):100;

  // Component map
  const compMap={};
  (components||[]).forEach(c=>compMap[c.component_key]=c);

  // Improvement suggestions — sort lowest score first, cap at 3
  const improvements=ALL_COMPONENTS
    .filter(ac=>compMap[ac.key]&&compMap[ac.key].value<80)
    .sort((a,b)=>(compMap[a.key]?.value||0)-(compMap[b.key]?.value||0))
    .slice(0,3);

  document.getElementById('content').innerHTML = `

    <!-- ── Score hero ── -->
    <div class="card">
      <div class="score-hero">
        ${renderRing(score)}
        <div class="score-meta">
          <div class="badge-pill">
            <span>${BADGE_SVG[creator.badge_tier]}</span>
            ${BADGE_LABEL[creator.badge_tier]}
          </div>
          ${hasScore?`
          <div class="conf-row">
            <span class="conf-label">Confidence</span>
            <div class="conf-bar"><div class="conf-fill" id="conf-fill" style="width:0%"></div></div>
            <span class="conf-pct">${conf}%</span>
          </div>`:''}
          <div class="verified-badge"><i class="ti ti-rosette-discount-check"></i>${verifiedCount} verified campaign${verifiedCount===1?'':'s'}</div>
          <div class="${'plan-chip plan-'+(creator.plan||'free')}">${(creator.plan||'free').toUpperCase()}</div>
          ${creator.plan==='free'?`<a href="pricing-creator.html" style="font-size:11px;color:#2563EB;text-decoration:none;font-weight:500">Upgrade to Pro →</a>`:''}
        </div>
      </div>
    </div>

    <!-- ── Stat strip ── -->
    <div class="g3">
      <div class="stat-box">
        <div class="ml">Evidence items</div>
        <div class="mv">${(evidence||[]).length||0}</div>
      </div>
      <div class="stat-box">
        <div class="ml">Campaigns</div>
        <div class="mv">${(campaigns||[]).length||0}</div>
      </div>
      <div class="stat-box">
        <div class="ml">Profile complete</div>
        <div class="mv">${pct}%</div>
      </div>
    </div>

    <!-- ── Onboarding ── -->
    ${doneCount<steps.length?`
    <div class="card">
      <div class="sec">Complete your trust profile</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${steps.map(s=>`
        <div class="step-row ${s.done?'done':''}">
          <i class="ti ${s.done?'ti-circle-check-filled':'ti-circle'}" style="color:${s.done?'#1C7C3F':'var(--color-text-tertiary)'}"></i>
          ${s.label}
        </div>`).join('')}
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:8px">${pct}% complete · finish all steps to maximise your trust score</div>
    </div>`:''}

    <!-- ── Milestone ── -->
    ${nextMs?`
    <div class="card">
      <div class="sec">Next milestone</div>
      <div class="milestone-card">
        <div class="ms-icon">${nextMs.svg}</div>
        <div class="ms-bar-wrap">
          <div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${nextMs.label}</div>
          <div class="ms-bar-track"><div class="ms-bar-fill" style="width:${msPct}%"></div></div>
          <div style="font-size:11px;color:var(--color-text-secondary)">${verifiedCount} of ${nextMs.threshold} verified campaigns · ${nextMs.threshold-verifiedCount} to go</div>
        </div>
      </div>
    </div>`:`
    <div class="card" style="text-align:center;padding:20px">
      <div style="margin-bottom:8px"><svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="4" fill="#2563EB"/><path d="M8 14l5 5 7-8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div style="font-size:13px;font-weight:600;color:var(--color-text-primary)">Platinum achieved</div>
      <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">You've reached the highest trust tier.</div>
    </div>`}


    <!-- ── Verified Reputation ── -->
    ${(verifiedCount>0)?`
    <div class="card">
      <div class="sec">Verified Sponsorship Reputation</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
        <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-sm);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:600;color:${creator.reliability_score>=80?'#D4AF37':'var(--color-text-primary)}'}">${creator.reliability_score||0}</div>
          <div style="font-size:10px;color:var(--color-text-secondary);margin-top:2px">Reliability Score</div>
        </div>
        <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-sm);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:600;color:var(--color-text-primary)">${creator.would_hire_again_pct||0}%</div>
          <div style="font-size:10px;color:var(--color-text-secondary);margin-top:2px">Would Hire Again</div>
        </div>
        <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-sm);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:600;color:var(--color-text-primary)">${creator.repeat_sponsor_rate||0}%</div>
          <div style="font-size:10px;color:var(--color-text-secondary);margin-top:2px">Repeat Sponsors</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--color-text-secondary);line-height:1.6">Computed from ${verifiedCount} mutually confirmed campaign${verifiedCount===1?'':'s'}. Updates automatically when sponsors submit endorsements.</div>
    </div>`:''}

    <!-- ── Score breakdown ── -->
    <div class="card">
      <div class="sec">Score breakdown <i class="ti ti-info-circle info-ic" title="Each component is weighted. Live verified data scores highest."></i></div>
      ${hasScore?ALL_COMPONENTS.map(ac=>{
        const comp=compMap[ac.key];
        const val=comp?comp.value:null;
        const status=comp?comp.status:'pending';
        const tagClass=status==='live_verified'?'tag-live':status==='evidence_submitted'?'tag-ev':'tag-pend';
        const tagLabel=status==='live_verified'?'Live':status==='evidence_submitted'?'Evidence':'Pending';
        const barColor=val>=80?'#1D9E75':val>=60?'#2563EB':'#E58C1A';
        return `
        <div class="pbar-row">
          <span>${ac.label}</span>
          <div class="pbar-track"><div class="pbar-fill" style="width:${val||0}%;background:${barColor}"></div></div>
          <span class="pbar-val" style="color:${val?barColor:'var(--color-text-tertiary)'}">${val??'—'}</span>
          <span class="pbar-tag ${tagClass}">${tagLabel}</span>
        </div>`;
      }).join(''):`
      <div class="empty-state">
        <div class="es-icon">📊</div>
        <div class="es-title">No score components yet</div>
        <div class="es-body">Upload evidence and complete your brand safety questionnaire to start building your trust score.</div>
        <a href="evidence.html">Upload evidence →</a>
      </div>`}
    </div>

    <!-- ── Improvement loop ── -->
    ${improvements.length?`
    <div class="card">
      <div class="sec">How to improve your score</div>
      ${improvements.map(ac=>{
        const val=compMap[ac.key]?.value||0;
        const cls=val<60?'ic-score-low':val<80?'ic-score-med':'ic-score-hi';
        return `
        <div class="improve-card">
          <div class="ic-head">
            <span class="ic-title">${ac.label}</span>
            <span class="ic-score ${cls}">${val}/100</span>
          </div>
          <div class="ic-tip">${ac.advice}</div>
          <a href="${ac.href}" class="ic-cta">Take action →</a>
        </div>`;
      }).join('')}
    </div>`:''}

    <!-- ── Brand safety ── -->
    <div class="card" id="brand-safety">
      <div class="sec">Brand safety questionnaire <span style="font-weight:400;text-transform:none;color:var(--color-text-tertiary)">— updates your score live</span></div>
      ${QUESTIONS.map(q=>`
        <div class="qrow">
          <span style="font-size:12px">${q.label}</span>
          <span class="opts">${q.opts.map(o=>`<button class="${answerMap[q.key]===o?'sel':''}" onclick="answerQuestion('${q.key}','${o}')">${o}</button>`).join('')}</span>
        </div>`).join('')}
    </div>

    <!-- ── Evidence ── -->
    <div class="card">
      <div class="sec">Evidence uploads</div>
      ${(evidence||[]).length?(evidence||[]).map(e=>`
        <div class="ev-row">
          <span class="ev-name">${escapeHtml(e.file_name)}</span>
          <span class="ev-plat">${escapeHtml(e.platform||'')}</span>
          <span class="ev-status st-${e.status?.replace('_verified','verified').replace('under_','')}">${(e.status||'').replace(/_/g,' ')}</span>
        </div>`).join(''):`
      <div class="empty-state">
        <div class="es-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></div>
        <div class="es-title">No evidence uploaded yet</div>
        <div class="es-body">Upload audience screenshots, campaign briefs, or analytics exports to verify your score components and raise your confidence rating.</div>
        <a href="evidence.html">Upload your first piece of evidence →</a>
      </div>`}
      ${(evidence||[]).length?`<div style="margin-top:10px"><a href="evidence.html" style="font-size:12px;font-weight:500;color:#2563EB;text-decoration:none">Manage evidence →</a></div>`:''}
    </div>

    <!-- ── Why verify ── -->
    <div class="card" style="background:var(--color-background-secondary)">
      <div class="sec">Why verify campaigns?</div>
      <div style="font-size:12px;color:var(--color-text-secondary);line-height:2">
        ✓ Increases your Trust Score &nbsp;·&nbsp;
        ✓ Unlocks Trust Badges &nbsp;·&nbsp;
        ✓ Improves sponsor confidence &nbsp;·&nbsp;
        ✓ Improves directory ranking
      </div>
      <a href="campaigns.html" style="font-size:12px;font-weight:500;color:#2563EB;text-decoration:none;display:inline-block;margin-top:8px">Manage campaigns →</a>
    </div>

    <!-- ── Proof Packet ── -->
    <div class="card" style="border:1.5px solid ${creator.plan==='pro'?'#2563EB':'#E5E7EB'};background:${creator.plan==='pro'?'#F0F6FF':'var(--color-background-secondary)'}">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:36px;height:36px;background:${creator.plan==='pro'?'#2563EB':'#9CA3AF'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:#0F172A">${creator.plan==='pro'?'Download your Proof Packet':'Watermarked Proof Packet'}</div>
          <div style="font-size:11px;color:#4B5563;margin-top:2px">${creator.plan==='pro'
            ? 'Full PDF — share with sponsors. Includes trust score, verified campaigns, evidence and score breakdown.'
            : 'Free plan includes a watermarked PDF. Upgrade to Pro for the full clean PDF, score history and public profile listing.'
          }</div>
        </div>
        ${creator.plan==='pro'
          ? `<button id="proofBtn" onclick="downloadProofPacket()" style="background:#2563EB;color:#fff;border:none;padding:8px 16px;font-size:12px;font-weight:600;font-family:var(--font-family-base);cursor:pointer;white-space:nowrap">Download PDF</button>`
          : `<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
               <button id="proofBtn" onclick="downloadProofPacket()" style="background:#6B7280;color:#fff;border:none;padding:8px 16px;font-size:12px;font-weight:600;font-family:var(--font-family-base);cursor:pointer;white-space:nowrap">Download (Watermarked)</button>
               <a href="pricing-creator.html" style="font-size:11px;color:#2563EB;font-weight:600;text-decoration:none;white-space:nowrap">Upgrade to Pro →</a>
             </div>`
        }
      </div>
    </div>
  `;

  // Animate ring + confidence bar after render
  requestAnimationFrame(()=>{
    animateRing(score);
    const cf=document.getElementById('conf-fill');
    if(cf) setTimeout(()=>cf.style.width=conf+'%',100);
  });
}

async function downloadProofPacket() {
  const btn = document.getElementById('proofBtn');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Generating…';
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/generate-proof-packet', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session?.access_token}`,
      },
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      alert('Could not generate proof packet: ' + (j.error || 'Unknown error'));
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kitscore-proof-packet.pdf';
    a.click();
    URL.revokeObjectURL(url);
  } catch(err) {
    alert('Error generating proof packet: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Download PDF';
  }
}

async function answerQuestion(key,answer){
  const {error}=await sb.from('brand_safety_answers')
    .upsert({creator_id:profile.id,question_key:key,answer},{onConflict:'creator_id,question_key'});
  if(error){alert('Could not save: '+error.message);return;}
  await load();
}

async function signOut(){
  await sb.auth.signOut();
  window.location.href='auth.html';
}

load();
</script>
</body>
</html>
