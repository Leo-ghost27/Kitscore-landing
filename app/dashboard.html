<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="stylesheet" href="shared.css">
<style>
  body{padding:20px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .topbar .who{font-size:12px;color:var(--color-text-secondary)}
  .signout{font-size:11px;color:#2563EB;cursor:pointer;background:none;border:none}
  .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ml{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .mv{font-size:20px;font-weight:500}
  .sec{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .pbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .pbar-row span:first-child{width:130px;font-size:11px;color:var(--color-text-secondary)}
  .pbar-track{flex:1;height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
  .pbar-fill{height:100%;background:#2563EB;border-radius:3px;transition:width .3s}
  .pbar-val{width:28px;text-align:right;font-size:11px;font-weight:500}
  .qrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
  .qrow:last-child{border-bottom:none}
  .qrow .opts{display:flex;gap:4px}
  .qrow button{font-size:10px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;color:var(--color-text-secondary)}
  .qrow button.sel{background:#2563EB;color:#fff;border-color:#2563EB}
  .verified-badge{font-size:10px;background:#E9F7EE;color:#1C7C3F;padding:3px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
  .loading{font-size:12px;color:var(--color-text-secondary);padding:20px;text-align:center}
  .info-ic{font-size:11px;color:var(--color-text-tertiary);cursor:help;margin-left:3px}
  .progress-track{height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;margin:8px 0 10px}
  .progress-fill{height:100%;background:#2563EB;border-radius:4px;transition:width .3s}
  .step-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;color:var(--color-text-secondary)}
  .step-row.done{color:var(--color-text-primary)}
  .step-row i{font-size:14px}
  .empty-tip{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:var(--border-radius-sm);padding:10px;line-height:1.5}
  .empty-tip a{color:#2563EB;text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="topbar">
      <div>
        <div class="ptitle" style="font-size:16px;font-weight:500">Dashboard</div>
        <div class="who" id="whoami">Loading…</div>
      </div>
    </div>
    <div id="content" class="loading">Loading your live data from Supabase…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="nav.js"></script>
<script>
const BADGE_EMOJI = { none:'—', bronze:'🥉', silver:'🥈', gold:'🥇', platinum:'💎' };
const BADGE_LABEL = { none:'New', bronze:'Bronze', silver:'Silver', gold:'Gold', platinum:'Platinum' };
const MILESTONES = [
  { tier:'bronze', label:'Bronze Trust Badge', threshold:2, emoji:'🥉' },
  { tier:'silver', label:'Silver Trust Badge', threshold:5, emoji:'🥈' },
  { tier:'gold', label:'Gold Trust Badge', threshold:10, emoji:'🥇' },
  { tier:'platinum', label:'Platinum Trust Badge', threshold:20, emoji:'💎' },
];
const ALL_COMPONENTS = [
  { key:'audience_authenticity', label:'Audience authenticity' },
  { key:'engagement_quality', label:'Engagement quality' },
  { key:'brand_safety', label:'Brand safety' },
  { key:'content_consistency', label:'Content consistency' },
  { key:'professionalism', label:'Professionalism' },
];
const QUESTIONS = [
  {key:'family_safe', label:'Is your content generally family-safe?', opts:['Yes','Mostly','No']},
  {key:'political', label:'How often do you post political content?', opts:['None','Occasional','Frequent']},
  {key:'gambling', label:'Gambling promotion history?', opts:['Never','Past','Active']},
  {key:'adult', label:'Adult/mature content?', opts:['None','Mild','Explicit']},
  {key:'profanity', label:'Profanity frequency?', opts:['None','Occasional','Frequent']},
];

let profile, creator;

async function load() {
  profile = await requireRole('creator');
  if (!profile) return;
  renderSidebar('creator', 'dashboard');
  document.getElementById('whoami').textContent = `${profile.display_name} · ${profile.email || ''}`;

  const [{ data: c }, { data: components }, { data: evidence }, { data: answers }, { data: campaigns }] = await Promise.all([
    sb.from('creators').select('*').eq('id', profile.id).single(),
    sb.from('score_components').select('*').eq('creator_id', profile.id).order('component_key'),
    sb.from('evidence_uploads').select('*').eq('creator_id', profile.id).order('uploaded_at', { ascending: false }),
    sb.from('brand_safety_answers').select('*').eq('creator_id', profile.id),
    sb.from('campaigns').select('*').eq('creator_id', profile.id).order('created_at', { ascending: false }),
  ]);
  creator = c;

  const answerMap = {};
  (answers || []).forEach(a => answerMap[a.question_key] = a.answer);

  const verifiedCount = (campaigns || []).filter(x => x.status === 'verified').length;
  const hasScore = (components || []).length > 0;

  // Onboarding progress
  const steps = [
    { label: 'Create profile', done: !!(creator.niche && creator.location) },
    { label: 'Complete brand safety questionnaire', done: (answers || []).length >= QUESTIONS.length },
    { label: 'Upload evidence', done: (evidence || []).length >= 1 },
    { label: 'Verify first campaign', done: verifiedCount >= 1 },
  ];
  const doneCount = steps.filter(s => s.done).length;
  const pct = Math.round((doneCount / steps.length) * 100);

  // Next milestone
  const nextMilestone = MILESTONES.find(m => verifiedCount < m.threshold);

  const componentMap = {};
  (components || []).forEach(c => componentMap[c.component_key] = c);

  document.getElementById('content').innerHTML = `
    <div class="g3">
      <div class="card-sm" style="padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)">
        <div class="ml">Trust score <i class="ti ti-info-circle info-ic" title="A measure of creator credibility based on verified campaigns, profile completeness, evidence validation, and brand safety."></i></div>
        <div class="mv" style="color:#2563EB;font-size:26px">${hasScore ? creator.trust_score : 'Pending'}</div>
        <div class="verified-badge" style="margin-top:6px"><i class="ti ti-rosette-discount-check"></i>${verifiedCount} verified</div>
      </div>
      <div class="card-sm" style="padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)">
        <div class="ml">Trust level <i class="ti ti-info-circle info-ic" title="Earned from mutually verified sponsor campaigns: Bronze at 2, Silver at 5, Gold at 10, Platinum at 20."></i></div>
        <div class="mv" style="font-size:26px">${BADGE_EMOJI[creator.badge_tier]} ${BADGE_LABEL[creator.badge_tier]}</div>
      </div>
      <div class="card-sm" style="padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)">
        <div class="ml">Plan</div>
        <div class="mv" style="text-transform:capitalize;font-size:26px">${creator.plan}</div>
        ${creator.plan !== 'pro' ? `<a href="pricing-creator.html" style="font-size:11px;color:#2563EB;text-decoration:none;display:inline-block;margin-top:4px">Upgrade →</a>` : ''}
      </div>
    </div>

    ${doneCount < steps.length ? `
    <div style="padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:14px">
      <div class="sec">Complete your trust profile</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${steps.map(s => `<div class="step-row ${s.done?'done':''}"><i class="ti ${s.done?'ti-circle-check-filled':'ti-circle'}" style="color:${s.done?'#1C7C3F':'var(--color-text-tertiary)'}"></i>${s.label}</div>`).join('')}
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:6px">${pct}% complete</div>
    </div>` : ''}

    ${nextMilestone ? `
    <div style="padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:14px;display:flex;align-items:center;gap:14px">
      <div style="font-size:30px">${nextMilestone.emoji}</div>
      <div>
        <div class="sec" style="margin-bottom:2px">Next milestone</div>
        <div style="font-size:13px;font-weight:500">${nextMilestone.label}</div>
        <div style="font-size:11px;color:var(--color-text-secondary)">${nextMilestone.threshold - verifiedCount} more verified campaign${nextMilestone.threshold - verifiedCount === 1 ? '' : 's'} needed · adds a verification badge and improved directory visibility</div>
      </div>
    </div>` : ''}

    <div style="padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:14px">
      <div class="sec">Score breakdown</div>
      ${ALL_COMPONENTS.map(ac => {
        const c = componentMap[ac.key];
        return c ? `
        <div class="pbar-row">
          <span>${ac.label}</span>
          <div class="pbar-track"><div class="pbar-fill" style="width:${c.value}%"></div></div>
          <span class="pbar-val">${c.value}</span>
        </div>` : `
        <div class="pbar-row">
          <span>${ac.label}</span>
          <div class="pbar-track"></div>
          <span class="pbar-val" style="color:var(--color-text-tertiary);width:auto">Pending</span>
        </div>`;
      }).join('')}
    </div>

    <div style="padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:14px">
      <div class="sec">Brand safety questionnaire <span style="font-weight:400;text-transform:none;color:var(--color-text-tertiary)">— updates your score live</span></div>
      ${QUESTIONS.map(q => `
        <div class="qrow">
          <span style="font-size:12px">${q.label}</span>
          <span class="opts">${q.opts.map(o => `<button class="${answerMap[q.key]===o?'sel':''}" onclick="answerQuestion('${q.key}','${o}')">${o}</button>`).join('')}</span>
        </div>`).join('')}
    </div>

    <div style="padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:14px">
      <div class="sec">Evidence</div>
      ${(evidence||[]).length ? (evidence||[]).map(e => `
        <div class="qrow"><span style="font-size:12px">${e.file_name} <span style="color:var(--color-text-tertiary)">· ${e.platform||''}</span></span><span style="font-size:10px;color:var(--color-text-secondary)">${e.status.replace('_',' ')}</span></div>
      `).join('') : `<div class="empty-tip">Upload audience or campaign evidence to strengthen your Trust Score. <a href="evidence.html">Upload evidence →</a></div>`}
    </div>

    <div style="padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)">
      <div class="sec">Why verify campaigns?</div>
      <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.8">
        ✓ Increases your Trust Score &nbsp;·&nbsp; ✓ Unlocks Trust Badges &nbsp;·&nbsp; ✓ Improves sponsor confidence &nbsp;·&nbsp; ✓ Improves directory ranking
      </div>
    </div>
  `;
}

async function answerQuestion(key, answer) {
  const { error } = await sb.from('brand_safety_answers')
    .upsert({ creator_id: profile.id, question_key: key, answer }, { onConflict: 'creator_id,question_key' });
  if (error) { alert('Could not save answer: ' + error.message); return; }
  await load(); // re-fetch so the recalculated score (via DB trigger) shows immediately
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = 'auth.html';
}

load();
</script>
</body>
</html>
