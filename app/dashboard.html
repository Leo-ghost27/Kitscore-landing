<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563EB">

<style>
  body{padding:20px;max-width:780px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .topbar .who{font-size:12px;color:var(--color-text-secondary)}
  .signout{font-size:11px;color:#2563EB;cursor:pointer;background:none;border:none}
  .loading{font-size:12px;color:var(--color-text-secondary);padding:40px;text-align:center}
  .sec{font-size:11px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .card{padding:16px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:12px}
  .dash-tabs{display:grid;grid-template-columns:repeat(var(--tab-count,5),1fr);gap:10px;margin-bottom:16px}
  .dash-tab{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:16px 10px;text-align:center;cursor:pointer;transition:border-color .15s ease,background .15s ease,transform .15s ease}
  .dash-tab:hover{border-color:#2563EB;transform:translateY(-1px)}
  .dash-tab.active{border-color:#2563EB;background:#F0F6FF}
  .dash-tab-icon{width:32px;height:32px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;background:var(--color-background-secondary);color:var(--color-text-secondary);border-radius:var(--border-radius-md)}
  .dash-tab.active .dash-tab-icon{background:#fff;color:#2563EB}
  .dash-tab-label{font-size:12.5px;font-weight:600;color:var(--color-text-primary)}
  .dash-tab.active .dash-tab-label{color:#2563EB}
  .dash-tab-badge{display:inline-block;margin-top:5px;font-family:var(--font-mono,monospace);font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--color-text-tertiary);border:1px solid var(--color-border-tertiary);border-radius:8px;padding:1px 6px}
  .tab-panel{opacity:0;animation:panelIn .2s ease forwards}
  @keyframes panelIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
  @media (prefers-reduced-motion: reduce){.tab-panel{animation:none;opacity:1}}
  @media(max-width:640px){.dash-tabs{grid-template-columns:repeat(3,1fr)}}
  .info-ic{color:var(--color-text-tertiary);cursor:help;margin-left:3px;vertical-align:-1px}

  /* ── Score ring hero ── */
  .score-hero{display:grid;grid-template-columns:auto auto 1fr;gap:0;align-items:center;margin-bottom:12px}
  .score-left{display:flex;align-items:flex-start;gap:22px;padding-right:24px}
  .score-left-info{display:flex;flex-direction:column;gap:12px;padding-top:6px}
  .score-badges{display:flex;flex-direction:row;flex-wrap:wrap;gap:8px;align-items:center}
  .score-divider{width:1px;align-self:stretch;background:var(--color-border-tertiary);margin:0 24px}
  .score-right{display:flex;flex-direction:column;gap:10px;padding-left:24px;justify-content:center}
  .ring-wrap{position:relative;width:130px;height:130px;flex-shrink:0}
  .ring-wrap svg{width:130px;height:130px;transform:rotate(-90deg)}
  .ring-track{fill:none;stroke:var(--color-border-tertiary);stroke-width:10}
  .ring-fill{fill:none;stroke:#2563EB;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
  .ring-center{position:absolute;inset:0}
  .ring-num{position:absolute;top:50%;left:50%;transform:translate(-50%,calc(-50% - 16px));font-size:32px;font-weight:700;color:var(--color-text-primary);line-height:1;white-space:nowrap;text-align:center}
  .ring-label{position:absolute;top:50%;left:50%;transform:translate(-50%,calc(-50% + 14px));font-size:9px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;text-align:center}
  .badge-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);width:fit-content}
  .conf-row{display:flex;align-items:center;gap:8px}
  .conf-label{font-size:11px;color:var(--color-text-secondary);width:90px;flex-shrink:0}
  .conf-bar{flex:1;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
  .conf-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width 1s ease}
  .conf-pct{font-size:11px;font-weight:600;color:var(--color-text-primary);width:32px;text-align:right}
  .plan-chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;width:fit-content}
  .plan-free{background:var(--color-background-secondary);color:var(--color-text-secondary)}
  .plan-pro{background:#EEF2FF;color:#3730A3}
  .upgrade-link{font-size:11px;color:#2563EB;text-decoration:none;font-weight:500}
  .why-score-link{display:inline-block;font-size:11.5px;color:#2563EB;text-decoration:none;font-weight:500;border:1px solid #D5DAE3;border-radius:4px;padding:5px 10px;width:fit-content}
  .why-score-link:hover{border-color:#2563EB;background:#F5F8FF}
  .encourage{font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin:0}
  @media(max-width:620px){
    .score-hero{grid-template-columns:1fr}
    .score-left{padding-right:0;margin-bottom:16px}
    .score-divider{display:none}
    .score-right{padding-left:0}
  }

  /* ── Stats strip ── */
  .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
  .stat-box{position:relative;padding:14px 14px 16px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);text-align:left}
  .stat-box .stat-icon{width:32px;height:32px;border-radius:var(--border-radius-md);background:#EEF2FF;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  .stat-box .stat-delta{position:absolute;top:14px;right:14px;font-size:10.5px;font-weight:600;color:#1D9E75;background:#EAF7F0;padding:2px 7px;border-radius:20px}
  .stat-box .mv{font-size:24px;font-weight:700;color:var(--color-text-primary);line-height:1;margin-bottom:4px}
  .stat-box .ml{font-size:12px;color:var(--color-text-secondary);font-weight:500}

  /* ── Completeness bar ── */
  .progress-track{height:7px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;margin:8px 0 10px}
  .progress-fill{height:100%;background:#2563EB;border-radius:4px;transition:width .8s ease}
  .step-row{display:flex;align-items:center;gap:10px;font-size:13.5px;padding:9px 0;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
  .step-row:last-child{border-bottom:none}
  .step-row.done{color:var(--color-text-primary)}
  .step-row.done .step-label{text-decoration:line-through;text-decoration-color:#C8CDD6}
  .step-row.current{color:var(--color-text-primary);font-weight:600}
  .step-row .step-next{margin-left:auto;font-size:11.5px;color:#2563EB;font-weight:600}
  .step-dot{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .step-dot.dot-done{background:#2563EB}
  .step-dot.dot-current{border:2px solid #2563EB}
  .step-dot.dot-current::after{content:'';width:8px;height:8px;background:#2563EB}
  .step-dot.dot-pending{border:1.5px solid #D8DADE}

  /* ── Milestone ── */
  .milestone-card{display:flex;align-items:center;gap:14px}
  .ms-icon{font-size:36px;flex-shrink:0;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .ms-bar-wrap{flex:1}
  .ms-bar-track{height:5px;background:var(--color-background-secondary);border-radius:3px;margin:6px 0}
  .ms-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#2563EB,#7B6FE8);transition:width 1s ease}

  /* ── Score breakdown ── */
  .pbar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .pbar-row span:first-child{width:140px;font-size:12px;color:var(--color-text-secondary);flex-shrink:0}
  .pbar-track{flex:1;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
  .pbar-fill{height:100%;border-radius:3px;transition:width 1s ease}
  .pbar-val{width:28px;text-align:right;font-size:12px;font-weight:600}
  .pbar-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0}
  .tag-live{background:#E9F7EE;color:#1C7C3F}
  .tag-ev{background:#EEF2FF;color:#3730A3}
  .tag-pend{background:var(--color-background-secondary);color:var(--color-text-tertiary)}

  /* ── Improvement loop ── */
  .improve-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);padding:12px;margin-bottom:8px}
  .improve-card .ic-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .improve-card .ic-title{font-size:12px;font-weight:500;color:var(--color-text-primary)}
  .improve-card .ic-score{font-size:12px;font-weight:600;padding:2px 7px;border-radius:10px}
  .ic-score-low{background:#FEF3C7;color:#92400E}
  .ic-score-med{background:#DBEAFE;color:#1E40AF}
  .ic-score-hi{background:#D1FAE5;color:#065F46}
  .improve-card .ic-tip{font-size:11px;color:var(--color-text-secondary);line-height:1.55}
  .improve-card .ic-cta{font-size:11px;font-weight:500;color:#2563EB;text-decoration:none;margin-top:6px;display:inline-block}

  /* ── Brand safety ── */
  .qrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
  .qrow:last-child{border-bottom:none}
  .qrow .opts{display:flex;gap:4px}
  .qrow button{font-size:10px;padding:4px 8px;border-radius:0;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;color:var(--color-text-secondary);font-family:inherit}
  .qrow button.sel{background:#2563EB;color:#fff;border-color:#2563EB}

  /* ── Evidence ── */
  .ev-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
  .ev-row:last-child{border-bottom:none}
  .ev-name{flex:1;color:var(--color-text-primary)}
  .ev-plat{color:var(--color-text-secondary);font-size:11px}
  .ev-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
  .st-verified{background:#D1FAE5;color:#065F46}
  .st-pending{background:#FEF3C7;color:#92400E}
  .st-review{background:#DBEAFE;color:#1E40AF}

  /* ── Empty states ── */
  .empty-state{text-align:center;padding:28px 16px}
  .empty-state .es-icon{font-size:32px;margin-bottom:10px;opacity:.5}
  .empty-state .es-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
  .empty-state .es-body{font-size:12px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:12px}
  .empty-state a{font-size:12px;font-weight:600;color:#2563EB;text-decoration:none}

  /* ── Tips grid ── */
  .tips-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .tip-card{padding:16px;border:0.5px solid var(--color-border-tertiary)}
  .tip-icon{width:26px;height:26px;background:#EBF1FE;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  .tip-icon svg{width:14px;height:14px;color:#2563EB}
  .tip-title{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:5px}
  .tip-text{font-size:11.5px;color:var(--color-text-secondary);line-height:1.5}
  @media(max-width:560px){ .tips-grid{grid-template-columns:1fr} }

  /* ── Verified badge ── */
  .verified-badge{font-size:10px;background:#E9F7EE;color:#1C7C3F;padding:3px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
  .verified-badge svg{flex-shrink:0}
  .founding-badge{font-size:10.5px;font-weight:600;background:linear-gradient(180deg,#FFFBF0,#FAEEDA);color:#8A5B0A;padding:4px 10px 4px 6px;border-radius:20px;border:0.5px solid #E8CE8F;display:inline-flex;align-items:center;gap:5px;width:fit-content}

  /* ── Mobile ── */
  @media(max-width:560px){
    .score-hero{grid-template-columns:1fr;text-align:center}
    .ring-wrap{margin:0 auto}
    .score-left{flex-direction:column;align-items:center}
    .score-left-info{align-items:center}
    .score-badges{justify-content:center}
    .score-meta{align-items:center}
    .g3{grid-template-columns:1fr 1fr}
    body{padding:12px}
  }
  /* Rate calculator slider -- flat unstyled range inputs look rudimentary
     by default, so this gives it a filled blue track (via the
     --rc-fill custom property, set in JS on every input) plus a
     matching blue thumb, cross-browser. */
  input[type="range"].rc-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(to right, #2563EB 0%, #2563EB var(--rc-fill, 43%), #E5E7EB var(--rc-fill, 43%), #E5E7EB 100%);
    outline: none;
    cursor: pointer;
    margin: 4px 0;
  }
  input[type="range"].rc-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #2563EB;
    border: 3px solid #fff;
    box-shadow: 0 1px 4px rgba(37,99,235,0.45), 0 0 0 1px rgba(37,99,235,0.15);
    cursor: pointer;
    margin-top: 0;
    transition: transform 0.1s;
  }
  input[type="range"].rc-slider::-webkit-slider-thumb:hover,
  input[type="range"].rc-slider::-webkit-slider-thumb:active {
    transform: scale(1.15);
  }
  input[type="range"].rc-slider::-moz-range-track {
    height: 6px;
    border-radius: 999px;
    background: #E5E7EB;
  }
  input[type="range"].rc-slider::-moz-range-progress {
    height: 6px;
    border-radius: 999px;
    background: #2563EB;
  }
  input[type="range"].rc-slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #2563EB;
    border: 3px solid #fff;
    box-shadow: 0 1px 4px rgba(37,99,235,0.45);
    cursor: pointer;
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const BADGE_SVG = {
  none:     `<svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="2" fill="#E5E7EB"/></svg>`,
  bronze:   `<svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="2" fill="#CD7F32"/></svg>`,

const BADGE_LABEL  = { none:'New creator', bronze:'Bronze', silver:'Silver', gold:'Gold', platinum:'Platinum' };
const BADGE_COLOR  = { none:'#8A909C', bronze:'#CD7F32', silver:'#A8A9AD', gold:'#D4AF37', platinum:'#2563EB' };
const FOUNDING_SEAL = `<svg width="16" height="16" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="9" fill="#C08A1E"/><circle cx="9" cy="9" r="7.4" fill="#F0B429"/><path d="M9 4.2l1.4 2.9 3.1.5-2.3 2.2.6 3.1L9 11.4l-2.8 1.5.6-3.1-2.3-2.2 3.1-.5L9 4.2z" fill="#fff"/></svg>`;
const MILESTONES   = [

  { tier:'silver',   label:'Silver Trust Badge',  threshold:5,  svg: `<svg width="20" height="20" viewBox="0 0 20 20"><rect width="20" height="20" rx="3" fill="#A8A9AD"/><path d="M6 10l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
  { tier:'gold',     label:'Gold Trust Badge',    threshold:10, svg: `<svg width="20" height="20" viewBox="0 0 20 20"><rect width="20" height="20" rx="3" fill="#D4AF37"/><path d="M6 10l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
  { tier:'platinum', label:'Platinum Badge',      threshold:20, svg: `<svg width="20" height="20" viewBox="0 0 20 20"><rect width="20" height="20" rx="3" fill="#2563EB"/><path d="M6 10l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
];
const ALL_COMPONENTS = [
  { key:'audience_authenticity', label:'Audience authenticity', advice:'Upload a screenshot of your audience demographics from your platform analytics.', href:'evidence.html' },
  { key:'engagement_quality_youtube', label:'Engagement quality (YouTube)', advice:'Connect your YouTube account so we can verify your engagement rate directly.', href:'profile.html' },
  { key:'brand_safety',          label:'Brand safety',          advice:'Complete the brand safety questionnaire below — sponsors filter heavily on this.', href:'#brand-safety' },

  { key:'professionalism',       label:'Professionalism',       advice:'Add a business email, location, and niche to your profile.', href:'profile.html' },

  {key:'family_safe', label:'Is your content generally family-safe?',  opts:['Yes','Mostly','No']},
  {key:'political',   label:'How often do you post political content?', opts:['None','Occasional','Frequent']},

let profile, creator, audienceData = {countries:[], genders:{}, ages:{}};
const AUD_GENDER_LABELS = [['female','Female'],['male','Male'],['other','Other']];
const AUD_AGE_BRACKETS = ['13-17','18-24','25-34','35-44','45-54','55-64','65+'];
let dash = {}; // holds all data computed in load(), read by tab renderers
let activeTab = 'overview';

const CREATOR_TABS = [
  ['overview', 'layout', 'Overview'],
  ['score', 'circle-check', 'Score'],
  ['profile', 'user-circle', 'Profile'],
  ['evidence', 'file-check', 'Inputs'],
  ['tools', 'bolt', 'Tools'],

function scoreColor(v){ return v>=80?'#1D9E75': v>=60?'#2563EB':'#E58C1A'; }

function copyProfileLink() {
  const url = `https://kitscore.co/p/${creator.slug || ''}`;
  navigator.clipboard.writeText(url).then(() => {
    const el = document.getElementById('profile-link-text');
    const original = el.textContent;
    el.textContent = 'Copied!';
    setTimeout(() => { el.textContent = original; }, 1500);
  });
}

// Sample trend used only for the free-tier locked preview -- never real data.
const SAMPLE_HISTORY_PREVIEW = [40, 44, 43, 51, 58, 55, 63, 68, 71, 74];

function renderScoreHistorySvg(scores, isSample){
  const w = 560, h = 120, pad = 8;
  const min = Math.min(...scores), max = Math.max(...scores);
  const range = (max - min) || 1;
  const stepX = scores.length > 1 ? (w - pad*2) / (scores.length - 1) : 0;
  const points = scores.map((s,i) => {
    const x = pad + i*stepX;
    const y = pad + (1 - (s - min)/range) * (h - pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const color = isSample ? '#C9CDD6' : '#2563EB';
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block">
      <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
}

function renderScoreHistory(history){
  const rows = history || [];
  if (rows.length < 2) {
    return `<div style="font-size:12px;color:var(--color-text-tertiary);padding:8px 0">Your score history starts now — check back once your score changes to see the trend.</div>`;
  }
  const scores = rows.map(r => Number(r.trust_score));
  const first = new Date(rows[0].recorded_at).toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  const last = new Date(rows[rows.length-1].recorded_at).toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  return `
    ${renderScoreHistorySvg(scores, false)}
    <div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--color-text-tertiary);margin-top:4px">
      <span>${first}</span><span>${last}</span>
    </div>`;
}

function renderRing(score){
  const r = 54, circ = 2*Math.PI*r;
  const pct = Math.min(score||0, 100)/100;
  const offset = circ*(1-pct);
  return `
    <div class="ring-wrap" id="ring-wrap">
      <svg viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="${r}"/>
        <circle class="ring-fill" cx="60" cy="60" r="${r}"
          stroke="${scoreColor(score)}"
          stroke-dasharray="${circ}"
          stroke-dashoffset="${circ}"
          id="ring-arc"/>
      </svg>
      <div class="ring-center">
        <div class="ring-num" id="ring-num">—</div>
        <div class="ring-label">trust score</div>
      </div>
    </div>`;
}

function animateRing(score){
  const r=54, circ=2*Math.PI*r;
  const offset = circ*(1-(Math.min(score||0,100)/100));
  const arc = document.getElementById('ring-arc');
  const num = document.getElementById('ring-num');
  if(!arc||!num) return;
  // Animate number count-up
  let start=0, duration=1200, startTime=null;
  function step(ts){
    if(!startTime) startTime=ts;
    const p=Math.min((ts-startTime)/duration,1);
    const ease=1-Math.pow(1-p,3);
    num.textContent=Math.round(ease*score);
    if(p<1) requestAnimationFrame(step);
    else num.textContent=score;
  }
  requestAnimationFrame(step);
  setTimeout(()=>{ arc.style.strokeDashoffset=offset; },50);
}

async function load() {
  profile = await requireRole('creator');
  if (!profile) return;
  renderSidebar('creator', 'dashboard');
  document.getElementById('whoami').textContent = `${profile.display_name} · ${profile.email||''}`;

  const [{ data:c },{ data:components },{ data:evidence },{ data:answers },{ data:campaigns },{ data:businessEmail },{ data:audience },{ data:history },{ data:platformConnections }] = await Promise.all([
    sb.from('creators').select('id,niche,location,trust_score,confidence,badge_tier,plan,reliability_score,repeat_sponsor_rate,would_hire_again_pct,founding_cohort,slug,bio,profile_views').eq('id', profile.id).single(),
    sb.from('score_components').select('*').eq('creator_id', profile.id).order('weight', {ascending:false}),
    sb.from('evidence_uploads').select('*').eq('creator_id', profile.id).order('uploaded_at',{ascending:false}),
    sb.from('brand_safety_answers').select('*').eq('creator_id', profile.id),
    sb.from('campaigns').select('*').eq('creator_id', profile.id).order('created_at',{ascending:false}),
    sb.rpc('fn_get_my_business_email'),
    sb.from('audience_demographics').select('dimension,label,pct').eq('creator_id', profile.id),
    sb.from('trust_score_history').select('trust_score,recorded_at').eq('creator_id', profile.id).order('recorded_at',{ascending:true}),
    // Token-free summary (handle, follower count, verification_method) --
    // never returns access_token/refresh_token, see
    // fn_creator_platform_summary in supabase/2026-07-09-platform-connections.sql.
    sb.rpc('fn_creator_platform_summary', { p_creator_id: profile.id }),
  ]);
  creator = { ...c, business_email: businessEmail };
  const audRows = audience || [];
  audienceData = {
    countries: audRows.filter(r=>r.dimension==='country').map(r=>({label:r.label, pct:r.pct})),
    genders: Object.fromEntries(audRows.filter(r=>r.dimension==='gender').map(r=>[r.label, r.pct])),
    ages: Object.fromEntries(audRows.filter(r=>r.dimension==='age').map(r=>[r.label, r.pct])),
  };

  const answerMap={};
  (answers||[]).forEach(a=>answerMap[a.question_key]=a.answer);
  const verifiedCount=(campaigns||[]).filter(x=>x.creator_confirmed&&x.sponsor_confirmed).length;
  const hasScore=(components||[]).length>0 && creator.trust_score>0;
  const score=parseInt(creator.trust_score)||0;
  const conf=parseInt(creator.confidence)||0;

  // Onboarding steps
  const steps=[
    {label:'Complete your profile (niche + location)', done:!!(creator.niche&&creator.location), why:'Sponsors filter by niche and location first — an empty profile won\'t show up in searches.'},
    {label:'Complete brand safety questionnaire',       done:(answers||[]).length>=QUESTIONS.length, why:'This feeds directly into your score and lets sponsors skip a manual vetting call.'},
    {label:'Upload evidence',                           done:(evidence||[]).length>=1, why:'Screenshots and deliverables from past campaigns back up what you claim — unverified claims score lower.'},
    {label:'Verify first campaign',                     done:verifiedCount>=1, why:'A campaign only counts once both you and the sponsor confirm it — this is the strongest signal in your score.'},
  ];
  const doneCount=steps.filter(s=>s.done).length;
  const pct=Math.round((doneCount/steps.length)*100);
  const currentStepIdx=steps.findIndex(s=>!s.done);

  // Next milestone
  const nextMs=MILESTONES.find(m=>verifiedCount<m.threshold);
  const prevMs=MILESTONES.filter(m=>verifiedCount>=m.threshold).pop();
  const msFrom=prevMs?prevMs.threshold:0;
  const msTo=nextMs?nextMs.threshold:MILESTONES[MILESTONES.length-1].threshold;
  const msPct=nextMs?Math.round(((verifiedCount-msFrom)/(msTo-msFrom))*100):100;

  // Component map
  const compMap={};
  (components||[]).forEach(c=>compMap[c.component_key]=c);

  // Improvement suggestions — sort lowest score first, cap at 3
  const improvements=ALL_COMPONENTS
    .filter(ac=>compMap[ac.key]&&compMap[ac.key].value<80)
    .sort((a,b)=>(compMap[a.key]?.value||0)-(compMap[b.key]?.value||0))
    .slice(0,3);

  // Only OAuth-verified connections count toward the free-tier cap as of
  // 2026-07-10 (see supabase/2026-07-10-scope-platform-cap-to-oauth.sql).
  // Self-reported evidence and handle-lookup (public_lookup) connections
  // are free/unlimited for everyone and excluded here.
  const usedPlatforms=[...new Set(
    (platformConnections||[]).filter(p=>p.verification_method==='oauth').map(p=>p.platform).filter(Boolean)
  )];
  const unlimitedPlatforms = creator.plan==='pro' || !!creator.founding_cohort;

  dash = { components, evidence, answers, answerMap, campaigns, history, verifiedCount, hasScore,
    score, conf, steps, doneCount, pct, currentStepIdx, nextMs, msPct, compMap, improvements,
    usedPlatforms, unlimitedPlatforms, platformConnections: platformConnections || [] };

  renderDashboardShell();

  // Animate ring + confidence bar after initial render
  requestAnimationFrame(()=>{
    animateRing(score);
    const cf=document.getElementById('conf-fill');
    if(cf) setTimeout(()=>cf.style.width=conf+'%',100);
  });
}

// In-app replacement for the old email evidence-freshness reminder (removed
// July 2026, see api/cron-evidence-nudges.js). Computed live from the
// evidence already loaded in load() -- same 90-day/75-day thresholds as
// freshnessBadge() in evidence.html -- so it's always current and doesn't
// depend on the weekly cron having run recently. Shown once at the top of
// the dashboard each time the creator logs in / lands here.
function staleEvidenceBannerHtml() {
  const items = dash.evidence || [];
  const now = Date.now();
  const dayMs = 1000 * 60 * 60 * 24;
  let expired = 0, expiringSoon = 0;
  items.forEach(e => {
    if (!e.uploaded_at) return;
    const days = Math.floor((now - new Date(e.uploaded_at).getTime()) / dayMs);
    if (days >= 90) expired++;
    else if (days >= 75) expiringSoon++;
  });
  if (expired === 0 && expiringSoon === 0) return '';

  const parts = [];
  if (expired) parts.push(`${expired} item${expired===1?'':'s'} expired`);
  if (expiringSoon) parts.push(`${expiringSoon} expiring soon`);

  return `
    <div class="card" style="display:flex;align-items:center;gap:10px;padding:12px 16px;margin-bottom:12px;background:#FFFBEB;border:1px solid #FDE68A">
      ${svgIcon('clock', {size:16, stroke:'#B45309'})}
      <div style="flex:1;font-size:12.5px;color:#92400E"><strong>Evidence needs a refresh</strong> — ${parts.join(', ')}. Fresh evidence keeps your score meaningful to sponsors.</div>
      <button onclick="switchTab('evidence')" style="background:#B45309;color:#fff;border:none;padding:6px 12px;font-size:11.5px;font-weight:600;font-family:var(--font-family-base);cursor:pointer;white-space:nowrap;border-radius:4px">Review evidence →</button>
    </div>`;
}

async function connectYoutube(){
  const input = document.getElementById('ytHandleInput');
  const btn = document.getElementById('ytConnectBtn');
  const msgEl = document.getElementById('ytConnectMsg');
  const handle = input.value.trim();
  if (!handle) { msgEl.textContent = 'Enter a @handle first.'; msgEl.style.color = '#DC2626'; return; }

  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = 'Connecting…';
  msgEl.textContent = '';

  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/connect-platform', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session?.access_token}`,
      },
      body: JSON.stringify({ handle }),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok) {
      msgEl.textContent = j.error || 'Could not connect that channel.';
      msgEl.style.color = '#DC2626';
      return;
    }
    msgEl.textContent = 'Connected.';
    msgEl.style.color = '#16A34A';
    await load();
    switchTab('evidence');
  } catch (err) {
    msgEl.textContent = 'Error: ' + err.message;
    msgEl.style.color = '#DC2626';
  } finally {
    btn.disabled = false;
    btn.textContent = originalLabel;
  }
}

async function connectYoutubeOauth(){
  const btn = document.getElementById('ytOauthBtn');
  const msgEl = document.getElementById('ytConnectMsg');
  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = 'Redirecting…';
  msgEl.textContent = '';

  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/youtube-oauth-callback?action=start', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session?.access_token}`,
      },
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok || !j.authorizeUrl) {
      msgEl.textContent = j.error || 'Could not start YouTube verification.';
      msgEl.style.color = '#DC2626';
      btn.disabled = false;
      btn.textContent = originalLabel;
      return;
    }
    // Full-page navigation to Google's consent screen -- it redirects back
    // to /api/youtube-oauth-callback, which then redirects here with
    // ?youtube_connected=1 or ?youtube_error=..., handled by
    // showYoutubeStatusFromQuery() on load below.
    window.location.href = j.authorizeUrl;
  } catch (err) {
    msgEl.textContent = 'Error: ' + err.message;
    msgEl.style.color = '#DC2626';
    btn.disabled = false;
    btn.textContent = originalLabel;
  }
}

  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = 'Redirecting…';
  msgEl.textContent = '';

  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/tiktok-oauth?action=start', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session?.access_token}`,
      },
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok || !j.authorizeUrl) {
      msgEl.textContent = j.error || 'Could not start TikTok connection.';
      msgEl.style.color = '#DC2626';
      btn.disabled = false;
      btn.textContent = originalLabel;
      return;
    }
    // Full-page navigation to TikTok's consent screen -- it redirects back
    // to /api/tiktok-oauth?action=callback, which then redirects here with
    // ?tiktok_connected=1 or ?tiktok_error=..., handled by
    // showTiktokStatusFromQuery() on load below.
    window.location.href = j.authorizeUrl;
  } catch (err) {
    msgEl.textContent = 'Error: ' + err.message;
    msgEl.style.color = '#DC2626';
    btn.disabled = false;
    btn.textContent = originalLabel;
  }
}

// Reads ?youtube_connected=1 / ?youtube_error=... left by the YouTube
// OAuth callback redirect, shows a one-time banner, then strips the
// params from the URL so a page refresh doesn't re-show it. Same shape as
// showTiktokStatusFromQuery() below.
function showYoutubeStatusFromQuery(){
  const params = new URLSearchParams(window.location.search);
  const connected = params.get('youtube_connected');
  const error = params.get('youtube_error');
  if (!connected && !error) return;

  const banner = document.getElementById('tiktokStatusBanner');
  if (banner) {
    const messages = {
      missing_params: 'YouTube verification was cancelled or incomplete.',
      invalid_state: 'That YouTube verification link expired or was already used — please try again.',
      platform_cap: 'Free plan is limited to one OAuth-verified platform. Upgrade to Pro for unlimited platforms.',
      save_failed: 'YouTube verified, but saving it failed — please try again.',
    };
    const text = connected
      ? 'YouTube channel verified.'
      : (messages[error] || `YouTube verification failed: ${error}`);
    const color = connected ? '#16A34A' : '#DC2626';
    banner.innerHTML = `<div style="font-size:12px;color:${color};padding:10px 12px;background:${connected?'#F0FDF4':'#FEF2F2'};border-radius:8px;margin-bottom:14px">${escapeHtml(text)}</div>`;
  }

  params.delete('youtube_connected');
  params.delete('youtube_error');
  const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
  window.history.replaceState({}, '', newUrl);
}

// ── Audience demographics: repeatable country rows ──────────────────────
function renderAudienceCountryRows() {
  const container = document.getElementById('audCountryRows');
  if (!container) return; // profile tab not currently mounted
  const rows = audienceData.countries.length ? audienceData.countries : [{label:'',pct:''}];
  container.innerHTML = rows.map((r,i)=>`
    <div class="audCountryRow" style="display:grid;grid-template-columns:1fr 90px 28px;gap:8px;margin-bottom:8px;align-items:center">
      <input class="audCountryLabel" value="${escapeHtml(r.label||'')}" placeholder="e.g. United Kingdom" oninput="updateAudienceTotals()" style="width:100%;padding:7px 10px;font-size:12px;border:0.5px solid var(--color-border-tertiary);border-radius:6px">
      <div style="position:relative">
        <input class="audCountryPct" type="number" min="0" max="100" value="${r.pct??''}" placeholder="0" oninput="updateAudienceTotals()" style="width:100%;padding:7px 22px 7px 10px;font-size:12px;border:0.5px solid var(--color-border-tertiary);border-radius:6px">
        <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--color-text-tertiary)">%</span>
      </div>
      <button type="button" onclick="removeAudienceCountryRow(${i})" title="Remove country" style="border:none;background:none;color:var(--color-text-tertiary);cursor:pointer;font-size:16px;line-height:1">×</button>
    </div>
  `).join('');
  updateAudienceTotals();
}

function readAudienceCountryRows() {
  return Array.from(document.querySelectorAll('#audCountryRows .audCountryRow')).map(row => ({
    label: row.querySelector('.audCountryLabel').value.trim(),
    pct: row.querySelector('.audCountryPct').value,
  }));
}

function addAudienceCountryRow() {
  audienceData.countries = readAudienceCountryRows();
  audienceData.countries.push({label:'', pct:''});
  renderAudienceCountryRows();
}

function removeAudienceCountryRow(i) {
  audienceData.countries = readAudienceCountryRows();
  audienceData.countries.splice(i, 1);
  renderAudienceCountryRows();
}

// Running totals per dimension -- flagged red if over 100%, but saving
// isn't blocked on an exact 100% since partial self-reported data (e.g.
// "I only know my top 2 countries") is still useful to show sponsors.
function updateAudienceTotals() {
  const sum = vals => vals.reduce((s,v) => s + (parseFloat(v) || 0), 0);
  const setTotal = (id, total) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = total ? `(${total}%)` : '';
    el.style.color = total > 100 ? '#B42318' : 'var(--color-text-tertiary)';
  };
  setTotal('audCountryTotal', sum(readAudienceCountryRows().map(r => r.pct)));
  setTotal('audGenderTotal', sum(Array.from(document.querySelectorAll('.audGenderInput')).map(i => i.value)));
  setTotal('audAgeTotal', sum(Array.from(document.querySelectorAll('.audAgeInput')).map(i => i.value)));
}

async function saveAudienceDemographics(){
  const msgEl = document.getElementById('audSaveMsg');
  const clampPct = v => Math.max(0, Math.min(100, parseInt(v, 10)));

  const countries = readAudienceCountryRows()
    .filter(r => r.label && r.pct !== '')
    .map(r => ({ dimension:'country', label:r.label, pct:clampPct(r.pct) }));

  const genders = Array.from(document.querySelectorAll('.audGenderInput'))
    .filter(i => i.value !== '')
    .map(i => ({ dimension:'gender', label:i.dataset.gender, pct:clampPct(i.value) }));

  const ages = Array.from(document.querySelectorAll('.audAgeInput'))
    .filter(i => i.value !== '')
    .map(i => ({ dimension:'age', label:i.dataset.age, pct:clampPct(i.value) }));

  const rows = [...countries, ...genders, ...ages]
    .map(r => ({ ...r, creator_id: profile.id, updated_at: new Date().toISOString() }));

  // Table has no natural "clear everything" upsert shape (rows come and
  // go as creators add/remove countries), so replace the full set:
  // delete everything for this creator, then insert what's currently in
  // the form. Both steps are covered by the creator's own RLS policies.
  const { error: delError } = await sb.from('audience_demographics').delete().eq('creator_id', profile.id);
  if (delError) { msgEl.style.color = '#B42318'; msgEl.textContent = 'Could not save: ' + delError.message; return; }

  if (rows.length) {
    const { error: insError } = await sb.from('audience_demographics').insert(rows);
    if (insError) { msgEl.style.color = '#B42318'; msgEl.textContent = 'Could not save: ' + insError.message; return; }
  }

  audienceData = {
    countries: countries.map(c => ({ label:c.label, pct:c.pct })),
    genders: Object.fromEntries(genders.map(g => [g.label, g.pct])),
    ages: Object.fromEntries(ages.map(a => [a.label, a.pct])),
  };
  renderAudienceCountryRows();
  msgEl.style.color = '#1C7C3F';
  msgEl.textContent = 'Saved';
  setTimeout(() => { msgEl.textContent = ''; }, 2500);
}

// 2026 sponsored-post rate benchmarks (USD, per single post), banded by
// follower tier. Instagram is the sourced baseline; TikTok and YouTube
// apply a platform multiplier on top. Niche multipliers are a second,
// independent adjustment.
//
// Source: InfluenceFlow's "Sponsored Post Rates 2026" guide for the
// tiered $ ranges and platform gap ("YouTube creators typically charge
// 2-3x more than Instagram... TikTok rates are 20-30% lower"), cross-
// checked against ClipReach's 2026 CPE benchmarks (niche multipliers --
// beauty/lifestyle sit at the low end of spend due to high creator
// supply; finance/health/B2B sit at the high end) and IQFluence's 2026
// engagement data (fashion/beauty engagement near the overall average,
// not a premium category). These are a starting anchor for negotiation,
// not a quote -- actual rates still move with engagement rate,
// exclusivity, and content type (video commands 30-50% more than a
// static post per the same source).
//
// Deliberately banded, not a smooth curve: the source data itself is
// tiered ($/post jumps between nano/micro/mid/macro), so interpolating
// a fake continuous line between bands would imply more precision than
// the underlying benchmarks actually support.
const RATE_TIERS_USD = [
  [0,        10000,    100,   500],
  [10000,    100000,   500,   5000],
  [100000,   1000000,  5000,  25000],
  [1000000,  Infinity, 25000, 60000], // mega-tier deals are individually negotiated well beyond this; treat as a floor, not a ceiling
];
const PLATFORM_RATE_MULT = { instagram: 1, tiktok: 0.75, youtube: 2.5 };
const NICHE_RATE_MULT = {
  finance: 1.4, health: 1.35, sustainability: 1.3, tech: 1.25,
  beauty: 0.9, fashion: 0.95, lifestyle: 0.9, fitness: 1.0,
};

function updateRcFill(slider) {
  const pct = (Number(slider.value) - Number(slider.min)) / (Number(slider.max) - Number(slider.min)) * 100;
  slider.style.setProperty('--rc-fill', pct + '%');
}

function rateTierFor(followers) {
  return RATE_TIERS_USD.find(([min, max]) => followers >= min && followers < max) || RATE_TIERS_USD[RATE_TIERS_USD.length - 1];
}

function rateForFollowers(followers, platform, niche) {
  const [, , rMin, rMax] = rateTierFor(followers);
  const platMult = PLATFORM_RATE_MULT[platform] || 1;
  const nicheMult = NICHE_RATE_MULT[(niche || '').toLowerCase()] || 1;
  return {
    min: Math.round(rMin * platMult * nicheMult / 5) * 5,
    max: Math.round(rMax * platMult * nicheMult / 5) * 5,
  };
}

// USD -> GBP at a rough, static 0.77 (Kitscore's home-market display
// currency); not live FX, same approximation the old flat-multiplier
// version used.
const USD_TO_GBP = 0.77;

function detectCurrency() {
  try {
    const locale = navigator.language || (navigator.languages && navigator.languages[0]) || 'en-GB';
    const region = new Intl.Locale(locale).maximize().region;
    return region === 'US' ? 'USD' : 'GBP'; // defaults to GBP (Kitscore's home market) for everyone else
  } catch (e) {
    return /-us$/i.test(navigator.language || '') ? 'USD' : 'GBP';
  }
}

// The follower slider spans 500 to 2,000,000 -- a >4000x range, which
// renders unusably on a linear scale (a typical 18K-follower creator's
// thumb would sit almost exactly at the left edge on a 0-2,000,000 bar,
// making the slider look empty/broken). Standard fix for sliders spanning
// multiple orders of magnitude: the slider's own value is a 0-1000
// logarithmic position, converted to/from real follower counts here.
const RC_LOG_MIN = Math.log10(500);
const RC_LOG_MAX = Math.log10(2000000);
function sliderToFollowers(v) {
  return Math.round(Math.pow(10, RC_LOG_MIN + (Number(v) / 1000) * (RC_LOG_MAX - RC_LOG_MIN)));
}
function followersToSlider(f) {
  return Math.round(1000 * (Math.log10(Math.max(Number(f), 500)) - RC_LOG_MIN) / (RC_LOG_MAX - RC_LOG_MIN));
}

// Connected platforms with a real follower_count, sorted highest first --
// this is what pre-fills the calculator and drives the platform picker.
// Falls back to an empty array (manual/self-estimate mode) if nothing's
// connected yet.
function rateCalcSources() {
  return (dash.platformConnections || [])
    .filter(p => p.follower_count != null && p.follower_count > 0)
    .sort((a, b) => b.follower_count - a.follower_count);
}

function updateRateCalc(followers) {
  followers = Number(followers);
  document.getElementById('rc-followers-val').textContent = followers.toLocaleString();
  const code = document.getElementById('rc-currency').value;
  const platformSel = document.getElementById('rc-platform');
  const platform = platformSel ? platformSel.value : 'instagram';
  const { min: rMin, max: rMax } = rateForFollowers(followers, platform, creator.niche);
  const symbol = code === 'GBP' ? '£' : '$';
  const conv = code === 'GBP' ? USD_TO_GBP : 1;
  const min = Math.round(rMin * conv / 5) * 5;
  const max = Math.round(rMax * conv / 5) * 5;
  document.getElementById('rc-range').textContent = `${symbol}${min.toLocaleString()}–${symbol}${max.toLocaleString()}`;
}

function onRateCalcPlatformChange() {
  const sources = rateCalcSources();
  const sel = document.getElementById('rc-platform');
  const match = sources.find(s => s.platform === sel.value);
  const slider = document.getElementById('rc-followers');
  if (match) {
    slider.value = followersToSlider(match.follower_count);
    updateRcFill(slider);
    updateRateCalc(match.follower_count);
  } else {
    updateRateCalc(sliderToFollowers(slider.value));
  }
}

function initRateCalc() {
  document.getElementById('rc-currency').value = detectCurrency();
  const sources = rateCalcSources();
  const slider = document.getElementById('rc-followers');
  const note = document.getElementById('rc-source-note');
  if (sources.length) {
    slider.value = followersToSlider(sources[0].follower_count);
    updateRcFill(slider);
    if (note) {
      const niche = creator.niche ? ` · ${escapeHtml(creator.niche)} niche` : '';
      note.innerHTML = `Personalized from your verified ${escapeHtml(sources[0].platform)} followers${niche}. ${sources.length > 1 ? 'Switch platform above.' : ''}`;
    }
    updateRateCalc(sources[0].follower_count);
  } else {
    if (note) {
      note.innerHTML = `Connect a platform (Inputs tab) for a personalized range — this is a general estimate${creator.niche ? ` for the ${escapeHtml(creator.niche)} niche` : ''} until then.`;
    }
    updateRateCalc(sliderToFollowers(slider.value));
  }
}

  await sb.auth.signOut();

}

load().then(() => { showYoutubeStatusFromQuery(); showTiktokStatusFromQuery(); initRateCalc(); });
