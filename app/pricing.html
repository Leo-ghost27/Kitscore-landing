<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing — Kitscore</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  body{padding:0;background:var(--canvas)}
  .app-main{max-width:1180px;padding:40px 48px 80px}
  .back{font-size:13.5px;color:var(--blue);cursor:pointer;background:none;border:none;margin-bottom:20px;display:inline-block;font-weight:500}
  .g2{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .plan{background:#fff;border:1px solid var(--line);box-shadow:0 1px 2px rgba(16,21,31,.03);padding:28px 24px;position:relative}
  .plan.featured{border:2px solid var(--blue);box-shadow:0 12px 32px -10px rgba(47,95,224,.25)}
  .plan.featured::before{content:"MOST POPULAR";position:absolute;top:-1px;right:-1px;background:var(--blue);color:#fff;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.05em;padding:5px 11px}
  .plan h3{font-size:15px;font-weight:600;margin-bottom:10px;color:var(--ink)}
  .plan .price{font-family:var(--font-mono);font-size:30px;font-weight:600;margin-bottom:4px;color:var(--ink)}
  .plan .price span{font-size:13px;font-weight:500;color:var(--ink-soft)}
  .plan ul{list-style:none;font-size:13px;color:#333B4D;margin-bottom:22px;display:flex;flex-direction:column;gap:6px}
  .plan ul li::before{content:"✓";color:var(--blue);font-weight:700;margin-right:8px}
  .plan button{width:100%;padding:11px;border:1px solid var(--navy);border-radius:0;font-size:13.5px;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn-outline{background:#fff;border:1px solid var(--navy)!important;color:var(--navy)}
  .banner{font-size:13.5px;padding:12px 16px;border-radius:0;margin-bottom:16px;background:var(--green-soft);color:#137C52}
  .current-plan-banner{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border:1px solid var(--line);margin-bottom:22px;background:#FAFBFD}
  .current-plan-banner .label{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .current-plan-banner .value{font-size:16px;font-weight:600;text-transform:capitalize;color:var(--ink)}
  .plan.is-current{border-color:var(--green)}
  .plan.is-current h3::after{content:'Current plan';font-size:11px;font-weight:600;color:#137C52;background:var(--green-soft);padding:4px 10px;margin-left:8px;vertical-align:middle}
  .btn-current{background:#F1F3F7!important;color:var(--ink-soft)!important;border-color:var(--line)!important;cursor:default!important}
  @media(max-width:900px){
    .g2{grid-template-columns:1fr !important}
    button{min-height:44px;font-size:15px}
    input,select{font-size:16px} /* prevent iOS zoom */
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <button class="back" onclick="window.location.href='directory.html'">&larr; Back to directory</button>
    <div id="banner"></div>
    <div id="currentPlanBanner"></div>
    <div id="plansWrap" class="g2" style="grid-template-columns:1fr 1fr 1fr">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
(async () => {
  const profile = await requireRole('sponsor');
  if (!profile) return;
  renderSidebar('sponsor', 'pricing');

  const params = new URLSearchParams(window.location.search);
  if (params.get('checkout') === 'success') {
    const product = params.get('product') || '';
    document.getElementById('banner').innerHTML = '<div class="banner">Subscription started — thank you! Redirecting you now…</div>';
    setTimeout(() => {
      if (product === 'team') window.location.href = 'team.html?checkout=success';
      else if (product === 'starter') window.location.href = 'directory.html';
      else if (product === 'creator_pro') window.location.href = 'dashboard.html';
    }, 1500);
  }

  const { data: sponsor } = await sb.from('sponsors').select('plan').eq('id', profile.id).single();
  const plan = sponsor?.plan || 'free';
  const planLabel = { free: 'Free', starter: 'Starter', team: 'Team', pro: 'Pro (Legacy)' }[plan] || plan;

  const manageBtn = plan !== 'free'
    ? '<button onclick="manageSubscription()" style="font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:500">Manage subscription \u2192</button>'
    : '';
  document.getElementById('currentPlanBanner').innerHTML =
    '<div class="current-plan-banner"><div><div class="label">Current plan</div><div class="value">' + planLabel + '</div></div>' + manageBtn + '</div>';

  const cardBtn = (tier, label, onclick) => {
    if (plan === tier) return `<button class="btn-current" disabled>Current plan</button>`;
    return `<button class="${tier === 'starter' ? 'btn-primary' : 'btn-outline'}" onclick="${onclick}">${label}</button>`;
  };

  document.getElementById('plansWrap').innerHTML = `
    <div class="plan ${plan==='free' || plan==='pro' ? 'is-current' : ''}">
      <h3>Pay per report</h3>
      <div class="price">$29<span>/report</span></div>
      <ul><li>Full creator evaluation</li><li>Recommendation + risk assessment</li><li>No subscription required</li></ul>
      <button class="btn-outline" onclick="window.location.href='directory.html'">Browse directory</button>
    </div>
    <div class="plan featured ${plan==='starter' ? 'is-current' : ''}">
      <h3>Starter</h3>
      <div class="price">$99<span>/mo</span></div>
      <ul><li>25 evaluations/mo</li><li>Saved evaluations &amp; history</li><li>Creator watchlists</li><li>Comparison tools</li></ul>
      ${cardBtn('starter', 'Start Starter', "subscribe('starter')")}
    </div>
    <div class="plan ${plan==='team' ? 'is-current' : ''}">
      <h3>Team</h3>
      <div class="price">$299<span>/mo</span></div>
      <ul><li>150 evaluations/mo</li><li>Team collaboration &amp; shared notes</li><li>Creator monitoring</li><li>Internal approval workflows</li></ul>
      ${cardBtn('team', 'Start Team', "subscribe('team')")}
    </div>
  `;
})();

async function manageSubscription() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/create-portal-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
    });
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch { alert('Server error (status ' + res.status + '): ' + text.slice(0, 200)); return; }
    if (!res.ok) { alert('Could not open billing portal: ' + (json.error || 'unknown error')); return; }
    window.location.href = json.url;
  } catch (err) {
    alert('Portal request failed: ' + err.message);
  }
}

async function subscribe(product) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/create-checkout-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
      body: JSON.stringify({ product }),
    });
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch { alert('Server did not return JSON (status ' + res.status + '):\n' + text.slice(0, 300)); return; }
    if (!res.ok) { alert('Could not start checkout: ' + (json.error || 'unknown error')); return; }
    window.location.href = json.url;
  } catch (err) {
    alert('Checkout request failed: ' + err.message);
  }
}
</script>
</body>
</html>
