<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing — Kitscore</title>
<link rel="stylesheet" href="shared.css">
<style>
  body{padding:20px;max-width:600px;margin:0 auto}
  .back{font-size:11px;color:#2563EB;cursor:pointer;background:none;border:none;margin-bottom:16px;display:inline-block}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .plan{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:16px}
  .plan.featured{border:2px solid #2563EB}
  .plan h3{font-size:13px;font-weight:500;margin-bottom:4px}
  .plan .price{font-size:22px;font-weight:500;margin-bottom:10px}
  .plan .price span{font-size:11px;font-weight:400;color:var(--color-text-secondary)}
  .plan ul{list-style:none;font-size:11px;color:var(--color-text-secondary);margin-bottom:12px;display:flex;flex-direction:column;gap:5px}
  .plan button{width:100%;padding:9px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer}
  .btn-primary{background:#2563EB;color:#fff}
  .btn-outline{background:#fff;border:0.5px solid var(--color-border-tertiary)!important;color:var(--color-text-primary)}
  .banner{font-size:11px;padding:8px 12px;border-radius:6px;margin-bottom:14px;background:#E9F7EE;color:#1C7C3F}
  .current-plan-banner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:14px;background:var(--color-background-secondary)}
  .current-plan-banner .label{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
  .current-plan-banner .value{font-size:15px;font-weight:500;text-transform:capitalize}
  .plan.is-current{border-color:#1C7C3F}
  .plan.is-current h3::after{content:'Current plan';font-size:9px;font-weight:500;color:#1C7C3F;background:#E9F7EE;padding:2px 6px;border-radius:8px;margin-left:6px;vertical-align:middle}
  .btn-current{background:var(--color-background-secondary)!important;color:var(--color-text-secondary)!important;cursor:default!important}
  @media(max-width:600px){
    body{padding:12px}
    .g2,.g3{grid-template-columns:1fr !important}
    .card{padding:16px}
    button{min-height:44px;font-size:15px}
    input,select{font-size:16px} /* prevent iOS zoom */
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <button class="back" onclick="window.location.href='directory.html'">&larr; Back to directory</button>
    <div id="banner"></div>
    <div id="currentPlanBanner"></div>
    <div id="plansWrap" class="g2" style="grid-template-columns:1fr 1fr 1fr">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="nav.js"></script>
<script>
(async () => {
  const profile = await requireRole('sponsor');
  if (!profile) return;
  renderSidebar('sponsor', 'pricing');

  const params = new URLSearchParams(window.location.search);
  if (params.get('checkout') === 'success') {
    document.getElementById('banner').innerHTML = '<div class="banner">Subscription started — thank you! It may take a few seconds to reflect.</div>';
  }

  const { data: sponsor } = await sb.from('sponsors').select('plan').eq('id', profile.id).single();
  const plan = sponsor?.plan || 'free';
  const planLabel = { free: 'Free', starter: 'Starter', team: 'Team' }[plan] || plan;

  const manageBtn = plan !== 'free'
    ? '<button onclick="manageSubscription()" style="font-size:11px;color:#185FA5;background:none;border:none;cursor:pointer;font-weight:500">Manage subscription \u2192</button>'
    : '';
  document.getElementById('currentPlanBanner').innerHTML =
    '<div class="current-plan-banner"><div><div class="label">Current plan</div><div class="value">' + planLabel + '</div></div>' + manageBtn + '</div>';

  const cardBtn = (tier, label, onclick) => {
    if (plan === tier) return `<button class="btn-current" disabled>Current plan</button>`;
    return `<button class="${tier === 'starter' ? 'btn-primary' : 'btn-outline'}" onclick="${onclick}">${label}</button>`;
  };

  document.getElementById('plansWrap').innerHTML = `
    <div class="plan ${plan==='free' ? 'is-current' : ''}">
      <h3>Pay per report</h3>
      <div class="price">$29<span>/report</span></div>
      <ul><li>Full creator evaluation</li><li>✓ Recommendation + risk assessment</li><li>✓ No subscription required</li></ul>
      <button class="btn-outline" onclick="window.location.href='directory.html'">Browse directory</button>
    </div>
    <div class="plan featured ${plan==='starter' ? 'is-current' : ''}">
      <h3>Starter</h3>
      <div class="price">$99<span>/mo</span></div>
      <ul><li>25 evaluations/mo</li><li>✓ Saved evaluations &amp; history</li><li>✓ Creator watchlists</li><li>✓ Comparison tools</li></ul>
      ${cardBtn('starter', 'Start Starter', "subscribe('starter')")}
    </div>
    <div class="plan ${plan==='team' ? 'is-current' : ''}">
      <h3>Team</h3>
      <div class="price">$299<span>/mo</span></div>
      <ul><li>150 evaluations/mo</li><li>✓ Team collaboration &amp; shared notes</li><li>✓ Creator monitoring</li><li>✓ Internal approval workflows</li></ul>
      ${cardBtn('team', 'Start Team', "subscribe('team')")}
    </div>
  `;
})();

async function manageSubscription() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/create-portal-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
    });
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch { alert('Server error (status ' + res.status + '): ' + text.slice(0, 200)); return; }
    if (!res.ok) { alert('Could not open billing portal: ' + (json.error || 'unknown error')); return; }
    window.location.href = json.url;
  } catch (err) {
    alert('Portal request failed: ' + err.message);
  }
}

async function subscribe(product) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/create-checkout-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
      body: JSON.stringify({ product }),
    });
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch { alert('Server did not return JSON (status ' + res.status + '):\n' + text.slice(0, 300)); return; }
    if (!res.ok) { alert('Could not start checkout: ' + (json.error || 'unknown error')); return; }
    window.location.href = json.url;
  } catch (err) {
    alert('Checkout request failed: ' + err.message);
  }
}
</script>
</body>
</html>
