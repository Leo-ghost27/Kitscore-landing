<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitscore profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/app/shared.css?v=2">
<style>
  body{background:var(--color-background-tertiary);min-height:100vh;padding:40px 20px}
  .wrap{max-width:480px;margin:0 auto}
  .kitscore-logo{font-size:15px;font-weight:700;color:var(--ink,#0F1B2E);margin-bottom:22px;text-align:center}
  .kitscore-logo span{color:#2563EB}
  .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:28px;text-align:center}
  .name{font-size:19px;font-weight:700;color:var(--ink,#0F1B2E);margin-bottom:2px}
  .meta{font-size:12.5px;color:var(--color-text-secondary);margin-bottom:18px}
  .ring-wrap{margin:0 auto 14px}
  .ring-num{font-size:34px;font-weight:700;color:var(--ink,#0F1B2E)}
  .ring-label{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-top:2px}
  .badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .badge-pill{font-size:11px;font-weight:600;background:var(--color-background-secondary);color:var(--color-text-secondary);padding:5px 12px;border-radius:20px}
  .founding-badge{font-size:10.5px;font-weight:600;background:linear-gradient(180deg,#FFFBF0,#FAEEDA);color:#8A5B0A;padding:5px 12px;border-radius:20px;border:0.5px solid #E8CE8F}
  .stat-row{display:flex;border-top:0.5px solid var(--color-border-tertiary);padding-top:16px}
  .stat{flex:1}
  .stat-num{font-size:18px;font-weight:700;color:var(--ink,#0F1B2E)}
  .stat-label{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
  .cta{display:block;margin-top:22px;padding:11px;background:#2563EB;color:#fff;text-decoration:none;border-radius:var(--border-radius-sm);font-size:13px;font-weight:600}
  .footer-note{text-align:center;font-size:11px;color:var(--color-text-tertiary);margin-top:16px}
  .loading, .notfound{text-align:center;padding:40px 20px;color:var(--color-text-secondary);font-size:13px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="kitscore-logo">Kit<span>score</span></div>
    <div id="content" class="loading">Loading profile…</div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/app/supabase-client.js?v=2"></script>
<script>
function ringSvg(score) {
  const r = 50, circ = 2*Math.PI*r;
  const pct = Math.min(score||0, 100)/100;
  const offset = circ*(1-pct);
  const color = score >= 70 ? '#1D9E75' : score >= 40 ? '#E58C1A' : '#B42318';
  return `
    <div class="ring-wrap" style="position:relative;width:120px;height:120px">
      <svg viewBox="0 0 120 120" style="width:120px;height:120px;transform:rotate(-90deg)">
        <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--color-border-tertiary,#E5E7EB)" stroke-width="9"/>
        <circle cx="60" cy="60" r="${r}" fill="none" stroke="${color}" stroke-width="9"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div class="ring-num">${score}</div>
        <div class="ring-label">trust score</div>
      </div>
    </div>`;
}

async function init() {
  const slug = window.location.pathname.split('/').filter(Boolean).pop();
  const { data, error } = await sb.rpc('fn_get_public_profile', { p_slug: slug });
  const profile = data && data[0];

  if (error || !profile) {
    document.getElementById('content').innerHTML = `<div class="notfound">This Kitscore profile doesn't exist or isn't public.</div>`;
    return;
  }

  const badgeLabels = { none:'New creator', bronze:'Bronze', silver:'Silver', gold:'Gold', platinum:'Platinum' };

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="name">${escapeHtml(profile.display_name)}</div>
      <div class="meta">${[profile.niche, profile.location].filter(Boolean).map(escapeHtml).join(' · ')}</div>
      ${ringSvg(Number(profile.trust_score) || 0)}
      <div class="badges">
        <span class="badge-pill">${escapeHtml(badgeLabels[profile.badge_tier] || 'New creator')}</span>
        ${profile.founding_cohort ? `<span class="founding-badge">★ Founding Creator</span>` : ''}
      </div>
      <div class="stat-row">
        <div class="stat"><div class="stat-num">${profile.verified_campaign_count}</div><div class="stat-label">verified campaigns</div></div>
        <div class="stat"><div class="stat-num">${Math.round(Number(profile.confidence)||0)}%</div><div class="stat-label">confidence</div></div>
      </div>
      <a href="/for-creators.html" class="cta">Get your own Kitscore →</a>
    </div>
    <div class="footer-note">Verified with mutually confirmed campaign evidence, not follower count. · kitscore.co</div>
  `;
}

init();
</script>
</body>
</html>
