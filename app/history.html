<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluation History — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  body{background:var(--canvas)}
  .app-main{max-width:1180px;padding:40px 48px 80px}
  .ptitle{font-size:24px;font-weight:700;letter-spacing:-.01em;color:var(--ink);margin-bottom:6px}
  .psub{font-size:14px;color:var(--ink-soft);margin-bottom:18px}
  .card{background:#fff;border:1px solid var(--line);box-shadow:0 1px 2px rgba(16,21,31,.03)}
  .row-item{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-top:1px solid var(--line);font-size:13px}
  .row-item:first-child{border-top:none}
  .verdict-badge{font-size:11.5px;font-weight:600;padding:4px 10px;text-transform:capitalize}
  .v-approve{background:var(--green-soft);color:#137C52}
  .v-caution{background:var(--gold-soft);color:#8C6C3B}
  .v-avoid{background:#FDECEC;color:#B42318}
  .lock-badge{font-size:11px;font-weight:600;background:#F1F3F7;color:var(--ink-soft);padding:4px 10px}
  .empty-tip{font-size:13.5px;color:var(--ink-soft);text-align:center;padding:56px 40px}
  .empty-tip a{color:var(--blue);text-decoration:none;font-weight:600}
  .upgrade-tip{font-size:13.5px;padding:14px 20px;background:var(--blue-soft);color:#1F3E9E;border:1px solid var(--blue-line);margin-bottom:22px;display:flex;align-items:center;gap:8px}
  .loading{font-size:13px;color:var(--ink-soft);padding:40px;text-align:center}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="ptitle">Evaluation history</div>
    <div class="psub" id="psub">All creator evaluations you've run.</div>
    <div id="upgradeTip"></div>
    <div id="content" class="loading">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
async function load() {
  const profile = await requireRole('sponsor');
  if (!profile) return;
  renderSidebar('sponsor', 'history');

  const { data: sponsor } = await sb.from('sponsors').select('plan').eq('id', profile.id).single();
  const plan = sponsor?.plan || 'free';

  if (plan === 'free') {
    document.getElementById('upgradeTip').innerHTML = `
      <div class="upgrade-tip">
        <i class="ti ti-lock-open"></i>
        You're on the Free plan — only your most recent evaluation per creator is shown.
        <a href="pricing.html" style="color:inherit;font-weight:500;margin-left:4px">Upgrade to Starter →</a>
      </div>`;
  }

  const { data: evals, error } = await sb.from('evaluations')
    .select('*, creators(trust_score, niche, profiles!inner(display_name))')
    .eq('sponsor_id', profile.id)
    .order('created_at', { ascending: false });
  if (error) { document.getElementById('content').textContent = 'Could not load: ' + error.message; return; }

  if (!evals || evals.length === 0) {
    document.getElementById('content').innerHTML = `<div class="empty-tip">No evaluations yet. <a href="directory.html">Browse the directory to evaluate a creator →</a></div>`;
    return;
  }

  document.getElementById('content').innerHTML = `
    <div class="card">
      ${evals.map(e => `
        <div class="row-item">
          <div>
            <div style="font-weight:600;color:var(--ink);font-size:14px">${escapeHtml(e.creators?.profiles?.display_name || '—')}</div>
            <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-top:2px">${new Date(e.created_at).toLocaleDateString('en-GB')} · TRUST SCORE ${e.creators?.trust_score ?? '—'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            ${e.recommendation_verdict ? `<span class="verdict-badge v-${e.recommendation_verdict}">${e.recommendation_verdict}</span>` : ''}
            ${e.unlocked ? `<span class="verdict-badge" style="background:var(--blue-soft);color:var(--blue)">Unlocked</span>` : `<span class="lock-badge">Locked</span>`}
            <a href="evaluate.html?creator=${e.creator_id}" style="font-size:12.5px;color:var(--blue);font-weight:600;text-decoration:none">View →</a>
          </div>
        </div>
      `).join('')}
    </div>`;
}

load();
</script>
</body>
</html>
