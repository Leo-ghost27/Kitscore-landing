<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Kitscore</title>
<link rel="stylesheet" href="shared.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--color-background-tertiary)}
  .auth-card{width:340px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:24px}
  .auth-card h1{font-size:18px;font-weight:500;margin-bottom:4px}
  .auth-card p{font-size:12px;color:var(--color-text-secondary);margin-bottom:16px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
  .field input,.field select{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);font-size:13px}
  .tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--color-background-secondary);border-radius:var(--border-radius-sm);padding:3px}
  .tabs button{flex:1;padding:6px;border:none;background:transparent;border-radius:6px;font-size:12px;cursor:pointer;color:var(--color-text-secondary)}
  .tabs button.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500}
  .submit{width:100%;padding:9px;background:#2563EB;color:#fff;border:none;border-radius:var(--border-radius-sm);font-size:13px;font-weight:500;cursor:pointer;margin-top:4px}
  .submit:disabled{opacity:.6;cursor:default}
  .msg{font-size:11px;margin-top:10px;padding:8px;border-radius:var(--border-radius-sm)}
  .msg.error{background:#FDECEC;color:#B42318}
  .msg.ok{background:#E9F7EE;color:#1C7C3F}
</style>
</head>
<body>
  <div class="auth-card">
    <h1>Kitscore</h1>
    <p id="modeSub">Sign in to your account</p>
    <div class="tabs">
      <button id="tabLogin" class="active" onclick="setMode('login')">Sign in</button>
      <button id="tabSignup" onclick="setMode('signup')">Create account</button>
    </div>
    <div id="signupOnly" style="display:none">
      <div class="field"><label>I am a</label>
        <select id="role"><option value="creator">Creator</option><option value="sponsor">Sponsor</option></select>
      </div>
      <div class="field"><label>Name / Company</label><input id="displayName" placeholder="Aaliya Ahmed"></div>
    </div>
    <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••"></div>
    <button class="submit" id="submitBtn" onclick="submitForm()">Sign in</button>
    <div id="msg"></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
let mode = 'login';
function setMode(m) {
  mode = m;
  document.getElementById('tabLogin').classList.toggle('active', m==='login');
  document.getElementById('tabSignup').classList.toggle('active', m==='signup');
  document.getElementById('signupOnly').style.display = m==='signup' ? 'block' : 'none';
  document.getElementById('modeSub').textContent = m==='login' ? 'Sign in to your account' : 'Set up your Kitscore account';
  document.getElementById('submitBtn').textContent = m==='login' ? 'Sign in' : 'Create account';
  document.getElementById('msg').innerHTML = '';
}

function showMsg(text, type) {
  document.getElementById('msg').innerHTML = `<div class="msg ${type}">${text}</div>`;
}

async function submitForm() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  if (!email || !password) { showMsg('Email and password are required.', 'error'); return; }
  btn.disabled = true;

  if (mode === 'login') {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showMsg(error.message, 'error'); btn.disabled = false; return; }
    await routeToDashboard();
    return;
  }

  // Signup
  const role = document.getElementById('role').value;
  const displayName = document.getElementById('displayName').value.trim();
  if (!displayName) { showMsg('Name / company is required.', 'error'); btn.disabled = false; return; }

  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) { showMsg(error.message, 'error'); btn.disabled = false; return; }
  if (!data.user) {
    showMsg('Check your email to confirm your account, then sign in.', 'ok');
    btn.disabled = false;
    return;
  }

  // Create the profile row, then the role-specific row
  const { data: profile, error: profileErr } = await sb.from('profiles')
    .insert({ auth_user_id: data.user.id, role, display_name: displayName, email })
    .select().single();
  if (profileErr) { showMsg('Account created but profile setup failed: ' + profileErr.message, 'error'); btn.disabled = false; return; }

  if (role === 'creator') {
    await sb.from('creators').insert({ id: profile.id });
  } else {
    await sb.from('sponsors').insert({ id: profile.id, company_name: displayName });
  }
  await routeToDashboard();
}

async function routeToDashboard() {
  const profile = await getCurrentProfile();
  if (!profile) { showMsg('Signed in, but no profile found.', 'error'); return; }
  window.location.href = profile.role === 'creator' ? 'dashboard.html' : 'directory.html';
}

// If already signed in, skip straight to the right dashboard
(async () => {
  const profile = await getCurrentProfile();
  if (profile) await routeToDashboard();
})();
</script>
</body>
</html>
