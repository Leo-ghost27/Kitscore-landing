<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluation — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  body{padding:0;max-width:none;margin:0}
  .back{font-size:11px;color:#2563EB;cursor:pointer;background:none;border:none;margin-bottom:10px;display:inline-block}
  .verdict-banner{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .badge{font-size:13px;padding:5px 12px;border-radius:14px;font-weight:500}
  .b-green{background:#E9F7EE;color:#1C7C3F}
  .b-blue{background:var(--color-background-info);color:#185FA5}
  .b-amber{background:#FEF6E7;color:#92600A}
  .b-red{background:#FDECEC;color:#B42318}
  .card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:14px;margin-bottom:12px}
  .sec{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px}
  .loading{font-size:12px;color:var(--color-text-secondary);padding:20px;text-align:center}
  .cta{padding:9px 16px;background:#2563EB;color:#fff;border:none;border-radius:0;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  /* Teaser paywall styles */
  .teaser-hero{background:linear-gradient(160deg,#11131A 0%,#1C2030 100%);color:#fff;border-radius:var(--border-radius-md);padding:20px;margin-bottom:12px}
  .teaser-hero .score-val{font-size:52px;font-weight:600;color:#7C9CFF;line-height:1}
  .teaser-hero .score-label{font-size:11px;color:#9DB6FF;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .teaser-hero .conf-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(124,156,255,.15);color:#9DB6FF;font-size:11px;padding:4px 10px;border-radius:10px;margin-top:8px}
  .paywall-box{border:1.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:20px;text-align:center;margin-bottom:12px;background:var(--color-background-secondary)}
  .paywall-box h3{font-size:15px;font-weight:500;margin-bottom:6px}
  .paywall-box p{font-size:12px;color:var(--color-text-secondary);margin-bottom:14px;line-height:1.6}
  .paywall-features{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;text-align:left;max-width:300px;margin-left:auto;margin-right:auto}
  .paywall-features li{font-size:12px;color:var(--color-text-secondary);list-style:none;display:flex;align-items:center;gap:6px}
  .blur-preview{filter:blur(4px);user-select:none;pointer-events:none;opacity:.6;margin-bottom:12px}
  .banner{font-size:11px;padding:8px 12px;border-radius:0;margin-bottom:12px}
  .banner.ok{background:#E9F7EE;color:#1C7C3F}
  .banner.pending{background:#FEF6E7;color:#92600A}
  .approval-badge{font-size:10px;padding:3px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <button class="back" onclick="window.location.href='directory.html'">&larr; Back to directory</button>
    <div id="banner"></div>
    <div id="content" class="loading">Loading evaluation…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
const VERDICT_STYLE = {
  approve: ['b-green','ti-circle-check','Approve'],
  caution: ['b-amber','ti-alert-triangle','Caution'],
  avoid: ['b-red','ti-circle-x','Avoid']
};
let creatorId, profile, currentEvalId;

async function authedFetch(url, body) {
  const { data: { session } } = await sb.auth.getSession();
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  try { return { ok: res.ok, json: JSON.parse(text) }; }
  catch { return { ok: false, json: { error: `Server error (${res.status}): ${text.slice(0,200)}` } }; }
}

async function load() {
  profile = await requireRole('sponsor');
  if (!profile) return;
  renderSidebar('sponsor', 'directory');

  const params = new URLSearchParams(window.location.search);
  creatorId = params.get('creator');
  if (!creatorId) { document.getElementById('content').textContent = 'No creator specified.'; return; }

  const checkoutState = params.get('checkout');
  if (checkoutState === 'success') {
      document.getElementById('banner').innerHTML = `<div class="banner pending">Payment received — unlocking report</div>`;
      setTimeout(() => { window.location.href = window.location.href.replace('&checkout=success','').replace('?checkout=success','').replace('checkout=success',''); }, 3000);
    } else if (checkoutState === 'cancelled') {
      document.getElementById('banner').innerHTML = `<div class="banner pending">Checkout cancelled — no charge was made.</div>`;
    }
  const [{ data: creator }, { data: profileRow }, { data: components }, { data: campaigns }, { data: evalRow }] = await Promise.all([
    sb.from('creators').select('*').eq('id', creatorId).single(),
    sb.from('profiles').select('display_name').eq('id', creatorId).single(),
    sb.from('score_components').select('*').eq('creator_id', creatorId),
    sb.from('campaigns').select('status').eq('creator_id', creatorId).eq('status', 'verified'),
    sb.from('evaluations').select('*').eq('creator_id', creatorId).eq('sponsor_id', profile.id).order('created_at', { ascending: false }).limit(1).maybeSingle(),
  ]);

  const verifiedCount = (campaigns || []).length;
  const compMap = {};
  (components || []).forEach(c => compMap[c.component_key] = c.value);

  const creatorName = escapeHtml(profileRow?.display_name || 'Creator');
  const trustScore = creator?.trust_score ?? 0;
  const hasScore = (components || []).length > 0;
  const confidence = hasScore && trustScore >= 75 ? 'High' : trustScore >= 55 ? 'Moderate' : 'Low';
  const confidenceColor = { High:'#1C7C3F', Moderate:'#92600A', Low:'#B42318' }[confidence];

  // ── No evaluation exists yet — show teaser and generate on first view ─────
  if (!evalRow) {
    document.getElementById('content').innerHTML = `
      <div style="font-size:13px;font-weight:500;margin-bottom:12px">${creatorName}</div>
      <div class="teaser-hero">
        <div class="score-label">Trust score</div>
        <div class="score-val">${hasScore ? trustScore : '—'}</div>
        <div class="conf-badge"><i class="ti ti-shield-check"></i>Confidence: <strong style="margin-left:2px">${confidence}</strong></div>
      </div>
      <div class="reputation-block">
        <div class="rep-header">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#D4AF37"/><polyline points="4,7 6,9 10,5" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <span class="rep-title">Verified Sponsorship Reputation</span>
        </div>
        <div class="rep-grid">
          <div class="rep-metric"><div class="rm-val gold">${creator?.reliability_score > 0 ? creator.reliability_score : '—'}</div><div class="rm-label">Reliability<br>Score</div></div>
          <div class="rep-metric"><div class="rm-val">${verifiedCount}</div><div class="rm-label">Verified<br>Campaigns</div></div>
          <div class="rep-metric"><div class="rm-val">${creator?.repeat_sponsor_rate > 0 ? creator.repeat_sponsor_rate + '%' : '—'}</div><div class="rm-label">Repeat Sponsor<br>Rate</div></div>
        </div>
      </div>
      <div class="paywall-box">
        <h3>Unlock the full evaluation</h3>
        <p>You're seeing the Trust Score preview. Unlock the complete report for this creator.</p>
        <ul class="paywall-features">
          <li><i class="ti ti-check" style="color:#1C7C3F"></i>Score breakdown & audience fit</li>
          <li><i class="ti ti-check" style="color:#1C7C3F"></i>Risk assessment</li>
          <li><i class="ti ti-check" style="color:#1C7C3F"></i>Evidence summary</li>
          <li><i class="ti ti-check" style="color:#1C7C3F"></i>Recommendation (Approve / Caution / Avoid)</li>
          <li><i class="ti ti-check" style="color:#1C7C3F"></i>Downloadable PDF Decision Memo</li>
        </ul>
        <button class="cta" onclick="generateAndUnlock()"><i class="ti ti-lock-open"></i>Unlock full evaluation — $29</button>
      </div>`;
    return;
  }

  currentEvalId = evalRow.id;
  const locked = !evalRow.unlocked;
  const [style_class, icon, label] = VERDICT_STYLE[evalRow.recommendation_verdict] || VERDICT_STYLE.caution;

  // ── Evaluation exists but not unlocked — teaser + paywall ─────────────────
  if (locked) {
    document.getElementById('content').innerHTML = `
      <div style="font-size:13px;font-weight:500;margin-bottom:12px">${creatorName}</div>
      <div class="teaser-hero">
        <div class="score-label">Trust score</div>
        <div class="score-val">${trustScore}</div>
        <div class="conf-badge"><i class="ti ti-shield-check"></i>Confidence: <strong style="margin-left:2px">${confidence}</strong></div>
      </div>
      <div class="reputation-block">
        <div class="rep-header">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#D4AF37"/><polyline points="4,7 6,9 10,5" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <span class="rep-title">Verified Sponsorship Reputation</span>
        </div>
        <div class="rep-grid">
          <div class="rep-metric"><div class="rm-val gold">${creator?.reliability_score > 0 ? creator.reliability_score : '—'}</div><div class="rm-label">Reliability<br>Score</div></div>
          <div class="rep-metric"><div class="rm-val">${verifiedCount}</div><div class="rm-label">Verified<br>Campaigns</div></div>
          <div class="rep-metric"><div class="rm-val">${creator?.repeat_sponsor_rate > 0 ? creator.repeat_sponsor_rate + '%' : '—'}</div><div class="rm-label">Repeat Sponsor<br>Rate</div></div>
        </div>
      </div>
      <div class="blur-preview">
        <div class="card">
          <div class="sec">Score breakdown</div>
          ${(components||[]).map(c => `<div class="row"><span style="width:160px;color:var(--color-text-secondary)">${c.label}</span><strong>${c.value}</strong></div>`).join('')}
        </div>
      </div>
      <div class="paywall-box">
        <h3>Unlock the full evaluation — $29</h3>
        <p>One-time payment. Includes recommendation, risk assessment, audience fit, evidence summary, and PDF download.</p>
        <button class="cta" onclick="unlock()"><i class="ti ti-lock-open"></i>Unlock full report — $29</button>
      </div>`;
    return;
  }

  // ── Unlocked — show everything ────────────────────────────────────────────
  document.getElementById('content').innerHTML = `
    <div style="font-size:13px;font-weight:500;margin-bottom:12px">${creatorName} · ${escapeHtml(creator?.niche||'')} · ${escapeHtml(creator?.location||'')}</div>
    <div class="teaser-hero">
      <div class="score-label">Trust score</div>
      <div class="score-val">${trustScore}</div>
      <div class="conf-badge"><i class="ti ti-shield-check"></i>Confidence: <strong style="margin-left:2px">${confidence}</strong></div>
    </div>
    <div class="card">
      <div class="verdict-banner">
        <span class="badge ${style_class}"><i class="ti ${icon}"></i> Recommendation: ${label}</span>
        <span class="badge b-blue">${verifiedCount} verified campaigns</span>
      </div>
      <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.7;margin-bottom:12px">${escapeHtml(evalRow.recommendation_summary || '')}</div>
      ${(() => {
        try {
          const brief = evalRow.ai_summary ? JSON.parse(evalRow.ai_summary) : null;
          if (!brief) return '';
          const sections = [
            { label: 'Audience fit', key: 'audience_fit', icon: 'ti-users' },
            { label: 'Risk assessment', key: 'risk_assessment', icon: 'ti-shield-check' },
            { label: 'Confidence', key: 'confidence_note', icon: 'ti-chart-bar' },
            { label: 'Recommendation', key: 'recommendation', icon: 'ti-bulb' },
          ];
          return `
            <div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:10px;margin-top:4px">
              <div style="font-size:9px;font-weight:600;letter-spacing:.08em;color:var(--color-text-tertiary);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px">
                <span style="width:6px;height:6px;border-radius:50%;background:#2563EB;display:inline-block"></span>Kitscore AI Decision Brief
              </div>
              ${sections.map(s => brief[s.key] ? `
                <div style="display:flex;gap:10px;margin-bottom:10px;align-items:flex-start">
                  <i class="ti ${s.icon}" style="color:#2563EB;font-size:13px;margin-top:1px;flex-shrink:0"></i>
                  <div>
                    <div style="font-size:10px;font-weight:600;color:var(--color-text-primary);margin-bottom:2px">${s.label}</div>
                    <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.6">${escapeHtml(String(brief[s.key]))}</div>
                  </div>
                </div>
              ` : '').join('')}
              <div style="font-size:9px;color:var(--color-text-tertiary);margin-top:6px">Generated from ${verifiedCount} verified campaigns · ${escapeHtml(String(creator?.confidence ?? ''))}% confidence · Kitscore AI</div>
            </div>`;
        } catch(e) { return ''; }
      })()}
      <button class="cta" style="background:#1C7C3F;margin-top:12px" onclick="downloadPdf()"><i class="ti ti-file-download"></i>Download PDF</button>
      <button class="cta" style="background:var(--color-background-secondary);color:var(--color-text-secondary);margin-top:12px;margin-left:8px" onclick="window.location.href='campaigns.html?creator=${creatorId}'"><i class="ti ti-flag"></i>Log a campaign with this creator</button>
    </div>
    <div class="card">
      <div class="sec">Score breakdown</div>
      ${(components||[]).map(c => `<div class="row"><span style="width:160px;color:var(--color-text-secondary)">${c.label}</span><strong>${c.value}</strong></div>`).join('')}
    </div>
    <div class="card">
      <div class="sec">Key reasons</div>
      <div class="row"><i class="ti ti-rosette-discount-check" style="color:#1C7C3F"></i>${verifiedCount} mutually verified campaigns</div>
      <div class="row"><i class="ti ti-shield-check" style="color:#1C7C3F"></i>Brand safety score: ${compMap.brand_safety ?? '—'}</div>
      <div class="row"><i class="ti ti-users" style="color:#1C7C3F"></i>Audience authenticity: ${compMap.audience_authenticity ?? '—'}</div>
    </div>
    ${evalRow.team_id ? `
    <div class="card">
      <div class="sec">Approval workflow</div>
      ${evalRow.approval_status === 'draft' ? `
        <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">Submit to your team for review before acting on it.</div>
        <button class="cta" onclick="submitForReview()">Submit for team review</button>
      ` : evalRow.approval_status === 'pending_approval' ? `
        <div class="approval-badge b-amber" style="margin-bottom:10px">Pending team approval</div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <button class="cta" style="background:#1C7C3F" onclick="reviewEvaluation('approved')">Approve</button>
          <button class="cta" style="background:#B42318" onclick="reviewEvaluation('rejected')">Reject</button>
        </div>
        <input id="approvalNote" style="width:100%;padding:8px;border:0.5px solid var(--color-border-tertiary);border-radius:0;font-size:12px" placeholder="Optional note…">
      ` : evalRow.approval_status === 'approved' ? `
        <span class="approval-badge b-green"><i class="ti ti-circle-check"></i>Approved${evalRow.approval_note ? ' — ' + evalRow.approval_note : ''}</span>
      ` : `
        <span class="approval-badge b-red"><i class="ti ti-circle-x"></i>Rejected${evalRow.approval_note ? ' — ' + evalRow.approval_note : ''}</span>
      `}
    </div>` : ''}
  `;
}

// First visit: generate evaluation server-side then go straight to Stripe
async function generateAndUnlock() {
  const { ok, json } = await authedFetch('/api/generate-evaluation', { creatorId });
  if (!ok) { alert('Could not generate evaluation: ' + (json.error || 'unknown error')); return; }
  currentEvalId = json.evaluation.id;
  await unlock();
}

async function unlock() {
  try {
    const { ok, json } = await authedFetch('/api/create-checkout-session', {
      product: 'evaluation_unlock',
      evaluationId: currentEvalId,
      creatorId,
    });
    if (!ok) { alert('Could not start checkout: ' + (json.error || 'unknown error')); return; }
    window.location.href = json.url;
  } catch (err) { alert('Checkout failed: ' + err.message); }
}

async function submitForReview() {
  const { error } = await sb.from('evaluations').update({ approval_status: 'pending_approval' }).eq('id', currentEvalId);
  if (error) { alert('Could not submit: ' + error.message); return; }
  load();
}

async function reviewEvaluation(status) {
  const note = document.getElementById('approvalNote')?.value?.trim() || null;
  const { error } = await sb.from('evaluations').update({
    approval_status: status, approval_note: note, reviewed_at: new Date().toISOString(),
  }).eq('id', currentEvalId);
  if (error) { alert('Could not update: ' + error.message); return; }
  load();
}

async function downloadPdf() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/generate-pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
      body: JSON.stringify({ evaluationId: currentEvalId }),
    });
    if (!res.ok) {
      const text = await res.text();
      try { alert('Could not generate PDF: ' + (JSON.parse(text).error || 'unknown')); }
      catch { alert('Could not generate PDF (' + res.status + '): ' + text.slice(0,200)); }
      return;
    }
    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'kitscore-report.pdf';
    document.body.appendChild(a); a.click(); a.remove();
    window.URL.revokeObjectURL(url);
  } catch (err) { alert('PDF download failed: ' + err.message); }
}

load();
</script>
</body>
</html>
