<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563EB">
<link rel="apple-touch-icon" href="/public/icons/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator directory — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  body{padding:0;background:var(--canvas)}
  .app-main{max-width:1180px;padding:40px 48px 80px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px}
  .ptitle{font-size:24px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
  .signout{font-size:13.5px;color:var(--blue);cursor:pointer;background:none;border:none;font-weight:500}
  .controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .controls select{max-width:280px;padding:11px 12px;border:1px solid #D5DAE3;border-radius:0;font-size:14px;background:#fff;color:var(--ink)}
  .filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .filter-pill{font-size:13px;font-weight:600;padding:8px 16px;border:1px solid var(--line);border-radius:0;background:#fff;cursor:pointer;color:var(--ink-soft)}
  .filter-pill.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .ccard{background:#fff;border:1px solid var(--line);box-shadow:0 1px 2px rgba(16,21,31,.03);padding:22px;cursor:pointer;transition:box-shadow .15s;position:relative}
  .ccard:hover{box-shadow:0 4px 14px rgba(16,21,31,.08)}
  .ccard .head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .avatar{width:42px;height:42px;border-radius:0;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--blue);flex-shrink:0}
  .name{font-size:14.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
  .founding-tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:#8C6C3B;background:var(--gold-soft);padding:4px 10px;vertical-align:middle}
  .founding-tag svg{width:11px;height:11px;fill:var(--gold)}
  .niche{font-size:12px;color:var(--ink-faint);margin-top:3px}
  .cc-score-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px}
  .cc-score-row b{font-family:var(--font-mono);color:var(--ink);font-size:14px;font-weight:600}
  .pbar-track{height:6px;background:#EEF1F7;margin-bottom:16px;overflow:hidden}
  .pbar-fill{height:100%;background:var(--blue)}
  .verified-badge{font-size:11px;background:var(--green-soft);color:#137C52;padding:4px 10px;display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-weight:600}
  .save-btn{position:absolute;top:18px;right:18px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--ink-faint);padding:2px;z-index:1}
  .save-btn.saved{color:#E0245E}
  .log-campaign-btn{width:100%;margin-bottom:16px;padding:10px;font-size:13px;font-weight:600;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:0;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .log-campaign-btn:hover{border-color:var(--blue);color:var(--blue)}
  .card-reliability{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line);padding-top:14px}
  .card-rel-item{text-align:center}
  .card-rel-val{font-family:var(--font-mono);font-size:16px;font-weight:600;color:var(--ink)}
  .card-rel-val.gold{color:var(--gold)}
  .card-rel-label{font-family:var(--font-mono);font-size:9.5px;color:var(--ink-faint);letter-spacing:.05em;margin-top:3px}
  .card-rel-divider{display:none}
  .loading{font-size:13px;color:var(--ink-soft);padding:40px;text-align:center}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="topbar">
      <div class="ptitle">Creator directory</div>
      <button class="signout" onclick="signOut()">Sign out</button>
    </div>
    <div class="controls">
      <select id="sortSel" onchange="render()">
        <option value="trust_score">Sort: highest trust score</option>
        <option value="verified">Sort: most verified campaigns</option>
      </select>
    </div>
    <div class="filter-pills" id="nichePills"></div>
    <div id="content" class="loading">Loading creators from Supabase…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
let creators = [];
let watchlisted = new Set();
let sponsorProfile;
let activeNiche = 'all';

async function load() {
  sponsorProfile = await requireRole('sponsor');
  if (!sponsorProfile) return;
  renderSidebar('sponsor', 'directory');

  const { data: rows, error } = await sb.from('creators').select('id, niche, location, trust_score, confidence, badge_tier, updated_at, reliability_score, repeat_sponsor_rate, founding_cohort, profiles!inner(display_name)');
  if (error) { document.getElementById('content').textContent = 'Could not load creators: ' + error.message; return; }

  const { data: campaigns } = await sb.from('campaigns').select('creator_id, status').eq('status', 'verified');
  const verifiedCounts = {};
  (campaigns || []).forEach(c => verifiedCounts[c.creator_id] = (verifiedCounts[c.creator_id] || 0) + 1);

  const { data: saved } = await sb.from('watchlists').select('creator_id').eq('sponsor_id', sponsorProfile.id);
  watchlisted = new Set((saved || []).map(s => s.creator_id));

  creators = rows
    .filter(r => r.trust_score && r.trust_score >= 10)
    .map(r => ({ ...r, name: r.profiles.display_name, verified: verifiedCounts[r.id] || 0 }));
  renderNichePills();
  render();
}

function renderNichePills() {
  const niches = [...new Set(creators.map(c => (c.niche || '').trim()).filter(Boolean))].sort();
  const el = document.getElementById('nichePills');
  if (!niches.length) { el.innerHTML = ''; return; }
  el.innerHTML = ['all', ...niches].map(n =>
    `<button class="filter-pill ${activeNiche === n ? 'active' : ''}" onclick="setNiche('${n.replace(/'/g, "\\'")}')">${n === 'all' ? 'All' : escapeHtml(n)}</button>`
  ).join('');
}

function setNiche(n) {
  activeNiche = n;
  renderNichePills();
  render();
}

function render() {
  const sortBy = document.getElementById('sortSel').value;
  const filtered = activeNiche === 'all' ? creators : creators.filter(c => (c.niche || '') === activeNiche);
  const sorted = [...filtered].sort((a, b) => sortBy === 'verified' ? b.verified - a.verified : b.trust_score - a.trust_score);
  if (!sorted.length) { document.getElementById('content').innerHTML = '<div class="loading">No creators match this filter yet.</div>'; return; }
  document.getElementById('content').innerHTML = `<div class="grid">${sorted.map(c => `
    <div class="ccard" onclick="window.location.href='evaluate.html?creator=${c.id}'">
      <button class="save-btn ${watchlisted.has(c.id)?'saved':''}" onclick="event.stopPropagation(); toggleSave('${c.id}')" title="${watchlisted.has(c.id)?'Remove from watchlist':'Save to watchlist'}">
        <i class="ti ${watchlisted.has(c.id)?'ti-heart-filled':'ti-heart'}"></i>
      </button>
      <div class="head">
        <div class="avatar">${escapeHtml(c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase())}</div>
        <div><div class="name">${escapeHtml(c.name)}${c.founding_cohort ? ` <span class="founding-tag" title="One of Kitscore's first 100 creators"><svg viewBox="0 0 24 24"><path d="M12 2l3 6 6 1-4.5 4.5L18 21l-6-3-6 3 1.5-6.5L3 9l6-1z"/></svg>Founding</span>` : ''}</div><div class="niche">${escapeHtml(c.niche||'')} · ${escapeHtml(c.location||'')}</div></div>
      </div>
      <div class="cc-score-row"><span>Trust score</span><b>${c.trust_score}</b></div>
      <div class="pbar-track"><div class="pbar-fill" style="width:${c.trust_score}%"></div></div>
      <button class="log-campaign-btn" onclick="event.stopPropagation(); window.location.href='campaigns.html?creator=${c.id}'"><i class="ti ti-flag"></i> Log campaign</button>
      <div class="card-reliability">
        <div class="card-rel-item">
          <span class="card-rel-val gold">${c.reliability_score > 0 ? c.reliability_score : '—'}</span>
          <span class="card-rel-label">Reliability</span>
        </div>
        <div class="card-rel-divider"></div>
        <div class="card-rel-item">
          <span class="card-rel-val">${c.verified}</span>
          <span class="card-rel-label">Verified</span>
        </div>
        <div class="card-rel-divider"></div>
        <div class="card-rel-item">
          <span class="card-rel-val">${c.repeat_sponsor_rate > 0 ? c.repeat_sponsor_rate + '%' : '—'}</span>
          <span class="card-rel-label">Repeat Rate</span>
        </div>
      </div>
    </div>
  `).join('')}</div>`;
}

async function toggleSave(creatorId) {
  if (watchlisted.has(creatorId)) {
    const { error } = await sb.from('watchlists').delete().eq('sponsor_id', sponsorProfile.id).eq('creator_id', creatorId);
    if (error) { alert('Could not remove: ' + error.message); return; }
    watchlisted.delete(creatorId);
  } else {
    // Enforce plan-based watchlist limits before inserting
    const { data: sponsor } = await sb.from('sponsors').select('plan').eq('id', sponsorProfile.id).single();
    const plan = sponsor?.plan || 'free';
    const LIMITS = { free: 3, starter: Infinity, team: Infinity };
    const limit = LIMITS[plan] ?? 3;
    if (watchlisted.size >= limit) {
      alert(`Free plan is limited to ${limit} saved creators. Upgrade to Starter or Team for unlimited watchlist access.`);
      return;
    }
    const { error } = await sb.from('watchlists').insert({ sponsor_id: sponsorProfile.id, creator_id: creatorId });
    if (error) { alert('Could not save: ' + error.message); return; }
    watchlisted.add(creatorId);
  }
  render();
}

async function signOut() { await sb.auth.signOut(); window.location.href = 'auth.html'; }

load();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
