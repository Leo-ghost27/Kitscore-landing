<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563EB">
<link rel="apple-touch-icon" href="/public/icons/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator directory — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  body{padding:20px;max-width:880px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .signout{font-size:11px;color:#2563EB;cursor:pointer;background:none;border:none}
  .controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .controls select{padding:7px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);font-size:12px}
  .filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .filter-pill{font-size:11px;padding:6px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:20px;background:none;cursor:pointer;color:var(--color-text-secondary)}
  .filter-pill.active{background:#2563EB;color:#fff;border-color:#2563EB}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .ccard{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;cursor:pointer;transition:box-shadow .15s}
  .ccard:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .ccard .head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:12px;color:#185FA5}
  .name{font-size:12px;font-weight:500}
  .founding-tag{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;color:#8A5B0A;background:linear-gradient(180deg,#FFFBF0,#FAEEDA);border:0.5px solid #E8CE8F;padding:2px 7px 2px 4px;border-radius:9px;vertical-align:middle;margin-left:3px}
  .niche{font-size:10px;color:var(--color-text-secondary)}
  .pbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .pbar-row span:first-child{font-size:10px;color:var(--color-text-secondary)}
  .pbar-track{flex:1;height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
  .pbar-fill{height:100%;background:#2563EB;border-radius:3px}
  .pbar-val{font-size:11px;font-weight:500;color:#2563EB}
  .verified-badge{font-size:10px;background:#E9F7EE;color:#1C7C3F;padding:3px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px;margin-top:6px}
  .save-btn{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--color-text-tertiary);padding:2px}
  .save-btn.saved{color:#E0245E}
  .log-campaign-btn{width:100%;margin-bottom:8px;padding:6px 8px;font-size:11px;font-weight:500;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
  .log-campaign-btn:hover{background:var(--color-background-info);color:#185FA5;border-color:transparent}
  .ccard{position:relative}
  .loading{font-size:12px;color:var(--color-text-secondary);padding:20px;text-align:center}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="topbar">
      <div class="ptitle" style="font-size:16px;font-weight:500">Creator directory</div>
    </div>
    <div class="controls">
      <select id="sortSel" onchange="render()">
        <option value="trust_score">Sort: highest trust score</option>
        <option value="verified">Sort: most verified campaigns</option>
      </select>
    </div>
    <div class="filter-pills" id="nichePills"></div>
    <div id="content" class="loading">Loading creators from Supabase…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
let creators = [];
let watchlisted = new Set();
let sponsorProfile;
let activeNiche = 'all';

async function load() {
  sponsorProfile = await requireRole('sponsor');
  if (!sponsorProfile) return;
  renderSidebar('sponsor', 'directory');

  const { data: rows, error } = await sb.from('creators').select('id, niche, location, trust_score, confidence, badge_tier, updated_at, reliability_score, repeat_sponsor_rate, founding_cohort, profiles!inner(display_name)').eq('is_test', false);
  if (error) { document.getElementById('content').textContent = 'Could not load creators: ' + error.message; return; }

  const { data: campaigns } = await sb.from('campaigns').select('creator_id, status').eq('status', 'verified');
  const verifiedCounts = {};
  (campaigns || []).forEach(c => verifiedCounts[c.creator_id] = (verifiedCounts[c.creator_id] || 0) + 1);

  const { data: saved } = await sb.from('watchlists').select('creator_id').eq('sponsor_id', sponsorProfile.id);
  watchlisted = new Set((saved || []).map(s => s.creator_id));

  creators = rows
    .filter(r => r.trust_score && r.trust_score >= 10)
    .map(r => ({ ...r, name: r.profiles.display_name, verified: verifiedCounts[r.id] || 0 }));
  renderNichePills();
  render();
}

function renderNichePills() {
  const niches = [...new Set(creators.map(c => (c.niche || '').trim()).filter(Boolean))].sort();
  const el = document.getElementById('nichePills');
  if (!niches.length) { el.innerHTML = ''; return; }
  el.innerHTML = ['all', ...niches].map(n =>
    `<button class="filter-pill ${activeNiche === n ? 'active' : ''}" onclick="setNiche('${n.replace(/'/g, "\\'")}')">${n === 'all' ? 'All' : escapeHtml(n)}</button>`
  ).join('');
}

function setNiche(n) {
  activeNiche = n;
  renderNichePills();
  render();
}

function render() {
  const sortBy = document.getElementById('sortSel').value;
  const filtered = activeNiche === 'all' ? creators : creators.filter(c => (c.niche || '') === activeNiche);
  const sorted = [...filtered].sort((a, b) => sortBy === 'verified' ? b.verified - a.verified : b.trust_score - a.trust_score);
  if (!sorted.length) { document.getElementById('content').innerHTML = '<div class="loading">No creators match this filter yet.</div>'; return; }
  document.getElementById('content').innerHTML = `<div class="grid">${sorted.map(c => `
    <div class="ccard" onclick="window.location.href='evaluate.html?creator=${c.id}'">
      <button class="save-btn ${watchlisted.has(c.id)?'saved':''}" onclick="event.stopPropagation(); toggleSave('${c.id}')" title="${watchlisted.has(c.id)?'Remove from watchlist':'Save to watchlist'}">
        <i class="ti ${watchlisted.has(c.id)?'ti-heart-filled':'ti-heart'}"></i>
      </button>
      <div class="head">
        <div class="avatar">${escapeHtml(c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase())}</div>
        <div><div class="name">${escapeHtml(c.name)}${c.founding_cohort ? ` <span class="founding-tag" title="One of Kitscore's first 100 creators"><svg width="12" height="12" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="9" fill="#C08A1E"/><circle cx="9" cy="9" r="7.4" fill="#F0B429"/><path d="M9 4.2l1.4 2.9 3.1.5-2.3 2.2.6 3.1L9 11.4l-2.8 1.5.6-3.1-2.3-2.2 3.1-.5L9 4.2z" fill="#fff"/></svg> Founding</span>` : ''}</div><div class="niche">${escapeHtml(c.niche||'')} · ${escapeHtml(c.location||'')}</div></div>
      </div>
      <div class="pbar-row"><span>Trust score</span><div class="pbar-track"><div class="pbar-fill" style="width:${c.trust_score}%"></div></div><span class="pbar-val">${c.trust_score}</span></div>
      <button class="log-campaign-btn" onclick="event.stopPropagation(); window.location.href='campaigns.html?creator=${c.id}'"><i class="ti ti-flag"></i> Log campaign</button>
      <div class="card-reliability">
        <div class="card-rel-item">
          <span class="card-rel-val gold">${c.reliability_score > 0 ? c.reliability_score : '—'}</span>
          <span class="card-rel-label">Reliability</span>
        </div>
        <div class="card-rel-divider"></div>
        <div class="card-rel-item">
          <span class="card-rel-val">${c.verified}</span>
          <span class="card-rel-label">Verified</span>
        </div>
        <div class="card-rel-divider"></div>
        <div class="card-rel-item">
          <span class="card-rel-val">${c.repeat_sponsor_rate > 0 ? c.repeat_sponsor_rate + '%' : '—'}</span>
          <span class="card-rel-label">Repeat Rate</span>
        </div>
      </div>
    </div>
  `).join('')}</div>`;
}

async function toggleSave(creatorId) {
  if (watchlisted.has(creatorId)) {
    const { error } = await sb.from('watchlists').delete().eq('sponsor_id', sponsorProfile.id).eq('creator_id', creatorId);
    if (error) { alert('Could not remove: ' + error.message); return; }
    watchlisted.delete(creatorId);
  } else {
    // Enforce plan-based watchlist limits before inserting
    const { data: sponsor } = await sb.from('sponsors').select('plan').eq('id', sponsorProfile.id).single();
    const plan = sponsor?.plan || 'free';
    const LIMITS = { free: 3, starter: Infinity, team: Infinity };
    const limit = LIMITS[plan] ?? 3;
    if (watchlisted.size >= limit) {
      alert(`Free plan is limited to ${limit} saved creators. Upgrade to Starter or Team for unlimited watchlist access.`);
      return;
    }
    const { error } = await sb.from('watchlists').insert({ sponsor_id: sponsorProfile.id, creator_id: creatorId });
    if (error) { alert('Could not save: ' + error.message); return; }
    watchlisted.add(creatorId);
  }
  render();
}

async function signOut() { await sb.auth.signOut(); window.location.href = 'auth.html'; }

load();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
