<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  .ptitle{font-size:16px;font-weight:500;margin-bottom:16px}
  .card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:16px;max-width:420px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
  .field input{width:100%;padding:9px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);font-size:13px}
  .cta{padding:9px 16px;background:#2563EB;color:#fff;border:none;border-radius:0;font-size:12px;font-weight:500;cursor:pointer}
  .cta:disabled{opacity:.6}
  .msg{font-size:11px;margin-top:10px;padding:8px;border-radius:0}
  .msg.error{background:#FDECEC;color:#B42318}
  .msg.ok{background:#E9F7EE;color:#1C7C3F}
  .loading{font-size:12px;color:var(--color-text-secondary)}
  .profile-layout{display:grid;grid-template-columns:1fr 250px;gap:16px;align-items:start}
  .card{max-width:none}
  .side-panel{padding:18px}
  .side-panel-title{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:10px}
  .strength-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:0.5px solid var(--color-border-tertiary);font-size:12px;color:var(--color-text-secondary)}
  .strength-item:first-child{border-top:none}
  .strength-dot{width:8px;height:8px;background:var(--color-border-tertiary);flex-shrink:0}
  .strength-dot.on{background:#2563EB}
  .side-panel-note{display:flex;gap:10px;margin-top:14px}
  .side-panel-note svg{flex-shrink:0;margin-top:1px}
  .side-panel-note p{font-size:11.5px;color:var(--color-text-secondary);line-height:1.55;margin:0}
  @media(max-width:700px){ .profile-layout{grid-template-columns:1fr} }
  .avatar-wrap{position:relative;width:64px;height:64px;flex-shrink:0}
  .avatar-img{width:64px;height:64px;border-radius:50%;object-fit:cover;display:block;border:0.5px solid var(--color-border-tertiary)}
  .avatar-placeholder{width:64px;height:64px;border-radius:50%;background:#2563EB;color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .avatar-edit-btn{position:absolute;bottom:-2px;right:-2px;width:22px;height:22px;border-radius:50%;background:#1A1A18;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #fff;font-size:11px}
  .avatar-edit-btn input{display:none}
  .gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
  .gallery-slot{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:#F9F8F5;border:1px dashed var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .gallery-slot img{width:100%;height:100%;object-fit:cover;display:block}
  .gallery-slot .add{font-size:22px;color:var(--color-text-tertiary)}
  .gallery-slot .remove{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer}
  .gallery-slot input{display:none}
  .upload-hint{font-size:10.5px;color:var(--color-text-tertiary);margin-top:6px}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="ptitle">Profile</div>
    <div class="profile-layout">
      <div class="card" id="formWrap"><div class="loading">Loading…</div></div>
      <div class="card side-panel" id="strengthPanel"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="icons.js?v=1"></script>
<script src="nav.js?v=2"></script>
<script>
let profile, creator, collaborations = [], pressMentions = [];

async function load() {
  profile = await requireRole('creator');
  if (!profile) return;
  renderSidebar('creator', 'profile');

  const [{ data: c }, { data: email }, { data: collabs }, { data: press }] = await Promise.all([
    sb.from('creators').select('niche, location, founding_cohort, bio, slug, plan, avatar_url, gallery_images, available_for, causes').eq('id', profile.id).single(),
    sb.rpc('fn_get_my_business_email'),
    sb.from('creator_collaborations').select('id, brand_name, logo_url, link').eq('creator_id', profile.id).order('display_order').order('created_at'),
    sb.from('creator_press_mentions').select('id, title, outlet_name, url, mention_date').eq('creator_id', profile.id).order('display_order').order('created_at'),
  ]);
  creator = { ...c, business_email: email };
  collaborations = collabs || [];
  pressMentions = press || [];

  const initial = (profile.display_name || '?').trim().charAt(0).toUpperCase();
  document.getElementById('formWrap').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:22px">
      <div class="avatar-wrap">
        ${creator.avatar_url
          ? `<img class="avatar-img" id="avatarImg" src="${escapeHtml(creator.avatar_url)}">`
          : `<div class="avatar-placeholder" id="avatarImg">${escapeHtml(initial)}</div>`}
        <label class="avatar-edit-btn" title="Change photo">
          <i class="ti ti-camera"></i>
          <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/webp" onchange="uploadAvatar(event)">
        </label>
      </div>
      ${creator.founding_cohort ? `<div style="display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:#8A5B0A;background:linear-gradient(180deg,#FFFBF0,#FAEEDA);border:0.5px solid #E8CE8F;padding:4px 10px 4px 6px;border-radius:20px" title="One of Kitscore's first 100 creators"><svg width="16" height="16" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="9" fill="#C08A1E"/><circle cx="9" cy="9" r="7.4" fill="#F0B429"/><path d="M9 4.2l1.4 2.9 3.1.5-2.3 2.2.6 3.1L9 11.4l-2.8 1.5.6-3.1-2.3-2.2 3.1-.5L9 4.2z" fill="#fff"/></svg>Founding Creator</div>` : ''}
    </div>
    <div id="avatarMsg"></div>
    <div class="field"><label>Display name</label><input id="displayName" value="${escapeHtml(profile.display_name || '')}"></div>
    <div class="field"><label>Niche</label><input id="niche" value="${escapeHtml(creator.niche || '')}"></div>
    <div class="field"><label>Location</label><input id="location" value="${escapeHtml(creator.location || '')}"></div>
    <div class="field"><label>Business email</label><input id="businessEmail" value="${escapeHtml(creator.business_email || '')}"></div>
    <div class="field">
      <label>Bio <span style="color:var(--color-text-tertiary);font-weight:400">— shown on your Verified Media Kit, not your trust link</span></label>
      <textarea id="bio" maxlength="280" rows="3" placeholder="A couple sentences a brand can read in five seconds — what you make, who watches, and why you're a fit." style="width:100%;padding:9px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);font-size:13px;font-family:inherit;resize:vertical">${escapeHtml(creator.bio || '')}</textarea>
      <div id="bioCount" style="font-size:10.5px;color:var(--color-text-tertiary);text-align:right;margin-top:2px">${(creator.bio||'').length}/280</div>
    </div>
    <div class="field">
      <label>Gallery <span style="color:var(--color-text-tertiary);font-weight:400">— optional, up to 4 photos shown on your Verified Media Kit</span></label>
      <div class="gallery-grid" id="galleryGrid"></div>
      <div class="upload-hint">JPG, PNG, or WebP · 5MB max per photo</div>
    </div>

    <div class="field">
      <label>Past collaborations <span style="color:var(--color-text-tertiary);font-weight:400">— brands you've worked with, self-reported and shown as such (separate from Verified campaigns, which only covers deals run through Kitscore)</span></label>
      <div id="collabList"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary)">
        <div>
          <label style="font-size:10.5px;color:var(--color-text-tertiary);display:block;margin-bottom:3px">Brand name</label>
          <input id="collabBrandName" placeholder="e.g. Red Bull" style="width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;font-size:12.5px">
        </div>
        <div>
          <label style="font-size:10.5px;color:var(--color-text-tertiary);display:block;margin-bottom:3px">Link (optional)</label>
          <input id="collabLink" placeholder="https://..." style="width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;font-size:12.5px">
        </div>
      </div>
      <div style="margin-top:8px">
        <label style="font-size:10.5px;color:var(--color-text-tertiary);display:block;margin-bottom:3px">Logo (optional)</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="file" id="collabLogoInput" accept="image/jpeg,image/png,image/webp" style="font-size:11.5px;flex:1">
          <button type="button" class="cta" style="padding:8px 16px;font-size:12.5px;white-space:nowrap" onclick="addCollaboration()">+ Add</button>
        </div>
      </div>
      <div class="upload-hint">Leave the logo blank and we'll show your brand name instead. JPG, PNG, or WebP · 5MB max.</div>
      <div id="collabMsg" style="font-size:11px;margin-top:6px"></div>
    </div>

    <div class="field">
      <label>Press mentions <span style="color:var(--color-text-tertiary);font-weight:400">— coverage of you or your work, self-reported</span></label>
      <div id="pressList"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary)">
        <div>
          <label style="font-size:10.5px;color:var(--color-text-tertiary);display:block;margin-bottom:3px">Title</label>
          <input id="pressTitle" placeholder="e.g. Why This Creator Is Gaming's Next Big Thing" style="width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;font-size:12.5px">
        </div>
        <div>
          <label style="font-size:10.5px;color:var(--color-text-tertiary);display:block;margin-bottom:3px">Outlet (optional)</label>
          <input id="pressOutlet" placeholder="e.g. IGN" style="width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;font-size:12.5px">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <div>
          <label style="font-size:10.5px;color:var(--color-text-tertiary);display:block;margin-bottom:3px">Link (optional)</label>
          <input id="pressUrl" placeholder="https://..." style="width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;font-size:12.5px">
        </div>
        <div>
          <label style="font-size:10.5px;color:var(--color-text-tertiary);display:block;margin-bottom:3px">Date (optional)</label>
          <input id="pressDate" type="date" style="width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;font-size:12.5px">
        </div>
      </div>
      <button type="button" class="cta" style="padding:8px 16px;font-size:12.5px;margin-top:8px" onclick="addPressMention()">+ Add</button>
      <div id="pressMsg" style="font-size:11px;margin-top:6px"></div>
    </div>

    <div class="field">
      <label>Available for <span style="color:var(--color-text-tertiary);font-weight:400">— the kinds of work you're open to</span></label>
      <div id="availableForTags"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="availableForInput" placeholder="e.g. Sponsored posts, event appearances, product collabs" style="flex:1;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;font-size:12.5px" onkeydown="if(event.key==='Enter'){event.preventDefault();addAvailableFor();}">
        <button type="button" class="cta" style="padding:8px 16px;font-size:12.5px;white-space:nowrap" onclick="addAvailableFor()">+ Add</button>
      </div>
    </div>

    <div class="field">
      <label>Causes I support <span style="color:var(--color-text-tertiary);font-weight:400">— optional, helps ESG-conscious sponsors see if you're a fit</span></label>
      <div id="causesTags"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="causesInput" placeholder="e.g. Mental health awareness, environmental causes" style="flex:1;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;font-size:12.5px" onkeydown="if(event.key==='Enter'){event.preventDefault();addCause();}">
        <button type="button" class="cta" style="padding:8px 16px;font-size:12.5px;white-space:nowrap" onclick="addCause()">+ Add</button>
      </div>
    </div>

    <button class="cta" id="saveBtn" onclick="save()">Save changes</button>
    <div id="msg"></div>

    <div style="margin-top:28px;padding-top:20px;border-top:0.5px solid var(--color-border-tertiary)">
      <label style="display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">Custom link <span style="color:var(--color-text-tertiary)">— used for both your Verified Media Kit and trust link</span></label>
      ${creator.plan === 'pro' ? `
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:12px;color:var(--color-text-tertiary)">kitscore.co/p/</span>
          <input id="customSlug" value="${escapeHtml(creator.slug || '')}" style="flex:1;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);font-size:12.5px;font-family:var(--font-mono,monospace)">
          <button class="cta" style="padding:8px 14px" onclick="saveSlug()">Save</button>
        </div>
        <div id="slugMsg" style="font-size:11px;margin-top:6px"></div>
      ` : `
        <div style="font-size:12px;color:var(--color-text-tertiary)">Your link: <span style="font-family:var(--font-mono,monospace)">${escapeHtml(creator.slug || '')}</span> — <a href="pricing-creator.html" style="color:#2563EB">upgrade to Pro to customize it</a></div>
      `}
    </div>
  `;

  document.getElementById('bio').addEventListener('input', (e) => {
    document.getElementById('bioCount').textContent = `${e.target.value.length}/280`;
  });
  ['displayName', 'niche', 'location', 'businessEmail'].forEach(id => {
    document.getElementById(id).addEventListener('input', renderStrengthPanel);
  });
  renderStrengthPanel();
  renderGallery();
  renderCollaborations();
  renderPressMentions();
  renderAvailableFor();
  renderCauses();
}

const MAX_GALLERY = 4;
const MAX_UPLOAD_BYTES = 5 * 1024 * 1024;
const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/webp'];

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  if (!grid) return;
  const images = creator.gallery_images || [];
  let html = images.map((url, i) => `
    <div class="gallery-slot">
      <img src="${escapeHtml(url)}">
      <div class="remove" onclick="removeGalleryImage(${i})" title="Remove">✕</div>
    </div>`).join('');
  if (images.length < MAX_GALLERY) {
    html += `
      <label class="gallery-slot">
        <span class="add">+</span>
        <input type="file" accept="image/jpeg,image/png,image/webp" onchange="uploadGalleryImage(event)">
      </label>`;
  }
  grid.innerHTML = html;
}

function extFor(file) {
  return (file.type.split('/')[1] || 'jpg').replace('jpeg', 'jpg');
}

async function uploadAvatar(event) {
  const file = event.target.files[0];
  if (!file) return;
  const msg = document.getElementById('avatarMsg');
  msg.innerHTML = '';
  if (!ALLOWED_TYPES.includes(file.type)) {
    msg.innerHTML = `<div class="msg error">Please upload a JPG, PNG, or WebP image.</div>`;
    return;
  }
  if (file.size > MAX_UPLOAD_BYTES) {
    msg.innerHTML = `<div class="msg error">That photo is over 5MB — try a smaller file.</div>`;
    return;
  }
  const path = `${profile.id}/avatar-${Date.now()}.${extFor(file)}`;
  const { error: upErr } = await sb.storage.from('creator-media').upload(path, file, { upsert: true });
  if (upErr) {
    msg.innerHTML = `<div class="msg error">Upload failed: ${escapeHtml(upErr.message)}</div>`;
    return;
  }
  const { data: pub } = sb.storage.from('creator-media').getPublicUrl(path);
  const { error: dbErr } = await sb.from('creators').update({ avatar_url: pub.publicUrl }).eq('id', profile.id);
  if (dbErr) {
    msg.innerHTML = `<div class="msg error">Saved the photo but couldn't update your profile: ${escapeHtml(dbErr.message)}</div>`;
    return;
  }
  creator.avatar_url = pub.publicUrl;
  const imgEl = document.getElementById('avatarImg');
  imgEl.outerHTML = `<img class="avatar-img" id="avatarImg" src="${escapeHtml(pub.publicUrl)}">`;
  msg.innerHTML = `<div class="msg ok">Photo updated.</div>`;
}

async function uploadGalleryImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const msg = document.getElementById('msg');
  if (!ALLOWED_TYPES.includes(file.type)) {
    msg.innerHTML = `<div class="msg error">Please upload a JPG, PNG, or WebP image.</div>`;
    return;
  }
  if (file.size > MAX_UPLOAD_BYTES) {
    msg.innerHTML = `<div class="msg error">That photo is over 5MB — try a smaller file.</div>`;
    return;
  }
  const images = creator.gallery_images || [];
  if (images.length >= MAX_GALLERY) return;
  const path = `${profile.id}/gallery-${Date.now()}.${extFor(file)}`;
  const { error: upErr } = await sb.storage.from('creator-media').upload(path, file, { upsert: true });
  if (upErr) {
    msg.innerHTML = `<div class="msg error">Upload failed: ${escapeHtml(upErr.message)}</div>`;
    return;
  }
  const { data: pub } = sb.storage.from('creator-media').getPublicUrl(path);
  const updated = [...images, pub.publicUrl];
  const { error: dbErr } = await sb.from('creators').update({ gallery_images: updated }).eq('id', profile.id);
  if (dbErr) {
    msg.innerHTML = `<div class="msg error">Saved the photo but couldn't update your gallery: ${escapeHtml(dbErr.message)}</div>`;
    return;
  }
  creator.gallery_images = updated;
  renderGallery();
  msg.innerHTML = `<div class="msg ok">Photo added.</div>`;
}

async function removeGalleryImage(index) {
  const images = [...(creator.gallery_images || [])];
  images.splice(index, 1);
  const { error } = await sb.from('creators').update({ gallery_images: images }).eq('id', profile.id);
  const msg = document.getElementById('msg');
  if (error) {
    msg.innerHTML = `<div class="msg error">Could not remove photo: ${escapeHtml(error.message)}</div>`;
    return;
  }
  creator.gallery_images = images;
  renderGallery();
}

// ── Past collaborations (self-reported brand history, pre-Kitscore) ──────
function renderCollaborations() {
  const list = document.getElementById('collabList');
  if (!list) return;
  if (!collaborations.length) {
    list.innerHTML = `<div style="font-size:12px;color:var(--color-text-tertiary)">No collaborations added yet.</div>`;
    return;
  }
  list.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:10px">${collaborations.map(c => `
    <div style="display:flex;align-items:center;gap:8px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:6px 10px 6px 6px">
      ${c.logo_url
        ? `<img src="${escapeHtml(c.logo_url)}" style="width:28px;height:28px;object-fit:contain;border-radius:4px">`
        : `<div style="width:28px;height:28px;border-radius:4px;background:var(--color-bg-secondary,#F2F1EC);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--color-text-secondary)">${escapeHtml((c.brand_name||'?').trim().charAt(0).toUpperCase())}</div>`}
      <span style="font-size:12.5px;color:var(--color-text-primary)">${escapeHtml(c.brand_name)}</span>
      <span onclick="removeCollaboration('${c.id}')" title="Remove" style="cursor:pointer;color:var(--color-text-tertiary);font-size:14px;line-height:1;margin-left:2px">✕</span>
    </div>`).join('')}</div>`;
}

async function addCollaboration() {
  const msg = document.getElementById('collabMsg');
  msg.innerHTML = '';
  const brandName = document.getElementById('collabBrandName').value.trim();
  const link = document.getElementById('collabLink').value.trim();
  const fileInput = document.getElementById('collabLogoInput');
  const file = fileInput.files[0];

  if (!brandName) {
    msg.innerHTML = `<div class="msg error">Brand name is required.</div>`;
    return;
  }
  if (file) {
    if (!ALLOWED_TYPES.includes(file.type)) {
      msg.innerHTML = `<div class="msg error">Please upload a JPG, PNG, or WebP logo.</div>`;
      return;
    }
    if (file.size > MAX_UPLOAD_BYTES) {
      msg.innerHTML = `<div class="msg error">That logo is over 5MB — try a smaller file.</div>`;
      return;
    }
  }

  let logoUrl = null;
  if (file) {
    const path = `${profile.id}/logo-${Date.now()}.${extFor(file)}`;
    const { error: upErr } = await sb.storage.from('creator-media').upload(path, file, { upsert: true });
    if (upErr) {
      msg.innerHTML = `<div class="msg error">Logo upload failed: ${escapeHtml(upErr.message)}</div>`;
      return;
    }
    logoUrl = sb.storage.from('creator-media').getPublicUrl(path).data.publicUrl;
  }

  const { data, error } = await sb.from('creator_collaborations')
    .insert({ creator_id: profile.id, brand_name: brandName, logo_url: logoUrl, link: link || null, display_order: collaborations.length })
    .select('id, brand_name, logo_url, link')
    .single();
  if (error) {
    msg.innerHTML = `<div class="msg error">Could not save: ${escapeHtml(error.message)}</div>`;
    return;
  }

  collaborations.push(data);
  document.getElementById('collabBrandName').value = '';
  document.getElementById('collabLink').value = '';
  fileInput.value = '';
  renderCollaborations();
  msg.innerHTML = `<div class="msg ok">Added.</div>`;
}

async function removeCollaboration(id) {
  const { error } = await sb.from('creator_collaborations').delete().eq('id', id);
  const msg = document.getElementById('collabMsg');
  if (error) {
    msg.innerHTML = `<div class="msg error">Could not remove: ${escapeHtml(error.message)}</div>`;
    return;
  }
  collaborations = collaborations.filter(c => c.id !== id);
  renderCollaborations();
}

// ── Press mentions (self-reported coverage) ───────────────────────────────
function renderPressMentions() {
  const list = document.getElementById('pressList');
  if (!list) return;
  if (!pressMentions.length) {
    list.innerHTML = `<div style="font-size:12px;color:var(--color-text-tertiary)">No press mentions added yet.</div>`;
    return;
  }
  list.innerHTML = pressMentions.map(p => `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:8px 10px;margin-bottom:6px">
      <div style="min-width:0">
        <div style="font-size:12.5px;color:var(--color-text-primary);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(p.title)}</div>
        <div style="font-size:11px;color:var(--color-text-tertiary)">${[p.outlet_name, p.mention_date].filter(Boolean).map(escapeHtml).join(' · ')}</div>
      </div>
      <span onclick="removePressMention('${p.id}')" title="Remove" style="cursor:pointer;color:var(--color-text-tertiary);font-size:14px;line-height:1;flex-shrink:0">✕</span>
    </div>`).join('');
}

async function addPressMention() {
  const msg = document.getElementById('pressMsg');
  msg.innerHTML = '';
  const title = document.getElementById('pressTitle').value.trim();
  const outlet_name = document.getElementById('pressOutlet').value.trim() || null;
  const url = document.getElementById('pressUrl').value.trim() || null;
  const mention_date = document.getElementById('pressDate').value || null;

  if (!title) {
    msg.innerHTML = `<div class="msg error">Title is required.</div>`;
    return;
  }

  const { data, error } = await sb.from('creator_press_mentions')
    .insert({ creator_id: profile.id, title, outlet_name, url, mention_date, display_order: pressMentions.length })
    .select('id, title, outlet_name, url, mention_date')
    .single();
  if (error) {
    msg.innerHTML = `<div class="msg error">Could not save: ${escapeHtml(error.message)}</div>`;
    return;
  }

  pressMentions.push(data);
  document.getElementById('pressTitle').value = '';
  document.getElementById('pressOutlet').value = '';
  document.getElementById('pressUrl').value = '';
  document.getElementById('pressDate').value = '';
  renderPressMentions();
  msg.innerHTML = `<div class="msg ok">Added.</div>`;
}

async function removePressMention(id) {
  const { error } = await sb.from('creator_press_mentions').delete().eq('id', id);
  const msg = document.getElementById('pressMsg');
  if (error) {
    msg.innerHTML = `<div class="msg error">Could not remove: ${escapeHtml(error.message)}</div>`;
    return;
  }
  pressMentions = pressMentions.filter(p => p.id !== id);
  renderPressMentions();
}

// ── Available for / Causes (self-reported tag lists on creators) ─────────
function renderTagList(containerId, values, removeFn) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!values.length) {
    el.innerHTML = `<div style="font-size:12px;color:var(--color-text-tertiary)">None added yet.</div>`;
    return;
  }
  el.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:8px">${values.map((v, i) => `
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--color-bg-secondary,#F2F1EC);border-radius:20px;padding:5px 10px 5px 12px">
      ${escapeHtml(v)}
      <span onclick="${removeFn}(${i})" title="Remove" style="cursor:pointer;color:var(--color-text-tertiary);font-size:13px;line-height:1">✕</span>
    </span>`).join('')}</div>`;
}

function renderAvailableFor() { renderTagList('availableForTags', creator.available_for || [], 'removeAvailableFor'); }
function renderCauses() { renderTagList('causesTags', creator.causes || [], 'removeCauses'); }

async function addAvailableFor() {
  const input = document.getElementById('availableForInput');
  const val = input.value.trim();
  if (!val) return;
  const updated = [...(creator.available_for || []), val];
  const { error } = await sb.from('creators').update({ available_for: updated }).eq('id', profile.id);
  if (error) { document.getElementById('msg').innerHTML = `<div class="msg error">Could not save: ${escapeHtml(error.message)}</div>`; return; }
  creator.available_for = updated;
  input.value = '';
  renderAvailableFor();
}

async function removeAvailableFor(index) {
  const updated = [...(creator.available_for || [])];
  updated.splice(index, 1);
  const { error } = await sb.from('creators').update({ available_for: updated }).eq('id', profile.id);
  if (error) { document.getElementById('msg').innerHTML = `<div class="msg error">Could not save: ${escapeHtml(error.message)}</div>`; return; }
  creator.available_for = updated;
  renderAvailableFor();
}

async function addCause() {
  const input = document.getElementById('causesInput');
  const val = input.value.trim();
  if (!val) return;
  const updated = [...(creator.causes || []), val];
  const { error } = await sb.from('creators').update({ causes: updated }).eq('id', profile.id);
  if (error) { document.getElementById('msg').innerHTML = `<div class="msg error">Could not save: ${escapeHtml(error.message)}</div>`; return; }
  creator.causes = updated;
  input.value = '';
  renderCauses();
}

async function removeCauses(index) {
  const updated = [...(creator.causes || [])];
  updated.splice(index, 1);
  const { error } = await sb.from('creators').update({ causes: updated }).eq('id', profile.id);
  if (error) { document.getElementById('msg').innerHTML = `<div class="msg error">Could not save: ${escapeHtml(error.message)}</div>`; return; }
  creator.causes = updated;
  renderCauses();
}

function renderStrengthPanel() {
  const fields = [
    { label: 'Display name', id: 'displayName' },
    { label: 'Niche', id: 'niche' },
    { label: 'Location', id: 'location' },
    { label: 'Business email', id: 'businessEmail' },
  ];
  const panel = document.getElementById('strengthPanel');
  if (!panel) return;
  panel.innerHTML = `
    <div class="side-panel-title">Profile strength</div>
    ${fields.map(f => {
      const el = document.getElementById(f.id);
      const filled = !!(el && el.value.trim());
      return `<div class="strength-item"><span>${f.label}</span><div class="strength-dot ${filled ? 'on' : ''}"></div></div>`;
    }).join('')}
    <div class="side-panel-note">
      ${svgIcon('info-circle', {size:16, stroke:'#2563EB'})}
      <p>A complete profile is required before your first campaign can be verified.</p>
    </div>
  `;
}

async function save() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;

  const displayName = document.getElementById('displayName').value.trim();
  const niche = document.getElementById('niche').value.trim();
  const location = document.getElementById('location').value.trim();
  const businessEmail = document.getElementById('businessEmail').value.trim();
  const bio = document.getElementById('bio').value.trim();

  const [{ error: pErr }, { error: cErr }] = await Promise.all([
    sb.from('profiles').update({ display_name: displayName }).eq('id', profile.id),
    sb.from('creators').update({ niche, location, business_email: businessEmail, bio }).eq('id', profile.id),
  ]);

  const msg = document.getElementById('msg');
  if (pErr || cErr) {
    msg.innerHTML = `<div class="msg error">Could not save: ${escapeHtml((pErr || cErr).message)}</div>`;
  } else {
    msg.innerHTML = `<div class="msg ok">Saved.</div>`;
  }
  btn.disabled = false;
}

async function saveSlug() {
  const input = document.getElementById('customSlug');
  const msg = document.getElementById('slugMsg');
  const val = input.value.trim();
  msg.innerHTML = '';
  const { data, error } = await sb.rpc('fn_set_evekit_slug', { p_slug: val });
  if (error) {
    msg.innerHTML = `<div class="msg error">Could not save: ${escapeHtml(error.message)}</div>`;
    return;
  }
  if (!data || !data.ok) {
    msg.innerHTML = `<div class="msg error">${escapeHtml(data?.error || 'Could not save that link.')}</div>`;
    return;
  }
  creator.slug = data.slug;
  input.value = data.slug;
  msg.innerHTML = `<div class="msg ok">Saved — your Verified Media Kit and trust link now use this URL.</div>`;
}

load();
</script>
