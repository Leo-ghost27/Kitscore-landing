<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaigns — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  .ptitle{font-size:16px;font-weight:500;margin-bottom:4px}
  .psub{font-size:11px;color:var(--color-text-secondary);margin-bottom:16px}
  .card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:0;overflow:hidden}
  .row-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
  .row-item:last-child{border-bottom:none}
  .status-tag{font-size:10px;padding:3px 8px;border-radius:10px;text-transform:capitalize}
  .st-verified{background:#E9F7EE;color:#1C7C3F}
  .st-pending{background:#FEF6E7;color:#92600A}
  .st-disputed{background:#FDECEC;color:#B42318}
  .confirm-btn{font-size:11px;padding:5px 10px;border-radius:6px;border:none;background:#2563EB;color:#fff;cursor:pointer}
  .confirm-btn:disabled{opacity:.6;cursor:default}
  .waiting{font-size:10px;color:var(--color-text-tertiary)}
  .loading{font-size:12px;color:var(--color-text-secondary);padding:14px}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="ptitle">Campaigns</div>
    <div class="psub">Verification requires confirmation from both you and the sponsor.</div>
    <div class="card" id="list"><div class="loading">Loading…</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
let profile;

async function load() {
  profile = await requireRole('creator');
  if (!profile) return;
  renderSidebar('creator', 'campaigns');

  const { data: campaigns, error } = await sb.from('campaigns')
    .select('*, sponsors(company_name)').eq('creator_id', profile.id).order('created_at', { ascending: false });
  if (error) { document.getElementById('list').innerHTML = 'Could not load: ' + escapeHtml(error.message); return; }

  document.getElementById('list').innerHTML = (campaigns && campaigns.length) ? campaigns.map(c => `
    <div class="row-item">
      <div>
        <div style="font-weight:500">${escapeHtml(c.name)}</div>
        <div style="color:var(--color-text-secondary);font-size:11px">${escapeHtml(c.sponsors?.company_name || 'Unknown sponsor')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="status-tag st-${c.status}">${c.status}</span>
        ${c.creator_confirmed
          ? `<span class="waiting">${c.sponsor_confirmed ? 'Confirmed' : 'Waiting on sponsor'}</span>`
          : `<button class="confirm-btn" onclick="confirmCampaign('${c.id}')">Confirm</button>`}
      </div>
    </div>
  `).join('') : '<div style="padding:14px;font-size:12px;color:var(--color-text-secondary)">No campaigns yet.</div>';
}

async function confirmCampaign(id) {
  const { error } = await sb.from('campaigns').update({ creator_confirmed: true }).eq('id', id);
  if (error) { alert('Could not confirm: ' + error.message); return; }
  load();
}

load();
</script>
</body>
</html>
