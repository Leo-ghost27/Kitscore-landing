<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaigns — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  .ptitle{font-size:16px;font-weight:500;margin-bottom:4px}
  .psub{font-size:11px;color:var(--color-text-secondary);margin-bottom:16px}
  .card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:0;overflow:hidden;margin-bottom:16px}
  .form-card{padding:14px}
  .sec{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
  .field input,.field select{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);font-size:13px}
  .cta{padding:9px 16px;background:#2563EB;color:#fff;border:none;border-radius:0;font-size:12px;font-weight:500;cursor:pointer}
  .cta:disabled{opacity:.6;cursor:default}
  .row-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
  .row-item:last-child{border-bottom:none}
  .status-tag{font-size:10px;padding:3px 8px;border-radius:10px;text-transform:capitalize}
  .st-verified{background:#E9F7EE;color:#1C7C3F}
  .st-pending{background:#FEF6E7;color:#92600A}
  .st-disputed{background:#FDECEC;color:#B42318}
  .confirm-btn{font-size:11px;padding:5px 10px;border-radius:0;border:none;background:#2563EB;color:#fff;cursor:pointer}
  .confirm-btn:disabled{opacity:.6;cursor:default}
  .dispute-btn{font-size:11px;padding:5px 10px;border-radius:0;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
  .dispute-btn:hover{border-color:#B42318;color:#B42318}
  .dispute-panel{padding:10px 14px 14px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
  .dispute-panel textarea{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);font-size:12px;font-family:inherit;resize:vertical;min-height:56px;margin-bottom:8px}
  .dispute-reason-note{font-size:11px;color:#B42318;padding:0 14px 12px;line-height:1.5}
  .resolve-btn{font-size:11px;padding:5px 10px;border-radius:0;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
  .resolve-btn:hover{border-color:#2563EB;color:#2563EB}
  .resolve-panel{padding:10px 14px 14px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
  .waiting{font-size:10px;color:var(--color-text-tertiary)}
  .loading{font-size:12px;color:var(--color-text-secondary);padding:14px}
  .msg{font-size:11px;margin-top:8px;padding:8px;border-radius:0}
  .msg.error{background:#FDECEC;color:#B42318}
  .msg.ok{background:#E9F7EE;color:#1C7C3F}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="ptitle">Campaigns</div>
    <div class="psub" id="psub">Verification requires confirmation from both you and the sponsor.</div>
    <div id="formArea"></div>
    <div class="card" id="list"><div class="loading">Loading…</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
let profile;

async function load() {
  profile = await getCurrentProfile();
  if (!profile) { window.location.href = 'auth.html'; return; }
  renderSidebar(profile.role, 'campaigns');

  if (profile.role === 'sponsor') {
    document.getElementById('psub').textContent = 'Log a campaign you ran with a creator. It only counts toward their verified track record once the creator confirms it too.';
    await renderSponsorForm();
    await loadSponsorCampaigns();
  } else {
    document.getElementById('formArea').innerHTML = '';
    await loadCreatorCampaigns();
  }
}

// ── Sponsor: log a campaign ────────────────────────────────────────────────
async function renderSponsorForm() {
  const { data: creators, error } = await sb.from('creators')
    .select('id, profiles!inner(display_name)').order('id');
  const options = error ? [] : (creators || [])
    .map(c => ({ id: c.id, name: c.profiles.display_name }))
    .sort((a, b) => a.name.localeCompare(b.name));

  const preselect = new URLSearchParams(window.location.search).get('creator') || '';

  document.getElementById('formArea').innerHTML = `
    <div class="card form-card">
      <div class="sec">Log a new campaign</div>
      <div class="field"><label>Creator</label>
        <select id="creatorSel">
          <option value="">Select a creator…</option>
          ${options.map(o => `<option value="${escapeHtml(o.id)}" ${o.id === preselect ? 'selected' : ''}>${escapeHtml(o.name)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Campaign name</label>
        <input id="campaignName" placeholder="e.g. Summer 2026 Product Launch">
      </div>
      <div class="field"><label>Budget range <span style="color:var(--color-text-tertiary)">(optional)</span></label>
        <input id="budgetRange" placeholder="e.g. $500–$1,000">
      </div>
      <div class="field"><label>Objective <span style="color:var(--color-text-tertiary)">(optional)</span></label>
        <input id="objective" placeholder="e.g. Product awareness, affiliate sales">
      </div>
      <button class="cta" id="logBtn" onclick="logCampaign()">Log campaign</button>
      <div id="formMsg"></div>
    </div>
  `;
}

async function logCampaign() {
  const creatorId = document.getElementById('creatorSel').value;
  const name = document.getElementById('campaignName').value.trim();
  const msgEl = document.getElementById('formMsg');
  if (!creatorId) { msgEl.innerHTML = '<div class="msg error">Choose a creator.</div>'; return; }
  if (!name) { msgEl.innerHTML = '<div class="msg error">Give the campaign a name.</div>'; return; }

  const btn = document.getElementById('logBtn');
  btn.disabled = true;

  // Logging the campaign is itself the sponsor's side of the mutual
  // confirmation — the creator still has to confirm their side before it
  // counts as verified (see campaigns.html creator view / DB trigger).
  const budgetRange = document.getElementById('budgetRange').value.trim();
  const objective = document.getElementById('objective').value.trim();

  const { error } = await sb.from('campaigns').insert({
    creator_id: creatorId, sponsor_id: profile.id, name, sponsor_confirmed: true,
    budget_range: budgetRange || null, objective: objective || null,
  });
  if (error) { msgEl.innerHTML = `<div class="msg error">Could not log campaign: ${escapeHtml(error.message)}</div>`; btn.disabled = false; return; }

  msgEl.innerHTML = '<div class="msg ok">Campaign logged. The creator will need to confirm it before it counts as verified.</div>';
  document.getElementById('campaignName').value = '';
  document.getElementById('budgetRange').value = '';
  document.getElementById('objective').value = '';
  btn.disabled = false;
  loadSponsorCampaigns();
}

async function loadSponsorCampaigns() {
  const { data: campaigns, error } = await sb.from('campaigns')
    .select('*, creators(profiles(display_name))').eq('sponsor_id', profile.id).order('created_at', { ascending: false });
  if (error) { document.getElementById('list').innerHTML = 'Could not load: ' + escapeHtml(error.message); return; }

  document.getElementById('list').innerHTML = (campaigns && campaigns.length) ? campaigns.map(c => `
    <div class="row-item">
      <div>
        <div style="font-weight:500">${escapeHtml(c.name)}</div>
        <div style="color:var(--color-text-secondary);font-size:11px">${escapeHtml(c.creators?.profiles?.display_name || 'Unknown creator')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="status-tag st-${c.status}">${c.status}</span>
        ${c.status === 'disputed'
          ? `<button class="resolve-btn" onclick="toggleResubmit('${c.id}')">Edit &amp; resubmit</button>`
          : `<span class="waiting">${c.creator_confirmed ? 'Confirmed by creator' : 'Waiting on creator'}</span>`}
      </div>
    </div>
    ${c.status === 'disputed' && c.dispute_reason ? `<div class="dispute-reason-note"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Creator's reason: ${escapeHtml(c.dispute_reason)}</div>` : ''}
    ${c.status === 'disputed' ? `
    <div id="resubmit-panel-${c.id}" class="resolve-panel" style="display:none">
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">Fix the details and resubmit. This clears the dispute and puts it back in front of the creator to confirm.</div>
      <div class="field"><label>Campaign name</label><input id="resubmit-name-${c.id}" value="${escapeHtml(c.name)}"></div>
      <div class="field"><label>Budget range</label><input id="resubmit-budget-${c.id}" value="${escapeHtml(c.budget_range || '')}"></div>
      <div class="field"><label>Objective</label><input id="resubmit-objective-${c.id}" value="${escapeHtml(c.objective || '')}"></div>
      <div style="display:flex;gap:8px">
        <button class="cta" onclick="resubmitCampaign('${c.id}')">Resubmit</button>
        <button class="resolve-btn" onclick="toggleResubmit('${c.id}')">Cancel</button>
      </div>
      <div id="resubmit-msg-${c.id}"></div>
    </div>` : ''}
  `).join('') : '<div style="padding:14px;font-size:12px;color:var(--color-text-secondary)">No campaigns logged yet.</div>';
}

function toggleResubmit(id) {
  const panel = document.getElementById(`resubmit-panel-${id}`);
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

async function resubmitCampaign(id) {
  const name = document.getElementById(`resubmit-name-${id}`).value.trim();
  const budgetRange = document.getElementById(`resubmit-budget-${id}`).value.trim();
  const objective = document.getElementById(`resubmit-objective-${id}`).value.trim();
  const msgEl = document.getElementById(`resubmit-msg-${id}`);
  if (!name) { msgEl.innerHTML = '<div class="msg error">Give the campaign a name.</div>'; return; }

  // status='pending' is only accepted back from 'disputed' by the DB trigger
  // for the creator or sponsor already on the row, and it refuses to let
  // creator_id/sponsor_id change in the same update — see
  // fn_validate_campaign_confirmation.
  const { error } = await sb.from('campaigns').update({
    name, budget_range: budgetRange || null, objective: objective || null, status: 'pending',
  }).eq('id', id);
  if (error) { msgEl.innerHTML = `<div class="msg error">Could not resubmit: ${escapeHtml(error.message)}</div>`; return; }
  loadSponsorCampaigns();
}

// ── Creator: confirm a campaign ─────────────────────────────────────────────
async function loadCreatorCampaigns() {
  const { data: campaigns, error } = await sb.from('campaigns')
    .select('*, sponsors(company_name)').eq('creator_id', profile.id).order('created_at', { ascending: false });
  if (error) { document.getElementById('list').innerHTML = 'Could not load: ' + escapeHtml(error.message); return; }

  document.getElementById('list').innerHTML = (campaigns && campaigns.length) ? campaigns.map(c => `
    <div class="row-item">
      <div>
        <div style="font-weight:500">${escapeHtml(c.name)}</div>
        <div style="color:var(--color-text-secondary);font-size:11px">${escapeHtml(c.sponsors?.company_name || 'Unknown sponsor')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="status-tag st-${c.status}">${c.status}</span>
        ${c.status === 'disputed'
          ? `<button class="resolve-btn" onclick="withdrawDispute('${c.id}')">Withdraw dispute</button>`
          : c.creator_confirmed
            ? `<span class="waiting">${c.sponsor_confirmed ? 'Confirmed' : 'Waiting on sponsor'}</span>`
            : `<button class="confirm-btn" onclick="confirmCampaign('${c.id}')">Confirm</button>
               <button class="dispute-btn" onclick="toggleDispute('${c.id}')">Dispute</button>`}
      </div>
    </div>
    ${c.status === 'disputed' && c.dispute_reason
      ? `<div class="dispute-reason-note"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Your reason: ${escapeHtml(c.dispute_reason)}</div>`
      : ''}
    <div id="dispute-panel-${c.id}" class="dispute-panel" style="display:none">
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">Tell us why this campaign is wrong or didn't happen. This only shows to you and the sponsor.</div>
      <textarea id="dispute-reason-${c.id}" placeholder="e.g. I never worked with this sponsor / wrong name / wrong details"></textarea>
      <div style="display:flex;gap:8px">
        <button class="dispute-btn" style="background:#B42318;color:#fff;border-color:#B42318" onclick="submitDispute('${c.id}')">Submit dispute</button>
        <button class="dispute-btn" onclick="toggleDispute('${c.id}')">Cancel</button>
      </div>
      <div id="dispute-msg-${c.id}"></div>
    </div>
  `).join('') : '<div style="padding:14px;font-size:12px;color:var(--color-text-secondary)">No campaigns yet.</div>';
}

async function confirmCampaign(id) {
  const { error } = await sb.from('campaigns').update({ creator_confirmed: true }).eq('id', id);
  if (error) { alert('Could not confirm: ' + error.message); return; }
  loadCreatorCampaigns();
}

function toggleDispute(id) {
  const panel = document.getElementById(`dispute-panel-${id}`);
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

async function submitDispute(id) {
  const reason = document.getElementById(`dispute-reason-${id}`).value.trim();
  const msgEl = document.getElementById(`dispute-msg-${id}`);
  if (!reason) { msgEl.innerHTML = '<div class="msg error">Give a short reason.</div>'; return; }

  // status='disputed' is only accepted by the DB trigger for the creator on
  // a still-unconfirmed, still-pending campaign — see
  // fn_validate_campaign_confirmation.
  const { error } = await sb.from('campaigns')
    .update({ status: 'disputed', dispute_reason: reason }).eq('id', id);
  if (error) { msgEl.innerHTML = `<div class="msg error">Could not submit dispute: ${escapeHtml(error.message)}</div>`; return; }
  loadCreatorCampaigns();

  // Best-effort sponsor notification — the dispute itself is already saved
  // above, so a failure here shouldn't block or alarm the creator. They see
  // no error either way; worst case the sponsor just finds out by revisiting
  // their Campaigns page, same as before this shipped.
  try {
    const { data: { session } } = await sb.auth.getSession();
    await fetch('/api/notify-dispute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
      body: JSON.stringify({ campaignId: id }),
    });
  } catch (err) {
    console.error('notify-dispute error:', err);
  }
}

async function withdrawDispute(id) {
  const { error } = await sb.from('campaigns').update({ status: 'pending' }).eq('id', id);
  if (error) { alert('Could not withdraw dispute: ' + error.message); return; }
  loadCreatorCampaigns();
}

load();
</script>
</body>
</html>
