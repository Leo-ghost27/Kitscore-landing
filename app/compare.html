<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  body{background:var(--canvas)}
  .app-main{max-width:1180px;padding:40px 48px 80px}
  .ptitle{font-size:24px;font-weight:700;letter-spacing:-.01em;color:var(--ink);margin-bottom:6px}
  .psub{font-size:14px;color:var(--ink-soft);margin-bottom:18px}
  .picker{display:flex;gap:12px;margin-bottom:14px;align-items:center}
  .picker select{max-width:320px;padding:11px 12px;border:1px solid #D5DAE3;border-radius:0;font-size:14px;flex:1;background:#fff;color:var(--ink)}
  .picker button{padding:10px 18px;background:var(--blue);color:#fff;border:none;border-radius:0;font-size:13.5px;font-weight:600;cursor:pointer}
  .picker button:disabled{background:#C9D2E6;cursor:default}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .chip{display:flex;align-items:center;gap:8px;background:var(--blue-soft);color:var(--blue);font-size:13px;font-weight:600;padding:6px 12px}
  .chip button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:13px;font-weight:700;padding:0}
  .cmp-table{display:grid;background:#fff;border:1px solid var(--line);overflow:hidden;overflow-x:auto}
  .cmp-cell{padding:14px 20px;border-bottom:1px solid var(--line);font-size:14px;font-family:var(--font-mono)}
  .cmp-cell:first-child{font-family:var(--font-sans);color:var(--ink-soft);font-weight:500}
  .cmp-head{font-weight:600;font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);background:#FAFBFD}
  .cmp-head:first-child{font-family:var(--font-mono)}
  .win{background:var(--green-soft);color:#137C52;font-weight:600}
  .loading{font-size:13px;color:var(--ink-soft)}
  .limit-note{font-size:12px;color:var(--ink-faint);margin-bottom:10px}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="ptitle">Compare creators</div>
    <div class="psub" id="psub">Loading…</div>
    <div class="picker">
      <select id="creatorPick"></select>
      <button id="addBtn" onclick="addCreator()">Add to compare</button>
    </div>
    <div class="chips" id="chips"></div>
    <div id="result"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
let allCreators = [];
let selectedIds = [];
let maxCompare = 2;
const PLAN_LIMITS = { free: 2, starter: 5, team: Infinity };

async function load() {
  const profile = await requireRole('sponsor');
  if (!profile) return;
  renderSidebar('sponsor', 'compare');

  const { data: sponsor } = await sb.from('sponsors').select('plan').eq('id', profile.id).single();
  const plan = sponsor?.plan || 'free';
  maxCompare = PLAN_LIMITS[plan] ?? 2;
  document.getElementById('psub').textContent = maxCompare === Infinity
    ? `Compare unlimited creators side by side (${plan} plan).`
    : `Compare up to ${maxCompare} creators side by side (${plan} plan). Upgrade for more.`;

  const { data, error } = await sb.from('creators').select('id, niche, location, trust_score, confidence, badge_tier, reliability_score, repeat_sponsor_rate, would_hire_again_pct, profiles!inner(display_name)').eq('is_test', false);
  if (error) { document.getElementById('result').textContent = 'Could not load: ' + error.message; return; }
  allCreators = data;

  selectedIds = data.slice(0, Math.min(2, maxCompare === Infinity ? 2 : maxCompare)).map(c => c.id);
  renderPicker();
  renderChips();
  renderCompare();
}

function renderPicker() {
  const available = allCreators.filter(c => !selectedIds.includes(c.id));
  document.getElementById('creatorPick').innerHTML = available.map(c => `<option value="${c.id}">${escapeHtml(c.profiles.display_name)}</option>`).join('');
  const btn = document.getElementById('addBtn');
  const atLimit = selectedIds.length >= maxCompare;
  btn.disabled = atLimit || available.length === 0;
  btn.textContent = atLimit ? `Limit reached (${maxCompare})` : 'Add to compare';
}

function renderChips() {
  document.getElementById('chips').innerHTML = selectedIds.map(id => {
    const c = allCreators.find(x => x.id === id);
    return `<span class="chip">${escapeHtml(c.profiles.display_name)}<button onclick="removeCreator('${id}')" title="Remove">✕</button></span>`;
  }).join('');
}

function addCreator() {
  const id = document.getElementById('creatorPick').value;
  if (!id || selectedIds.includes(id) || selectedIds.length >= maxCompare) return;
  selectedIds.push(id);
  renderPicker(); renderChips(); renderCompare();
}

function removeCreator(id) {
  selectedIds = selectedIds.filter(x => x !== id);
  renderPicker(); renderChips(); renderCompare();
}

async function renderCompare() {
  if (selectedIds.length === 0) { document.getElementById('result').innerHTML = ''; return; }

  const results = await Promise.all(selectedIds.map(async id => {
    const [{ data: comp }, { data: camp }] = await Promise.all([
      sb.from('score_components').select('*').eq('creator_id', id),
      sb.from('campaigns').select('status').eq('creator_id', id).eq('status', 'verified'),
    ]);
    const map = {};
    (comp || []).forEach(c => map[c.component_key] = c.value);
    const creator = allCreators.find(c => c.id === id);
    return { creator, map, verified: (camp || []).length };
  }));

  const metricRows = [
    ['Trust score', r => r.creator.trust_score],
    ['Audience authenticity', r => r.map.audience_authenticity],
    ['Engagement quality', r => r.map.engagement_quality],
    ['Brand safety', r => r.map.brand_safety],
    ['Content consistency', r => r.map.content_consistency],
    ['Verified campaigns', r => r.verified],
  ];

  const cols = results.length + 1;
  document.getElementById('result').innerHTML = `
    <div class="cmp-table" style="grid-template-columns:repeat(${cols}, 1fr)">
      <div class="cmp-cell cmp-head">Metric</div>
      ${results.map(r => `<div class="cmp-cell cmp-head">${escapeHtml(r.creator.profiles.display_name)}</div>`).join('')}
      ${metricRows.map(([label, getter]) => {
        const values = results.map(getter);
        const max = Math.max(...values.map(v => v ?? -Infinity));
        return `
        <div class="cmp-cell">${label}</div>
        ${values.map(v => `<div class="cmp-cell ${v === max && v != null ? 'win' : ''}">${v ?? '—'}</div>`).join('')}
      `; }).join('')}
    </div>
  `;
}

load();
</script>
</body>
</html>
