<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team — Kitscore</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  .ptitle{font-size:16px;font-weight:500;margin-bottom:4px}
  .psub{font-size:11px;color:var(--color-text-secondary);margin-bottom:16px}
  .card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:14px;margin-bottom:14px}
  .sec{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
  .field input,.field textarea{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);font-size:13px}
  .field textarea{height:70px;resize:vertical}
  .cta{padding:8px 14px;background:#2563EB;color:#fff;border:none;border-radius:0;font-size:12px;font-weight:500;cursor:pointer}
  .cta:disabled{opacity:.6}
  .row-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
  .row-item:last-child{border-bottom:none}
  .role-badge{font-size:10px;background:var(--color-background-secondary);color:var(--color-text-secondary);padding:2px 8px;border-radius:10px}
  .msg{font-size:11px;margin-top:8px;padding:8px;border-radius:0}
  .msg.error{background:#FDECEC;color:#B42318}
  .msg.ok{background:#E9F7EE;color:#1C7C3F}
  .upgrade-banner{font-size:11px;padding:12px 14px;background:var(--color-background-info);color:#185FA5;border-radius:var(--border-radius-md);margin-bottom:14px}
  .upgrade-banner a{color:inherit;font-weight:500}
  .note-row{padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
  .note-row:last-child{border-bottom:none}
  .note-meta{font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px}
  .loading{font-size:12px;color:var(--color-text-secondary)}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="ptitle">Team</div>
    <div class="psub">Manage your team, shared notes, and evaluations.</div>
    <div id="content" class="loading">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="nav.js?v=2"></script>
<script>
let profile, myTeam;

async function load() {
  profile = await requireRole('sponsor');
  if (!profile) return;
  renderSidebar('sponsor', 'team');

  const { data: sponsor } = await sb.from('sponsors').select('plan').eq('id', profile.id).single();
  const sponsorPlan = (sponsor?.plan || '').toLowerCase();
  if (sponsorPlan !== 'team') {
    // Check if they just came back from a successful checkout
    const params = new URLSearchParams(window.location.search);
    const justPaid = params.get('checkout') === 'success';
    document.getElementById('content').innerHTML = `
      <div class="upgrade-banner">
        ${justPaid
          ? '<strong>Payment received!</strong> Your plan is being activated — this can take up to 60 seconds. <button onclick="window.location.reload()" style="color:#185FA5;background:none;border:none;cursor:pointer;font-weight:600;text-decoration:underline">Refresh now →</button>'
          : '<i class="ti ti-users"></i> Team features require the Team plan. <a href="pricing.html">Upgrade to Team — $299/mo →</a>'
        }
      </div>
      ${justPaid ? '<div style="font-size:11px;color:var(--color-text-secondary);margin-top:8px">If the page still shows this after refreshing, wait 30 seconds and try again.</div>' : ''}`;
    return;
  }

  // Check if they're already in a team
  const { data: membership } = await sb.from('team_members').select('*, teams(*)').eq('sponsor_id', profile.id).maybeSingle();
  myTeam = membership?.teams || null;

  if (!myTeam) { renderCreateTeam(); return; }
  renderTeam();
}

function renderCreateTeam() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="sec">Create your team</div>
      <div class="field"><label>Team name</label><input id="teamName" placeholder="e.g. Bloom Beverages Partnerships"></div>
      <button class="cta" onclick="createTeam()">Create team</button>
      <div id="createMsg"></div>
    </div>`;
}

async function createTeam() {
  const name = document.getElementById('teamName').value.trim();
  if (!name) { showMsg('createMsg', 'Name is required.', 'error'); return; }

  const { data: team, error: teamErr } = await sb.from('teams').insert({ name, owner_id: profile.id }).select().single();
  if (teamErr) { showMsg('createMsg', 'Could not create team: ' + teamErr.message, 'error'); return; }

  await sb.from('team_members').insert({ team_id: team.id, sponsor_id: profile.id, role: 'owner' });
  myTeam = team;
  renderTeam();
}

async function renderTeam() {
  const [{ data: members }, { data: notes }, { data: pendingInvites }] = await Promise.all([
    sb.from('team_members').select('*, sponsors(*, profiles!inner(display_name))').eq('team_id', myTeam.id),
    sb.from('team_notes').select('*, sponsors!author_id(profiles!inner(display_name)), creators(profiles!inner(display_name))').eq('team_id', myTeam.id).order('created_at', { ascending: false }),
    sb.from('team_invites').select('email, expires_at').eq('team_id', myTeam.id).is('accepted_at', null).gt('expires_at', new Date().toISOString()),
  ]);

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="sec">${escapeHtml(myTeam.name)}</div>
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">${(members||[]).length} member${(members||[]).length !== 1 ? 's' : ''}</div>
      ${(members||[]).map(m => `
        <div class="row-item">
          <span>${escapeHtml(m.sponsors?.profiles?.display_name || '—')}</span>
          <span class="role-badge">${m.role}</span>
        </div>`).join('')}
    </div>

    <div class="card">
      <div class="sec">Invite a team member</div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <div class="field" style="flex:1;margin-bottom:0"><label>Email address</label><input id="inviteEmail" type="email" placeholder="colleague@company.com"></div>
        <button class="cta" onclick="sendInvite()" style="flex-shrink:0">Send invite</button>
      </div>
      <div id="inviteResult" style="margin-top:10px"></div>
    </div>

    ${pendingInvites?.length ? `
    <div class="card">
      <div class="sec">Pending invites</div>
      ${pendingInvites.map(i => `
        <div class="row-item">
          <span>${escapeHtml(i.email)}</span>
          <span style="font-size:10px;color:var(--color-text-tertiary)">Expires ${new Date(i.expires_at).toLocaleDateString('en-GB')}</span>
        </div>`).join('')}
    </div>` : ''}

    <div class="card">
      <div class="sec">Add note</div>
      <div class="field"><textarea id="noteText" placeholder="Write a note for your team about a creator or campaign…"></textarea></div>
      <button class="cta" onclick="addNote()">Post note</button>
      <div id="noteMsg"></div>
    </div>

    <div class="card">
      <div class="sec">Team notes</div>
      ${(notes||[]).length ? notes.map(n => `
        <div class="note-row">
          <div class="note-meta">${escapeHtml(n.sponsors?.profiles?.display_name || '—')} · ${new Date(n.created_at).toLocaleDateString('en-GB')}${n.creators ? ' · re: ' + escapeHtml(n.creators.profiles.display_name) : ''}</div>
          <div style="font-size:12px">${escapeHtml(n.content)}</div>
        </div>`).join('') : '<div style="font-size:12px;color:var(--color-text-secondary)">No notes yet.</div>'}
    </div>
  `;
}

async function sendInvite() {
  const email = document.getElementById('inviteEmail').value.trim();
  const resultEl = document.getElementById('inviteResult');
  if (!email) { resultEl.innerHTML = '<div class="msg error">Enter an email address.</div>'; return; }

  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/invite-team-member', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
      body: JSON.stringify({ teamId: myTeam.id, email }),
    });
    const json = await res.json();
    if (!res.ok) { resultEl.innerHTML = `<div class="msg error">${escapeHtml(json.error || 'Unknown error')}</div>`; return; }
    resultEl.innerHTML = `
      <div class="msg ok">${escapeHtml(json.message)}</div>
      <div style="margin-top:6px;padding:8px;background:var(--color-background-secondary);border-radius:0;font-size:11px;word-break:break-all">
        <strong>Invite link:</strong> <a href="${escapeHtml(json.acceptLink)}" style="color:#185FA5">${escapeHtml(json.acceptLink)}</a>
      </div>`;
    document.getElementById('inviteEmail').value = '';
    setTimeout(() => renderTeam(), 1500);
  } catch (err) {
    resultEl.innerHTML = `<div class="msg error">Request failed: ${escapeHtml(err.message)}</div>`;
  }
}

async function addNote() {
  const content = document.getElementById('noteText').value.trim();
  if (!content) { showMsg('noteMsg', 'Note cannot be empty.', 'error'); return; }
  const { error } = await sb.from('team_notes').insert({ team_id: myTeam.id, author_id: profile.id, content });
  if (error) { showMsg('noteMsg', 'Could not post: ' + error.message, 'error'); return; }
  document.getElementById('noteText').value = '';
  renderTeam();
}

function showMsg(id, text, type) { document.getElementById(id).innerHTML = `<div class="msg ${type}">${text}</div>`; }

load();
</script>
</body>
</html>
