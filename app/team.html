<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team — Kitscore</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css?v=2">
<style>
  body{background:var(--canvas)}
  .app-main{max-width:1180px;padding:40px 48px 80px}
  .ptitle{font-size:24px;font-weight:700;letter-spacing:-.01em;color:var(--ink);margin-bottom:6px}
  .psub{font-size:14px;color:var(--ink-soft);margin-bottom:18px}
  .card{background:#fff;border:1px solid var(--line);box-shadow:0 1px 2px rgba(16,21,31,.03);padding:26px 28px;margin-bottom:20px}
  .sec{font-family:var(--font-mono);font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:16px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:7px}
  .field input,.field textarea{width:100%;padding:11px 12px;border:1px solid #D5DAE3;border-radius:0;font-size:14px;background:#fff;color:var(--ink)}
  .field textarea{height:70px;resize:vertical}
  .cta{padding:10px 18px;background:var(--blue);color:#fff;border:none;border-radius:0;font-size:13.5px;font-weight:600;cursor:pointer}
  .cta:disabled{opacity:.6}
  .row-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);font-size:13px}
  .row-item:last-child{border-bottom:none}
  .role-badge{font-size:11px;font-weight:600;background:#F1F3F7;color:var(--ink-soft);padding:3px 9px}
  .msg{font-size:12px;margin-top:8px;padding:10px 12px;border-radius:0}
  .msg.error{background:#FDECEC;color:#B42318}
  .msg.ok{background:var(--green-soft);color:#137C52}
  .upgrade-banner{background:var(--card,#fff);border:1px solid var(--blue);box-shadow:0 8px 24px -10px rgba(47,95,224,.2);padding:32px 36px;margin-bottom:22px;font-size:14px;color:var(--ink)}
  .upgrade-banner a{color:var(--blue);font-weight:700;text-decoration:none}
  .team-hero{background:#fff;border:1px solid var(--blue);box-shadow:0 8px 24px -10px rgba(47,95,224,.2);padding:40px;margin-bottom:22px;position:relative;overflow:hidden;opacity:0;animation:heroIn .5s ease forwards}
  @keyframes heroIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @media (prefers-reduced-motion: reduce){.team-hero{animation:none;opacity:1}}
  .team-hero-inner{display:flex;justify-content:space-between;align-items:center;gap:32px;flex-wrap:wrap}
  .team-hero-eyebrow{color:var(--blue);display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .team-hero-eyebrow::before{content:"";width:6px;height:6px;background:var(--blue)}
  .team-hero h2{font-size:26px;font-weight:700;letter-spacing:-.01em;margin-bottom:10px;max-width:460px;color:var(--ink)}
  .team-hero p{font-size:14px;color:var(--ink-soft);max-width:420px;line-height:1.6}
  .team-hero-price{text-align:right;flex-shrink:0}
  .team-hero-price .amt{font-family:var(--font-mono);font-size:38px;font-weight:600;color:var(--ink)}
  .team-hero-price .per{font-size:13px;color:var(--ink-faint);margin-bottom:14px}
  .team-hero-btn{background:var(--blue);color:#fff;border:none;font-size:13.5px;font-weight:700;padding:12px 22px;cursor:pointer;white-space:nowrap}
  .feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
  .feature-tile{padding:22px;position:relative;transition:transform .18s ease,box-shadow .18s ease;opacity:0;transform:translateY(10px);animation:tileIn .45s ease forwards}
  .feature-tile:hover{transform:translateY(-3px);box-shadow:0 10px 24px -8px rgba(16,21,31,.12)}
  .feature-tile-icon{width:34px;height:34px;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;margin-bottom:14px;transition:transform .18s ease}
  .feature-tile:hover .feature-tile-icon{transform:scale(1.08)}
  .feature-tile-title{font-size:14px;font-weight:600;margin-bottom:7px;color:var(--ink)}
  .feature-tile-text{font-size:12.5px;color:var(--ink-soft);line-height:1.55}
  .team-lock-chip{position:absolute;top:18px;right:18px;font-family:var(--font-mono);font-size:9px;letter-spacing:.05em;color:var(--blue);border:1px solid var(--blue-line);padding:3px 8px;text-transform:uppercase;white-space:nowrap}
  .team-live-chip{position:absolute;top:18px;right:18px;font-family:var(--font-mono);font-size:9px;letter-spacing:.05em;color:#137C52;background:var(--green-soft);border:1px solid transparent;padding:3px 8px;text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;gap:4px}
  .team-live-chip::before{content:"";width:5px;height:5px;border-radius:50%;background:#1E9E6B;animation:pulseDot 1.8s ease-in-out infinite}
  .feature-tile.is-live .feature-tile-icon{background:var(--green-soft)}
  .feature-tile.is-live .feature-tile-icon i{color:#137C52 !important}
  .feature-section-label{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .feature-section-label.is-live{color:#137C52}
  @keyframes tileIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion: reduce){.feature-tile{animation:none;opacity:1;transform:none}.team-live-chip::before{animation:none}}
  .team-bottom-cta{display:flex;justify-content:space-between;align-items:center;background:var(--blue-soft);border:1px solid var(--blue-line);padding:20px 26px;flex-wrap:wrap;gap:14px}
  .team-bottom-cta p{font-size:13.5px;color:#1F3E9E}
  .team-bottom-cta p b{color:#122B7A}
  .team-bottom-btn{background:var(--blue);color:#fff;border:none;font-size:13.5px;font-weight:600;padding:11px 20px;cursor:pointer;white-space:nowrap}
  .note-row{padding:12px 0;border-bottom:1px solid var(--line)}
  .note-row:last-child{border-bottom:none}
  .note-meta{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-faint);margin-bottom:4px}
  .loading{font-size:13px;color:var(--ink-soft)}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar-mount"></div>
  <div class="app-main">
    <div class="ptitle">Team</div>
    <div class="psub">Everything your evaluation practice needs to run at agency scale.</div>
    <div id="content" class="loading">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="icons.js?v=1"></script>
<script src="nav.js?v=2"></script>
<script>
let profile, myTeam, myRole;

async function load() {
  profile = await requireRole('sponsor');
  if (!profile) return;
  renderSidebar('sponsor', 'team');

  const { data: sponsor } = await sb.from('sponsors').select('plan').eq('id', profile.id).single();
  const sponsorPlan = (sponsor?.plan || '').toLowerCase();
  if (sponsorPlan !== 'team') {
    // Check if they just came back from a successful checkout
    const params = new URLSearchParams(window.location.search);
    const justPaid = params.get('checkout') === 'success';

    // Check for a pending invite addressed to this account. Without this,
    // an invited member who is already logged in has no way to discover or
    // accept their invite short of being handed the raw token link.
    const { data: pendingInvites } = await sb.from('team_invites')
      .select('token, teams(name)')
      .is('accepted_at', null)
      .gt('expires_at', new Date().toISOString())
      .order('created_at', { ascending: false });
    const myInvite = pendingInvites && pendingInvites[0];
    if (myInvite && !justPaid) {
      document.getElementById('content').innerHTML = `
        <div class="upgrade-banner">
          <strong>You've been invited to join ${escapeHtml(myInvite.teams?.name || 'a team')} on Kitscore.</strong>
          <div style="margin-top:8px"><a href="accept-invite.html?token=${encodeURIComponent(myInvite.token)}">Accept invite →</a></div>
        </div>`;
      return;
    }

    if (justPaid) {
      document.getElementById('content').innerHTML = `
        <div class="upgrade-banner">
          <strong>Payment received!</strong> Your plan is being activated — this can take up to 60 seconds. <button onclick="window.location.reload()" style="color:var(--blue);background:none;border:none;cursor:pointer;font-weight:600;text-decoration:underline">Refresh now →</button>
        </div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:8px">If the page still shows this after refreshing, wait 30 seconds and try again.</div>`;
      return;
    }
    const LIVE_FEATURES = [
      ['users', 'Roles &amp; permissions', 'Team members submit evaluations for review and file spend requests — only your account owner can approve, reject, or unlock a paid report.'],
      ['check', 'Internal approval workflow', "Route evaluations and $29 unlocks through your account owner's sign-off before a sponsorship — or a charge — is confirmed."],
      ['layout', 'White-labeled reports', "Your agency's logo on the PDF memo when you share it with a client — not Kitscore's."],
      ['file', 'Shared notes &amp; collaboration', "Leave internal notes on a creator's profile that every team member can see before signing off."],
    ];
    const COMING_FEATURES = [
      ['file-text', 'Compliance-ready audit trail', 'Every evaluation, approval, and sign-off exported as a dated PDF/CSV log — ready to justify a sponsorship decision internally or to a client.'],
      ['bolt', 'Score-change alerts', "Get notified the moment an approved creator's trust score drops — a new red flag, a disclosure lapse — before it becomes your problem."],
      ['code', 'API access', 'Pipe evaluations directly into your own CRM or workflow tool instead of exporting manually.'],
      ['user-contact', 'Dedicated account contact', 'A named point of contact for your account — not a shared support inbox.'],
    ];
    const tile = ([icon, title, text], i, live) => `
      <div class="card feature-tile ${live ? 'is-live' : ''}" style="animation-delay:${i * 60}ms">
        <div class="feature-tile-icon">${svgIcon(icon, {size:17, stroke: live ? '#137C52' : 'var(--blue)', strokeWidth:2})}</div>
        <div class="feature-tile-title">${title}</div>
        <div class="feature-tile-text">${text}</div>
        <span class="${live ? 'team-live-chip' : 'team-lock-chip'}">${live ? 'Live' : 'Team'}</span>
      </div>`;
    document.getElementById('content').innerHTML = `
      <div class="team-hero">
        <div class="team-hero-inner">
          <div>
            <div class="eyebrow team-hero-eyebrow">BUILT FOR AGENCIES &amp; TEAMS</div>
            <h2>Run your entire creator evaluation practice from one account.</h2>
            <p>Team includes everything in Starter, plus the collaboration, compliance, and monitoring tools a $299/mo practice should have.</p>
          </div>
          <div class="team-hero-price">
            <div class="amt">$299</div>
            <div class="per">/ month</div>
            <button class="team-hero-btn" onclick="window.location.href='pricing.html'">Upgrade to Team →</button>
          </div>
        </div>
      </div>
      <div class="feature-section-label is-live">Included now</div>
      <div class="feature-grid">
        ${LIVE_FEATURES.map((f, i) => tile(f, i, true)).join('')}
      </div>
      <div class="feature-section-label">Shipping soon</div>
      <div class="feature-grid">
        ${COMING_FEATURES.map((f, i) => tile(f, i + LIVE_FEATURES.length, false)).join('')}
      </div>
      <div class="team-bottom-cta">
        <p><b>150 evaluations/mo included.</b> Everything in Starter, plus roles, approvals, and white-labeling above — more shipping soon.</p>
        <button class="team-bottom-btn" onclick="window.location.href='pricing.html'">Upgrade to Team — $299/mo →</button>
      </div>`;
    return;
  }

  // Check if they're already in a team
  const { data: membership } = await sb.from('team_members').select('*, teams(*)').eq('sponsor_id', profile.id).maybeSingle();
  myTeam = membership?.teams || null;
  myRole = membership?.role || null;

  if (!myTeam) { renderCreateTeam(); return; }
  renderTeam();
}

function renderCreateTeam() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="sec">Create your team</div>
      <div class="field"><label>Team name</label><input id="teamName" placeholder="e.g. Bloom Beverages Partnerships"></div>
      <button class="cta" onclick="createTeam()">Create team</button>
      <div id="createMsg"></div>
    </div>`;
}

async function createTeam() {
  const name = document.getElementById('teamName').value.trim();
  if (!name) { showMsg('createMsg', 'Name is required.', 'error'); return; }

  const { data: team, error: teamErr } = await sb.from('teams').insert({ name, owner_id: profile.id }).select().single();
  if (teamErr) { showMsg('createMsg', 'Could not create team: ' + teamErr.message, 'error'); return; }

  await sb.from('team_members').insert({ team_id: team.id, sponsor_id: profile.id, role: 'owner' });
  myTeam = team;
  renderTeam();
}

async function saveBranding() {
  const name = document.getElementById('brandName').value.trim();
  const logo = document.getElementById('brandLogo').value.trim();
  const msgEl = document.getElementById('brandMsg');
  const { error } = await sb.from('teams')
    .update({ agency_display_name: name || null, logo_url: logo || null })
    .eq('id', myTeam.id);
  if (error) { msgEl.innerHTML = `<div class="msg error">Could not save: ${escapeHtml(error.message)}</div>`; return; }
  myTeam.agency_display_name = name || null;
  myTeam.logo_url = logo || null;
  msgEl.innerHTML = `<div class="msg ok">Saved. Any PDF generated from now on will use this branding, including for already-unlocked evaluations.</div>`;
}

async function renderTeam() {
  const approvalsQuery = myRole === 'owner'
    ? sb.rpc('fn_team_pending_approvals', { p_team_id: myTeam.id })
    : sb.from('approval_requests').select('*').eq('team_id', myTeam.id).eq('requested_by', profile.id).order('created_at', { ascending: false }).limit(10);

  const [{ data: members }, { data: notes }, { data: pendingInvites }, { data: approvals }] = await Promise.all([
    sb.rpc('fn_team_roster', { p_team_id: myTeam.id }),
    sb.rpc('fn_team_notes', { p_team_id: myTeam.id }),
    sb.from('team_invites').select('email, expires_at').eq('team_id', myTeam.id).is('accepted_at', null).gt('expires_at', new Date().toISOString()),
    approvalsQuery,
  ]);

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="sec">${escapeHtml(myTeam.name)}</div>
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:12px">${(members||[]).length} member${(members||[]).length !== 1 ? 's' : ''}</div>
      ${(members||[]).map(m => `
        <div class="row-item">
          <span>${escapeHtml(m.display_name || '—')}</span>
          <span class="role-badge">${m.role}</span>
        </div>`).join('')}
    </div>

    ${myRole === 'owner' ? `
    <div class="card">
      <div class="sec">White-label branding</div>
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:14px">Shown on the PDF sponsor decision memo instead of Kitscore's own branding. Leave blank to use Kitscore branding.</div>
      <div class="field"><label>Agency name</label><input id="brandName" placeholder="${escapeHtml(myTeam.name)}" value="${escapeHtml(myTeam.agency_display_name || '')}"></div>
      <div class="field"><label>Logo URL</label><input id="brandLogo" placeholder="https://yourdomain.com/logo.png" value="${escapeHtml(myTeam.logo_url || '')}"></div>
      <button class="cta" onclick="saveBranding()">Save branding</button>
      <div id="brandMsg"></div>
    </div>` : ''}

    <div class="card">
      <div class="sec">Invite a team member</div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <div class="field" style="flex:1;margin-bottom:0"><label>Email address</label><input id="inviteEmail" type="email" placeholder="colleague@company.com"></div>
        <button class="cta" onclick="sendInvite()" style="flex-shrink:0">Send invite</button>
      </div>
      <div id="inviteResult" style="margin-top:10px"></div>
    </div>

    ${pendingInvites?.length ? `
    <div class="card">
      <div class="sec">Pending invites</div>
      ${pendingInvites.map(i => `
        <div class="row-item">
          <span>${escapeHtml(i.email)}</span>
          <span style="font-size:11px;font-family:var(--font-mono);color:var(--ink-faint)">Expires ${new Date(i.expires_at).toLocaleDateString('en-GB')}</span>
        </div>`).join('')}
    </div>` : ''}

    ${myRole === 'owner' ? `
    <div class="card">
      <div class="sec">Pending approvals</div>
      ${(approvals||[]).length ? approvals.map(a => `
        <div class="row-item" style="align-items:flex-start;flex-wrap:wrap">
          <span>${escapeHtml(a.requester_display_name || 'A team member')} wants to spend $29 to unlock an evaluation${a.note ? ' — "' + escapeHtml(a.note) + '"' : ''}</span>
          <span style="display:flex;gap:6px">
            <button class="cta" style="background:#1C7C3F;padding:6px 12px" onclick="decideApproval('${a.request_id}','approved')">Approve</button>
            <button class="cta" style="background:#B42318;padding:6px 12px" onclick="decideApproval('${a.request_id}','rejected')">Reject</button>
          </span>
        </div>`).join('') : '<div style="font-size:13px;color:var(--ink-soft)">Nothing waiting on you right now.</div>'}
    </div>` : `
    <div class="card">
      <div class="sec">Your requests</div>
      ${(approvals||[]).length ? approvals.map(a => `
        <div class="row-item">
          <span>Unlock request${a.note ? ' — ' + escapeHtml(a.note) : ''}</span>
          <span class="role-badge" style="${a.status==='approved'?'background:#E9F7EE;color:#1C7C3F':a.status==='rejected'?'background:#FDECEC;color:#B42318':''}">${a.status}</span>
        </div>`).join('') : '<div style="font-size:13px;color:var(--ink-soft)">No requests yet. When you try to unlock a report, it\'ll ask your team owner to approve.</div>'}
    </div>`}

    <div class="card">
      <div class="sec">Add note</div>
      <div class="field"><textarea id="noteText" placeholder="Write a note for your team about a creator or campaign…"></textarea></div>
      <button class="cta" onclick="addNote()">Post note</button>
      <div id="noteMsg"></div>
    </div>

    <div class="card">
      <div class="sec">Team notes</div>
      ${(notes||[]).length ? notes.map(n => `
        <div class="note-row">
          <div class="note-meta">${escapeHtml(n.author_display_name || '—')} · ${new Date(n.created_at).toLocaleDateString('en-GB')}${n.creator_display_name ? ' · re: ' + escapeHtml(n.creator_display_name) : ''}</div>
          <div style="font-size:12px">${escapeHtml(n.content)}</div>
        </div>`).join('') : '<div style="font-size:13px;color:var(--ink-soft)">No notes yet.</div>'}
    </div>
  `;
}

async function sendInvite() {
  const email = document.getElementById('inviteEmail').value.trim();
  const resultEl = document.getElementById('inviteResult');
  if (!email) { resultEl.innerHTML = '<div class="msg error">Enter an email address.</div>'; return; }

  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/invite-team-member', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
      body: JSON.stringify({ teamId: myTeam.id, email }),
    });
    const json = await res.json();
    if (!res.ok) { resultEl.innerHTML = `<div class="msg error">${escapeHtml(json.error || 'Unknown error')}</div>`; return; }
    resultEl.innerHTML = `
      <div class="msg ok">${escapeHtml(json.message)}</div>
      <div style="margin-top:6px;padding:8px;background:var(--color-background-secondary);border-radius:0;font-size:11px;word-break:break-all">
        <strong>Invite link:</strong> <a href="${escapeHtml(json.acceptLink)}" style="color:var(--blue)">${escapeHtml(json.acceptLink)}</a>
      </div>`;
    document.getElementById('inviteEmail').value = '';
    setTimeout(() => renderTeam(), 1500);
  } catch (err) {
    resultEl.innerHTML = `<div class="msg error">Request failed: ${escapeHtml(err.message)}</div>`;
  }
}

async function addNote() {
  const content = document.getElementById('noteText').value.trim();
  if (!content) { showMsg('noteMsg', 'Note cannot be empty.', 'error'); return; }
  const { error } = await sb.from('team_notes').insert({ team_id: myTeam.id, author_id: profile.id, content });
  if (error) { showMsg('noteMsg', 'Could not post: ' + error.message, 'error'); return; }
  document.getElementById('noteText').value = '';
  renderTeam();
}

async function decideApproval(requestId, decision) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/review-approval', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
      body: JSON.stringify({ requestId, decision }),
    });
    const json = await res.json();
    if (!res.ok) { alert(json.error || 'Could not update request.'); return; }
    renderTeam();
  } catch (err) {
    alert('Request failed: ' + err.message);
  }
}

function showMsg(id, text, type) { document.getElementById(id).innerHTML = `<div class="msg ${type}">${text}</div>`; }

load();
</script>
</body>
</html>
